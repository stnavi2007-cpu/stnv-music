<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STNV BEAT - 鬼の1発勝負版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        
        body {
            margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: 'DotGothic16', sans-serif; display: flex;
            flex-direction: column; align-items: center; overflow: hidden;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }
        h1 { color: #ffd700; text-shadow: 2px 2px #f00; margin: 10px 0; font-size: 18px; }
        
        #game_area {
            position: relative; width: 90vw; max-width: 340px; height: 60vh;
            background: #111; border: 4px double #0ff; border-radius: 10px;
            box-shadow: 0 0 15px #0ff; overflow: hidden; margin-bottom: 10px;
        }
        
        #target_line {
            position: absolute; bottom: 50px; left: 0; width: 100%; height: 40px;
            background: rgba(255, 255, 255, 0.1); border-top: 2px dashed #fff;
            border-bottom: 2px dashed #fff; z-index: 10;
        }
        
        .note { position: absolute; width: 50px; height: 50px; z-index: 5; image-rendering: pixelated; }
        .track-0 { left: 5%;   filter: drop-shadow(0 0 5px #ff00ff); }
        .track-1 { left: 28%;  filter: drop-shadow(0 0 5px #00ffff); }
        .track-2 { left: 51%;  filter: drop-shadow(0 0 5px #00ff00); }
        .track-3 { left: 74%;  filter: drop-shadow(0 0 5px #ff0000); }
        
        #controls { display: flex; width: 95vw; max-width: 360px; justify-content: space-around; padding-bottom: 20px; }
        .btn {
            width: 20vw; max-width: 75px; height: 20vw; max-height: 75px;
            background: #222; border: 2px solid #fff; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 #555; font-size: 24px; cursor: pointer;
            touch-action: none; /* スマホのジェスチャーを完全無効化 */
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 0 0 #555; background: #444 !important; }
        #btn_0 { border-color: #ff00ff; color: #ff00ff; }
        #btn_1 { border-color: #00ffff; color: #00ffff; }
        #btn_2 { border-color: #00ff00; color: #00ff00; }
        #btn_3 { border-color: #ff0000; color: #ff0000; }
        
        #ui_board { display: flex; justify-content: space-between; width: 90vw; max-width: 340px; font-size: 14px; margin-bottom: 5px; }
        
        #judgment_text {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 28px; font-weight: bold; text-shadow: 2px 2px #000; z-index: 20; opacity: 0; pointer-events: none;
            text-align: center; white-space: nowrap;
        }
        
        .cool { color: #0ff; animation: pop 0.2s ease-out; opacity: 1 !important; }
        .good { color: #0f0; animation: pop 0.2s ease-out; opacity: 1 !important; }
        .bad { color: #f00; animation: pop 0.2s ease-out; opacity: 1 !important; }
        .miss { color: #888; animation: pop 0.2s ease-out; opacity: 1 !important; }
        @keyframes pop { 0% { transform: translate(-50%,-40%) scale(0.8); } 50% { transform: translate(-50%,-50%) scale(1.2); } 100% { transform: translate(-50%,-50%) scale(1); } }
        
        #start_btn { padding: 12px 24px; font-size: 16px; background: #f00; color: #fff; border: 3px solid #fff; border-radius: 10px; font-family: 'DotGothic16'; margin-top: 10px; }
    </style>
</head>
<body>

    <img id="preload_img" src="https://i.ibb.co/TDsqJLMY/image.png" style="display:none; position:absolute; width:1px; height:1px;">

    <h1>👿 vs 魔王バンブー 👿</h1>
    <div id="ui_board"><div>SCORE: <span id="score">0</span></div><div id="combo"></div></div>
    <div id="game_area"><div id="judgment_text"></div><div id="target_line"></div></div>
    
    <div id="controls">
        <div class="btn" id="btn_0">⬅️</div>
        <div class="btn" id="btn_1">⬇️</div>
        <div class="btn" id="btn_2">⬆️</div>
        <div class="btn" id="btn_3">➡️</div>
    </div>
    
    <button id="start_btn" onclick="startGame()">👹 覚悟を決めて開始！</button>

    <script>
        // --- ⚙️ 設定 ---
        const BGM_URL = "https://github.com/stnavi2007-cpu/stnv-music/raw/main/STNVEAT%EF%BC%91.mp3";
        
        const BPM = 150; 
        const SCROLL_TIME = 1.6; 
        const OFFSET = 0.35; 
        const NOTE_INTERVAL = 60 / BPM;

        // --- 🧠 変数 ---
        const bgm = new Audio(BGM_URL);
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        let notes = [], score = 0, combo = 0, isPlaying = false, gameTimer, nextNoteTime;

        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const judgeEl = document.getElementById('judgment_text');
        const startBtn = document.getElementById('start_btn');
        const gameArea = document.getElementById('game_area');
        const bambooImgSrc = document.getElementById('preload_img').src;

        // ★最強のマルチタッチ対応処理
        for (let i = 0; i < 4; i++) {
            const btn = document.getElementById(`btn_${i}`);
            
            // pointerdownはスマホの多点タッチを個別に処理できる最強のイベント
            btn.addEventListener('pointerdown', (e) => {
                e.preventDefault(); 
                btn.setPointerCapture(e.pointerId); // 指がボタン外に滑っても追跡
                handleInput(i);
            });

            // ズームなどの余計なスマホ動作を完全に殺す
            btn.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
            btn.addEventListener('contextmenu', e => e.preventDefault());
        }

        function startGame() {
            if (isPlaying) return;
            
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            startBtn.style.display = 'none';
            judgeEl.innerText = "";
            judgeEl.style.opacity = 0; 
            
            isPlaying = true; 
            score = 0; 
            combo = 0;
            notes.forEach(n => n.el.remove()); 
            notes = [];
            updateUI();
            
            nextNoteTime = SCROLL_TIME - OFFSET;
            
            bgm.currentTime = 0;
            bgm.play().catch(e => console.log("Audio Error:", e));
            
            gameTimer = setInterval(update, 1000 / 60);
            
            // 3分(180秒)で強制終了（一発勝負）
            setTimeout(() => { if(isPlaying) endGame(); }, 180000);
        }

        // ★ダウンロード不要！プログラムで直接「ドン！」という太鼓の音を作る処理
        function playHitSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // 和太鼓（キック）のような低い音の波形を作る
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime); // 最初は高め
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1); // 0.1秒で低く落とす
            
            // 音量のアタック（叩いた瞬間）
            gainNode.gain.setValueAtTime(1.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.15); // 0.15秒で音を消す
        }

        function spawn(track, targetTime) {
            const el = document.createElement('img');
            el.src = bambooImgSrc; 
            el.className = `note track-${track}`;
            el.style.top = "-60px"; 
            gameArea.appendChild(el);
            notes.push({ el, track, targetTime, active: true });
        }

        function update() {
            if (!isPlaying) return;
            let currentTime = bgm.currentTime;
            
            if (currentTime > 10 && nextNoteTime < 10) return;
            
            if (currentTime + SCROLL_TIME >= nextNoteTime + OFFSET) {
                if (Math.random() < 0.05) { 
                    // ★バグ修正：絶対に違う列（レーン）に2つ生成されるように式を直しました
                    let t1 = Math.floor(Math.random() * 4);
                    let t2 = (t1 + 1 + Math.floor(Math.random() * 3)) % 4;
                    spawn(t1, nextNoteTime + OFFSET);
                    spawn(t2, nextNoteTime + OFFSET);
                } else if (Math.random() < 0.40) { 
                    spawn(Math.floor(Math.random() * 4), nextNoteTime + OFFSET);
                }
                nextNoteTime += NOTE_INTERVAL;
            }

            const targetY = gameArea.clientHeight - 90;

            notes.forEach(n => {
                if (!n.active) return;
                const progress = 1 - ((n.targetTime - currentTime) / SCROLL_TIME);
                
                n.y = progress * targetY; 
                n.el.style.top = n.y + "px";
                
                // 見逃し処理（ペナルティ）
                if (currentTime > n.targetTime + 0.2) { // 見逃しも早めに判定
                    n.active = false; n.el.style.opacity = 0;
                    combo = 0;
                    score = Math.max(0, score - 50); 
                    showJudge("MISS", "miss"); 
                    updateUI();
                    setTimeout(() => n.el.remove(), 200);
                }
            });
            
            if (currentTime >= bgm.duration - 0.5 && notes.length === 0) {
                endGame();
            }
        }

        function handleInput(track) {
            if (!isPlaying) return;
            
            // ★タップした瞬間に確実に「ドン！」と鳴る
            playHitSound();
            
            let currentTime = bgm.currentTime;
            const target = notes.filter(n => n.track === track && n.active)
                             .sort((a,b) => Math.abs(a.targetTime - currentTime) - Math.abs(b.targetTime - currentTime))[0];
                             
            // ★空打ちペナルティ（顔がいないのに叩いた場合）
            if (!target) {
                combo = 0;
                score = Math.max(0, score - 50); 
                showJudge("MISS", "miss");
                updateUI();
                return;
            }
            
            const diff = Math.abs(currentTime - target.targetTime);
            
            // ★【鬼シビア判定】アーケード並みの厳しさ
            if (diff <= 0.05) {  // 誤差50ミリ秒以内
                combo++;
                score += 100 + (combo * 10); 
                showJudge("COOL!!", "cool"); 
                removeNote(target); 
            } else if (diff <= 0.10) { // 誤差100ミリ秒以内
                combo++;
                score += 50 + (combo * 5);   
                showJudge("GOOD", "good"); 
                removeNote(target); 
            } else if (diff <= 0.15) { // 誤差150ミリ秒以内
                combo = 0;
                score = Math.max(0, score - 30); 
                showJudge("BAD", "bad"); 
                removeNote(target); 
            } else { // 早く叩きすぎた場合
                combo = 0;
                score = Math.max(0, score - 50); 
                showJudge("MISS", "miss"); 
                // 的は消さずにそのまま（焦って連打するとさらに減点される鬼仕様）
            }
            updateUI();
        }

        function removeNote(n) { n.active = false; n.el.remove(); }
        function showJudge(txt, cls) { 
            judgeEl.innerText = txt; 
            judgeEl.className = cls; 
            judgeEl.style.animation = 'none'; 
            judgeEl.offsetHeight; 
            judgeEl.style.animation = null; 
        }
        function updateUI() { 
            scoreEl.innerText = score; 
            comboEl.innerText = combo > 0 ? combo + " COMBO!" : ""; 
        }
        
        function endGame() { 
            isPlaying = false; 
            clearInterval(gameTimer); 
            bgm.pause(); 
            notes.forEach(n => n.el.remove()); 
            notes = [];
            
            // ★一発勝負！やり直すにはブラウザの更新が必要
            judgeEl.innerHTML = `FINISH!<br><span style="font-size: 20px;">最終スコア: ${score}</span><br><span style="font-size: 14px;">※再挑戦はリロード</span>`; 
            judgeEl.className = "cool";
            judgeEl.style.opacity = 1; 
        }
    </script>
</body>
</html>
