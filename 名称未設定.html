<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STNV BEAT - スマホ対応版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        
        body {
            margin: 0; padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'DotGothic16', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; 
            /* 🚫 スマホ特有のジェスチャーを無効化 */
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }
        h1 {
            color: #ffd700;
            text-shadow: 2px 2px #f00;
            margin: 10px 0;
            font-size: 18px;
            letter-spacing: 1px;
        }

        #game_area {
            position: relative;
            width: 90vw; /* スマホの横幅に合わせる */
            max-width: 340px;
            height: 60vh; /* 画面の高さの60% */
            background: #111;
            border: 4px double #0ff;
            border-radius: 10px;
            box-shadow: 0 0 15px #0ff;
            overflow: hidden;
            margin-bottom: 10px;
        }

        #target_line {
            position: absolute;
            bottom: 50px;
            left: 0;
            width: 100%;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-top: 2px dashed #fff;
            border-bottom: 2px dashed #fff;
            z-index: 10;
        }

        .note {
            position: absolute;
            width: 50px;
            height: 50px;
            z-index: 5;
            image-rendering: pixelated;
        }

        /* レーン配置をレスポンシブに */
        .track-0 { left: 5%;   filter: drop-shadow(0 0 5px #ff00ff); }
        .track-1 { left: 28%;  filter: drop-shadow(0 0 5px #00ffff); }
        .track-2 { left: 51%;  filter: drop-shadow(0 0 5px #00ff00); }
        .track-3 { left: 74%;  filter: drop-shadow(0 0 5px #ff0000); }

        #controls {
            display: flex;
            width: 95vw;
            max-width: 360px;
            justify-content: space-around;
            padding-bottom: 20px;
        }
        .btn {
            width: 22vw;
            max-width: 80px;
            height: 22vw;
            max-height: 80px;
            font-size: 24px;
            background: #222;
            border: 2px solid #fff;
            color: #fff;
            border-radius: 15px;
            /* ⚡ タップの反応速度を上げる */
            cursor: pointer;
            box-shadow: 0 4px 0 #555;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 #555;
            background: #444 !important;
        }

        #btn_0 { border-color: #ff00ff; color: #ff00ff; }
        #btn_1 { border-color: #00ffff; color: #00ffff; }
        #btn_2 { border-color: #00ff00; color: #00ff00; }
        #btn_3 { border-color: #ff0000; color: #ff0000; }

        #ui_board {
            display: flex;
            justify-content: space-between;
            width: 90vw;
            max-width: 340px;
            margin-bottom: 5px;
            font-size: 14px;
        }
        #combo { color: #ffd700; font-size: 18px; font-weight: bold; }
        #judgment_text {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            z-index: 20;
            opacity: 0;
            white-space: nowrap;
            pointer-events: none;
        }

        .cool { color: #0ff; animation: pop 0.3s ease-out; opacity: 1 !important; }
        .good { color: #0f0; animation: pop 0.3s ease-out; opacity: 1 !important; }
        .bad { color: #f00; animation: pop 0.3s ease-out; opacity: 1 !important; }
        .miss { color: #888; animation: pop 0.3s ease-out; opacity: 1 !important; }

        @keyframes pop {
            0% { transform: translate(-50%, -40%) scale(0.8); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        #start_btn {
            padding: 12px 24px;
            font-size: 16px;
            background: #f00;
            color: #fff;
            border: 3px solid #fff;
            border-radius: 10px;
            font-family: 'DotGothic16';
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>👿 vs 魔王バンブー 👿</h1>
    <div id="ui_board">
        <div>SCORE: <span id="score">0</span></div>
        <div id="combo"></div>
    </div>

    <div id="game_area">
        <div id="judgment_text"></div>
        <div id="target_line"></div>
    </div>

    <div id="controls">
        <div class="btn" id="btn_0" ontouchstart="handleInput(0, event)" onmousedown="handleInput(0, event)">⬅️</div>
        <div class="btn" id="btn_1" ontouchstart="handleInput(1, event)" onmousedown="handleInput(1, event)">⬇️</div>
        <div class="btn" id="btn_2" ontouchstart="handleInput(2, event)" onmousedown="handleInput(2, event)">⬆️</div>
        <div class="btn" id="btn_3" ontouchstart="handleInput(3, event)" onmousedown="handleInput(3, event)">➡️</div>
    </div>

    <button id="start_btn" onclick="startGame()" disabled>⌛ ロード中...</button>

    <script>
        const TARGET_Y = 250; // 画面の高さに合わせて微調整 
        const BAMBOO_IMG = "https://i.ibb.co/TDsqJLMY/image.png";
        const BGM_URL = "https://github.com/stnavi2007-cpu/stnv-music/raw/refs/heads/main/STNVEAT%EF%BC%91.mp3";
        const SE_URL = "https://taira-komori.jpn.org/sound_os/percussion01/taiko01.mp3"; 

        const BPM = 150;           
        const SCROLL_TIME = 1.6;   
        const OFFSET = 0.35; // スマホは音が遅れがちなので少し大きめに 
        const NOTE_INTERVAL = 60 / BPM; 

        const bgm = new Audio(BGM_URL);
        bgm.preload = "auto";
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let seBuffer = null;

        fetch(SE_URL).then(res => res.arrayBuffer()).then(data => audioCtx.decodeAudioData(data)).then(buf => seBuffer = buf);

        let notes = [];
        let score = 0, combo = 0, isPlaying = false, gameTimer, nextNoteTime, songDuration = 0;

        bgm.addEventListener("canplaythrough", () => {
            if (!isPlaying) { startBtn.disabled = false; startBtn.innerText = "👹 タップで開始！"; songDuration = bgm.duration; }
        }, { once: true });

        function startGame() {
            if (isPlaying) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            bgm.currentTime = 0;
            bgm.play().then(() => {
                isPlaying = true; score = 0; combo = 0;
                notes.forEach(n => n.el.remove()); notes = [];
                updateUI(); startBtn.style.display = 'none'; judgeEl.innerText = "";
                nextNoteTime = SCROLL_TIME - OFFSET; 
                gameTimer = setInterval(update, 1000 / 60);
            });
            bgm.onended = endGame;
        }

        function playHitSound() {
            if (!seBuffer) return;
            const source = audioCtx.createBufferSource();
            source.buffer = seBuffer;
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 1.5;
            source.connect(gainNode); gainNode.connect(audioCtx.destination);
            source.start(0);
        }

        function spawn(track, targetTime) {
            const el = document.createElement('img');
            el.src = BAMBOO_IMG; el.className = `note track-${track}`;
            el.style.top = "-60px"; gameArea.appendChild(el);
            notes.push({ el, track, targetTime, active: true });
        }

        function update() {
            if (!isPlaying) return;
            const currentTime = bgm.currentTime;
            if (currentTime + 1.5 < songDuration && currentTime + SCROLL_TIME >= nextNoteTime + OFFSET) {
                if (Math.random() < 0.08) { spawn(Math.floor(Math.random() * 4), nextNoteTime + OFFSET); spawn((Math.floor(Math.random() * 3)+1)%4, nextNoteTime + OFFSET); }
                else if (Math.random() < 0.5) { spawn(Math.floor(Math.random() * 4), nextNoteTime + OFFSET); }
                nextNoteTime += NOTE_INTERVAL;
            }
            notes.forEach(n => {
                if (!n.active) return;
                const progress = 1 - ((n.targetTime - currentTime) / SCROLL_TIME);
                const y = progress * TARGET_Y;
                n.y = y; n.el.style.top = y + "px";
                if (currentTime > n.targetTime + 0.3) {
                    n.active = false; n.el.style.opacity = 0;
                    if (combo > 0) { combo = 0; showJudge("MISS...", "miss"); updateUI(); }
                    setTimeout(() => n.el.remove(), 200);
                }
            });
        }

        function handleInput(track, event) {
            if (!isPlaying) return;
            if (event) event.preventDefault(); // ズームやスクロールを防止
            playHitSound();
            const currentTime = bgm.currentTime;
            const target = notes.filter(n => n.track === track && n.active).sort((a,b) => Math.abs(a.targetTime - currentTime) - Math.abs(b.targetTime - currentTime))[0];
            if (!target) return;
            const diff = Math.abs(currentTime - target.targetTime);
            if (diff < 0.22) { score += 100; combo++; showJudge("COOL!!", "cool"); removeNote(target); }
            else if (diff < 0.38) { score += 50; combo++; showJudge("GOOD", "good"); removeNote(target); }
            else if (diff < 0.55) { score += 10; combo = 0; showJudge("BAD", "bad"); target.active = false; target.el.style.opacity = 0.3; }
            updateUI();
        }

        function removeNote(n) { n.active = false; n.el.remove(); }
        function showJudge(txt, cls) { judgeEl.innerText = txt; judgeEl.className = cls; judgeEl.style.animation = 'none'; judgeEl.offsetHeight; judgeEl.style.animation = null; }
        function updateUI() { scoreEl.innerText = score; comboEl.innerText = combo > 0 ? combo + " COMBO!" : ""; }
        function endGame() { isPlaying = false; clearInterval(gameTimer); bgm.pause(); notes.forEach(n => n.el.remove()); startBtn.style.display = 'block'; startBtn.innerText = "リベンジ！"; judgeEl.innerText = "FINISH!"; judgeEl.className = "cool"; }

        const scoreEl = document.getElementById('score'), comboEl = document.getElementById('combo'), judgeEl = document.getElementById('judgment_text'), startBtn = document.getElementById('start_btn'), gameArea = document.getElementById('game_area');
    </script>
</body>
</html>
