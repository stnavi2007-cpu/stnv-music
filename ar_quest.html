<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STNV AR QUEST</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; margin: 0; overflow: hidden; text-align: center; }
        
        #video_container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            background: #000; 
            display: none; 
        }
        
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            /* 🌟 ズーム(クロップ)を一ミリもさせない設定 */
            object-fit: contain; 
            /* 🌟 画面を水平反転（完全な鏡表示） */
            transform: scaleX(-1); 
        }
        
        video { display: none; }
        
        /* 🌟 殺人現場の人型点線ガイド（下部に配置） */
        #body_guide {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            max-height: 60%;
            opacity: 0.6;
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        .ui-layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .header { display: flex; justify-content: space-between; align-items: flex-start; }
        .status-box { background: rgba(0,0,0,0.8); border: 2px solid #0ff; padding: 10px; border-radius: 10px; min-width: 100px; box-shadow: 0 0 10px #0ff; }
        
        #score_display { font-size: 40px; color: #0f0; text-shadow: 0 0 10px #0f0; font-weight: bold; }
        #time_display { font-size: 40px; color: #ff0; text-shadow: 0 0 10px #ff0; font-weight: bold; }
        
        .overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 100; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            box-sizing: border-box; 
            text-align: center; 
        }
        .btn { padding: 15px 30px; background: #f00; color: #fff; border: 2px solid #fff; border-radius: 10px; font-family: 'DotGothic16'; font-size: 20px; cursor: pointer; margin-top: 15px; width: 85%; max-width: 300px; box-shadow: 0 4px #900; pointer-events: auto; }
        .btn:active { transform: translateY(4px); box-shadow: 0 0 #900; }
        input { width: 80%; max-width: 300px; padding: 12px; margin: 5px 0; background: #222; color: #fff; border: 1px solid #0ff; text-align: center; font-family: 'DotGothic16'; border-radius: 5px; font-size: 16px; pointer-events: auto; }
        
        #download_link { background: #0ff; color: #000; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 20px; pointer-events: auto; display: none; }
    </style>
</head>
<body>

<div id="start_screen" class="overlay">
    <h1 style="color:#ffd700; text-shadow: 2px 2px #f00; margin-bottom: 5px;">🔥 AR BATTLE QUEST 🔥</h1>
    <p style="color:#0ff; font-size:14px; margin-top:0;">己の拳(全身)で魔王をぶっ叩け！</p>
    <div style="background: rgba(255,0,0,0.2); padding: 10px; border: 1px solid #f00; border-radius: 5px; margin-bottom: 15px; font-size: 12px; text-align:left;">
        【ルール】<br>
        ① スマホを壁に立てかけろ！<br>
        ② 画面の下にある点線に体を合わせろ！<br>
        ③ 現れるターゲットを直接「手」で殴れ！
    </div>
    <input type="text" id="play_id" placeholder="ダンサーID">
    <input type="password" id="play_pass" placeholder="パスワード">
    <button class="btn" onclick="loginAndStart()">カメラ起動 ＆ BATTLE開始</button>
</div>

<div id="video_container">
    <video id="input_video" autoplay playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    
    <img id="body_guide" src="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 200'%3E%3Cpath fill='none' stroke='%230ff' stroke-width='3' stroke-dasharray='6,6' stroke-linecap='round' stroke-linejoin='round' d='M 50 15 C 65 15, 65 40, 50 45 C 70 45, 85 60, 90 90 C 92 105, 80 105, 75 90 C 70 70, 65 70, 65 100 C 65 135, 75 185, 75 195 C 75 200, 60 200, 60 195 C 60 165, 55 125, 50 125 C 45 125, 40 165, 40 195 C 40 200, 25 200, 25 195 C 25 185, 35 135, 35 100 C 35 70, 30 70, 25 90 C 20 105, 8 105, 10 90 C 15 60, 30 45, 50 45 C 35 40, 35 15, 50 15 Z' /%3E%3C/svg%3E">

    <div class="ui-layer">
        <div class="header">
            <div class="status-box">
                <div style="font-size:12px; color:#ccc;">HIT COUNT</div>
                <div id="score_display">0</div>
            </div>
            <div class="status-box">
                <div style="font-size:12px; color:#ccc;">TIME LIMIT</div>
                <div id="time_display">60</div>
            </div>
        </div>
        </div>
</div>

<div id="result_overlay" class="overlay" style="display:none;">
    <h1 style="color:#ffd700; text-shadow: 0 0 10px #f00;">BATTLE FINISHED!!</h1>
    <div style="font-size:24px; margin-bottom:10px;">叩きのめした数：<span id="final_score" style="color:#0f0; font-size:50px;">0</span> 発</div>
    <div id="save_status" style="color:#0ff; margin-bottom:20px;">データ送信中...</div>
    
    <p style="font-size:14px; color:#ccc;">👇 バトルの記録（動画）を保存して提出せよ！</p>
    <a id="download_link">🎥 バトル動画をダウンロード</a>
    
    <button class="btn" style="background:#333; border-color:#777; margin-top:30px;" onclick="location.reload()">もう一度挑戦</button>
</div>

<script>
// ★GASへの送信URL
const GAS_URL = "https://script.google.com/macros/s/AKfycbxlfASNPpPyVwYXdB6kamPVNrXfbI9MTqcBvuVeP54itKd7_n5sj90k4rSfkf7EJUV0/exec";

let pose, camera, videoElement, canvasElement, canvasCtx;
let gameState = "SETUP"; 
let score = 0;
let timeLeft = 60; // 🌟 60秒
let timerInterval;

let mediaRecorder, recordedChunks = [];
let videoExtension = 'mp4'; 
let videoMimeType = '';

// 🌟 小さめのターゲット設定
let target = { x: 0.5, y: 0.5, radius: 0.05, active: false };
let playId = "", playPass = "";

function speak(text) {
    window.speechSynthesis.cancel();
    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = "ja-JP";
    uttr.rate = 1.3;
    window.speechSynthesis.speak(uttr);
}

function loginAndStart() {
    playId = document.getElementById('play_id').value;
    playPass = document.getElementById('play_pass').value;
    
    if(!playId || !playPass) { alert("IDとパスワードを入れてくれ！"); return; }

    const unlockUttr = new SpeechSynthesisUtterance("");
    unlockUttr.volume = 0;
    window.speechSynthesis.speak(unlockUttr);

    document.getElementById('start_screen').style.display = 'none';
    document.getElementById('video_container').style.display = 'block';

    initAI();
}

function initAI() {
    videoElement = document.getElementById('input_video');
    canvasElement = document.getElementById('output_canvas');
    canvasCtx = canvasElement.getContext('2d');

    pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });
    
    pose.setOptions({ 
        modelComplexity: 0, 
        smoothLandmarks: true, 
        minDetectionConfidence: 0.5, 
        minTrackingConfidence: 0.5 
    });
    pose.onResults(onResults);

    camera = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        // 広角を維持するための解像度指定
        width: { ideal: 1280 }, height: { ideal: 720 }
    });
    
    camera.start().catch(err => {
        alert("カメラの起動に失敗しました。ブラウザの再読み込みをして、カメラを許可してください！");
    });
}

function spawnTarget() {
    target.x = 0.1 + Math.random() * 0.8;
    target.y = 0.1 + Math.random() * 0.8;
    target.active = true;
}

function onResults(results) {
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    
    // 画像を描画 (CSSで反転させているのでここでは普通に描画)
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
    
    if (results.poseLandmarks) {
        // 🌟 緑の線は一切描画しない！ 両手首の赤い点だけ！
        drawLandmarks(canvasCtx, [results.poseLandmarks[15], results.poseLandmarks[16]], {
            color: '#FF0000', 
            lineWidth: 5
        }); 
        
        processGame(results.poseLandmarks);
    }
    
    // 🌟 「魔」ターゲットの高画質・ベクター描画
    if (target.active && gameState !== "FINISHED") {
        const px = target.x * canvasElement.width;
        const py = target.y * canvasElement.height;
        const pr = target.radius * canvasElement.width;
        
        // 赤い円
        canvasCtx.beginPath();
        canvasCtx.arc(px, py, pr, 0, 2 * Math.PI);
        canvasCtx.fillStyle = 'rgba(255, 0, 0, 0.7)';
        canvasCtx.fill();
        canvasCtx.lineWidth = 4;
        canvasCtx.strokeStyle = '#fff';
        canvasCtx.stroke();
        
        // 魔の文字（CSSでキャンバスが反転するので、ここで逆向きに描画して相殺する）
        canvasCtx.save();
        canvasCtx.translate(px, py);
        canvasCtx.scale(-1, 1); 
        canvasCtx.fillStyle = '#fff';
        canvasCtx.font = `bold ${pr * 1.2}px 'DotGothic16', sans-serif`;
        canvasCtx.textAlign = "center";
        canvasCtx.textBaseline = "middle";
        canvasCtx.fillText("魔", 0, 0);
        canvasCtx.restore();
    }
    
    canvasCtx.restore();
}

function processGame(landmarks) {
    if (gameState === "SETUP") {
        gameState = "PLAYING";
        spawnTarget();
        speak("バトルスタート！！");
        
        // 🌟 点線ガイドを表示
        document.getElementById('body_guide').style.display = 'block';
        
        try {
            const stream = canvasElement.captureStream(30);
            let options = {};
            if (MediaRecorder.isTypeSupported('video/mp4')) {
                options = { mimeType: 'video/mp4' };
                videoExtension = 'mp4';
                videoMimeType = 'video/mp4';
            } else if (MediaRecorder.isTypeSupported('video/webm')) {
                options = { mimeType: 'video/webm' };
                videoExtension = 'webm';
                videoMimeType = 'video/webm';
            }

            mediaRecorder = new MediaRecorder(stream, options);
            recordedChunks = [];
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = saveVideo;
            mediaRecorder.start();
        } catch(err) {
            console.log("録画エラー: ", err);
        }
        
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('time_display').innerText = timeLeft;
            if (timeLeft <= 0) finishGame();
        }, 1000);
    } 
    else if (gameState === "PLAYING") {
        const leftWrist = landmarks[15];
        const rightWrist = landmarks[16];
        
        const distLeft = Math.hypot(leftWrist.x - target.x, leftWrist.y - target.y);
        const distRight = Math.hypot(rightWrist.x - target.x, rightWrist.y - target.y);
        
        // 🌟 1タップ1ポイント！触れたら即座に消す！
        if (target.active && (distLeft < target.radius || distRight < target.radius)) {
            target.active = false; // 先に消して重複防止
            score++;
            document.getElementById('score_display').innerText = score;
            speak("撃破！");
            
            setTimeout(spawnTarget, 300);
        }
    }
}

function finishGame() {
    gameState = "FINISHED";
    clearInterval(timerInterval);
    speak("終了！よくやった！");

    document.getElementById('body_guide').style.display = 'none';
    
    if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
    
    document.getElementById('result_overlay').style.display = "flex";
    document.getElementById('final_score').innerText = score;
    
    fetch(`${GAS_URL}?action=plank_clear&uid=${playId}&pass=${playPass}&score=${score}`)
        .then(res => res.json())
        .then(data => {})
        .catch(err => {});
}

function saveVideo() {
    const blob = new Blob(recordedChunks, { type: videoMimeType || 'video/mp4' });
    const url = URL.createObjectURL(blob);
    const link = document.getElementById('download_link');
    link.href = url;
    link.download = `STNV_AR_BATTLE_${new Date().getTime()}.${videoExtension}`;
    link.style.display = "inline-block"; 
}
</script>
</body>
</html>
