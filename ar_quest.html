<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STNV AR SQUATS QUEST</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'DotGothic16', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            text-align: center; 
        }
        
        /* 🌟 レトロモニター風の走査線（スキャンライン）エフェクト */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 9999;
            pointer-events: none;
        }
        
        #video_container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            background: #000; 
            display: none; 
        }
        
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            transform: scaleX(-1); 
        }
        
        video { display: none; }
        
        /* 人型点線ガイド */
        #body_guide {
            position: absolute;
            bottom: 8%; 
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 50%;
            opacity: 0.6;
            pointer-events: none;
            z-index: 5;
            display: none;
            filter: drop-shadow(0px 0px 5px #0ff); 
        }

        .ui-layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .header { display: flex; justify-content: space-between; align-items: flex-start; }
        
        /* 🌟 ステータスボックスを半透明にし、裏のコインを見やすく */
        .status-box { 
            background: rgba(0, 0, 0, 0.3); 
            border: 4px solid rgba(0, 255, 255, 0.6); 
            padding: 10px 15px; 
            border-radius: 0; 
            min-width: 100px; 
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5), inset 0 0 15px rgba(0,255,255,0.3); 
        }
        
        #score_display { font-size: 45px; color: #0f0; text-shadow: 3px 3px 0 #000, 0 0 10px #0f0; font-weight: bold; }
        #time_display { font-size: 45px; color: #ff0; text-shadow: 3px 3px 0 #000, 0 0 10px #ff0; font-weight: bold; }
        
        .overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle, rgba(10,30,40,0.95) 0%, rgba(0,0,0,0.95) 100%);
            z-index: 100; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            box-sizing: border-box; 
            text-align: center; 
        }
        
        .btn { 
            padding: 15px 30px; 
            background: #d32f2f; 
            color: #fff; 
            border: 4px solid #fff; 
            border-radius: 0; 
            font-family: 'DotGothic16'; 
            font-size: 22px; 
            font-weight: bold;
            cursor: pointer; 
            margin-top: 25px; 
            width: 85%; 
            max-width: 320px; 
            box-shadow: inset -4px -4px 0px 0px rgba(0,0,0,0.4), 4px 4px 0px 0px #000, 0 0 15px #f00; 
            text-shadow: 2px 2px 0 #000;
            pointer-events: auto; 
            transition: all 0.1s;
            text-transform: uppercase;
        }
        .btn:active { 
            transform: translate(4px, 4px); 
            box-shadow: inset -2px -2px 0px 0px rgba(0,0,0,0.4), 0px 0px 0px 0px #000, 0 0 5px #f00; 
        }
        
        input { 
            width: 80%; 
            max-width: 300px; 
            padding: 15px; 
            margin: 8px 0; 
            background: #000; 
            color: #0ff; 
            border: 3px solid #0ff; 
            text-align: center; 
            font-family: 'DotGothic16'; 
            border-radius: 0; 
            font-size: 18px; 
            pointer-events: auto; 
            box-shadow: 4px 4px 0 #000;
        }
        input:focus {
            outline: none;
            background: #001a1a;
            box-shadow: 4px 4px 0 #000, 0 0 10px #0ff;
        }
        input::placeholder { color: rgba(0, 255, 255, 0.4); }
        
        #download_link { 
            background: #ffb300; 
            color: #000; 
            padding: 15px 30px; 
            border: 4px solid #fff;
            border-radius: 0; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 18px;
            margin-top: 20px; 
            pointer-events: auto; 
            display: none; 
            box-shadow: inset -4px -4px 0px 0px rgba(0,0,0,0.3), 4px 4px 0px 0px #000; 
            text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
        }
        #download_link:active {
            transform: translate(4px, 4px);
            box-shadow: inset -2px -2px 0px 0px rgba(0,0,0,0.3), 0px 0px 0px 0px #000;
        }
        
        #center_message, #warning_message {
            position: absolute; 
            top: 40%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 24px; 
            width: 90%;
            text-align: center;
            white-space: normal; 
            z-index: 50; 
            pointer-events: none; 
            font-weight: bold;
        }

        #center_message {
            display: none; 
            color: #fff; 
            text-shadow: 4px 4px 0 #000, 0 0 20px #0ff; 
            transition: font-size 0.2s ease;
        }

        #warning_message {
            display: none; 
            color: #f00; 
            background: #000;
            padding: 15px;
            border-radius: 0;
            border: 4px solid #f00;
            box-shadow: 6px 6px 0 #000, 0 0 20px #f00;
            text-shadow: 2px 2px 0 #000;
            animation: warningBlink 0.5s infinite alternate;
        }
        
        @keyframes warningBlink {
            0% { border-color: #f00; box-shadow: 6px 6px 0 #000, 0 0 20px #f00; }
            100% { border-color: #fff; box-shadow: 6px 6px 0 #000, 0 0 40px #f00; }
        }
        
        h1 {
            color: #ffd700; 
            text-shadow: 4px 4px 0 #000, 0 0 15px #f00; 
            margin-bottom: 5px;
            font-size: 32px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="start_screen" class="overlay">
    <h1>🔥 Double SQUATS 🔥</h1>
    <p style="color:#0ff; font-size:16px; margin-top:0; text-shadow: 2px 2px 0 #000;">45秒で選手交代！協力してコインを稼げ！</p>
    <input type="text" id="play_id" placeholder="ダンサーID">
    <input type="password" id="play_pass" placeholder="パスワード">
    <button class="btn" onclick="loginAndStart()">スクワット開始</button>
</div>

<div id="video_container">
    <video id="input_video" autoplay playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    
    <img id="body_guide" src="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 200'%3E%3Ccircle cx='50' cy='25' r='15' fill='none' stroke='%230ff' stroke-width='2' stroke-dasharray='4,4' /%3E%3Cpath fill='none' stroke='%230ff' stroke-width='2' stroke-dasharray='4,4' stroke-linejoin='round' d='M 35 40 L 65 40 L 85 90 L 75 100 L 65 60 L 65 110 L 70 190 L 55 190 L 50 120 L 45 190 L 30 190 L 35 110 L 35 60 L 25 100 L 15 90 Z' /%3E%3C/svg%3E">

    <div id="center_message">全身を枠に入れて！</div>
    
    <div id="warning_message">前に出すぎ！後ろに下がれ！</div>

    <div class="ui-layer">
        <div class="header">
            <div class="status-box">
                <div style="font-size:14px; color:#0ff; text-shadow: 1px 1px 0 #000;">COIN GET</div>
                <div id="score_display">0</div>
            </div>
            <div class="status-box">
                <div style="font-size:14px; color:#0ff; text-shadow: 1px 1px 0 #000;">TIME LIMIT</div>
                <div id="time_display">90</div>
            </div>
        </div>
    </div>
</div>

<div id="result_overlay" class="overlay" style="display:none;">
    <h1>QUEST FINISHED!!</h1>
    <div style="font-size:26px; margin-bottom:10px; text-shadow: 2px 2px 0 #000;">獲得したコイン：<br><span id="final_score" style="color:#0f0; font-size:60px; text-shadow: 4px 4px 0 #000, 0 0 15px #0f0;">0</span> 枚</div>
    <div id="save_status" style="color:#0ff; margin-bottom:20px; text-shadow: 2px 2px 0 #000;">データ送信中...</div>
    
    <p style="font-size:16px; color:#fff; text-shadow: 2px 2px 0 #000; margin-top: 20px;">👇 記録を動画に保存して<br>ギルドに提出せよ！</p>
    <a id="download_link">🎥 スクワット動画を保存</a>
    
    <button class="btn" style="background:#555; margin-top:40px;" onclick="location.reload()">もう一度挑戦</button>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxlfASNPpPyVwYXdB6kamPVNrXfbI9MTqcBvuVeP54itKd7_n5sj90k4rSfkf7EJUV0/exec";

let pose, camera, videoElement, canvasElement, canvasCtx;
let gameState = "SETUP"; 
let score = 0;
let timeLeft = 90; 
let timerInterval;
let countdownValue = 5;
let countdownTimer;

let mediaRecorder, recordedChunks = [];
let videoExtension = 'mp4'; 
let videoMimeType = '';

let target = { x: 0.5, y: 0.5, radius: 0.06, active: false };
let playId = "", playPass = "";
let spawnTop = true; 

// 🌟 リレー用の進行フラグ
let hasRelayed = false;

// ズル防止用の基準サイズ
let baseShoulderWidth = 0;
let isTooClose = false;

// Safariでの時間遅延（もっさり）対策用の変数
let startTimeMillis = 0;
let exactTimeLeft = 90.0;
let lastUpdateMillis = 0;

// オーディオコンテキスト
let audioCtx;
let bgmInterval;
let beatStep = 0;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playCoinSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(987.77, audioCtx.currentTime); 
    osc.frequency.setValueAtTime(1318.51, audioCtx.currentTime + 0.08); 
    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.3);
}

function playKick() {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.15);
}

function playHat() {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(5000, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.05);
}

function startBGM() {
    beatStep = 0;
    bgmInterval = setInterval(() => {
        if (gameState === "PLAYING" && !isTooClose) {
            if (beatStep % 4 === 0) playKick();
            if (beatStep % 4 === 2) playHat();  
            beatStep++;
        }
    }, 125); 
}

function loginAndStart() {
    playId = document.getElementById('play_id').value;
    playPass = document.getElementById('play_pass').value;
    
    if(!playId || !playPass) { alert("IDとパスワードを入れてくれ！"); return; }

    initAudio(); 

    document.getElementById('start_screen').style.display = 'none';
    document.getElementById('video_container').style.display = 'block';

    initAI();
}

function initAI() {
    videoElement = document.getElementById('input_video');
    canvasElement = document.getElementById('output_canvas');
    canvasCtx = canvasElement.getContext('2d');

    pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });
    
    pose.setOptions({ 
        modelComplexity: 0, 
        smoothLandmarks: true, 
        minDetectionConfidence: 0.5, 
        minTrackingConfidence: 0.5 
    });
    pose.onResults(onResults);

    camera = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: { ideal: 1280 }, height: { ideal: 720 }
    });
    
    camera.start().then(() => {
        calibrate(); // 🌟 最初のキャリブレーションを実行
    }).catch(err => {
        alert("カメラの起動に失敗しました。ブラウザの再読み込みをして、カメラを許可してください！");
    });
}

// 🌟 キャリブレーション（人型合わせ）を関数化し、最初と45秒の交代時に呼び出す
function calibrate() {
    gameState = "CALIBRATING";
    document.getElementById('body_guide').style.display = 'block';
    const msg = document.getElementById('center_message');
    msg.style.display = 'block';
    msg.style.fontSize = "24px";
    
    // 時間が45秒以下なら「交代！」のメッセージにする
    if (timeLeft <= 45) {
        msg.innerText = "交代！枠に入れ！";
    } else {
        msg.innerText = "全身を枠に入れて！";
    }
    
    // 🌟 肩幅の基準をリセット（新しい人の体格を覚え直すため）
    baseShoulderWidth = 0; 
}

function spawnTarget() {
    target.x = 0.1 + Math.random() * 0.8;
    
    if (Math.random() < 0.7) {
        spawnTop = !spawnTop; 
    } else {
        spawnTop = Math.random() < 0.5;
    }

    if (spawnTop) {
        target.y = 0.25 + Math.random() * 0.15; 
    } else {
        target.y = 0.75 + Math.random() * 0.15; 
    }
    
    target.active = true;
}

function onResults(results) {
    if (canvasElement.width !== results.image.width) {
        canvasElement.width = results.image.width;
        canvasElement.height = results.image.height;
    }

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
    
    if (results.poseLandmarks) {
        const trackedPoints = [15, 16];
        canvasCtx.fillStyle = '#FF0000';
        trackedPoints.forEach(idx => {
            const pt = results.poseLandmarks[idx];
            if (pt && pt.visibility > 0.5) {
                canvasCtx.beginPath();
                canvasCtx.arc(pt.x * canvasElement.width, pt.y * canvasElement.height, 12, 0, 2 * Math.PI);
                canvasCtx.fill();
            }
        });
        
        processGame(results.poseLandmarks);
    }
    
    if (target.active && gameState === "PLAYING") {
        const px = target.x * canvasElement.width;
        const py = target.y * canvasElement.height;
        const pr = target.radius * canvasElement.width;
        
        canvasCtx.globalAlpha = isTooClose ? 0.3 : 1.0;

        canvasCtx.beginPath();
        canvasCtx.arc(px, py, pr, 0, 2 * Math.PI);
        canvasCtx.fillStyle = '#FFD700'; 
        canvasCtx.fill();
        canvasCtx.lineWidth = 3;
        canvasCtx.strokeStyle = '#FFA500'; 
        canvasCtx.stroke();
        
        canvasCtx.beginPath();
        canvasCtx.arc(px, py, pr * 0.7, 0, 2 * Math.PI);
        canvasCtx.lineWidth = 2;
        canvasCtx.strokeStyle = '#FFA500';
        canvasCtx.stroke();
        
        canvasCtx.save();
        canvasCtx.translate(px, py);
        canvasCtx.scale(-1, 1); 
        canvasCtx.fillStyle = '#FFA500';
        canvasCtx.font = `bold ${pr * 1.1}px sans-serif`;
        canvasCtx.textAlign = "center";
        canvasCtx.textBaseline = "middle";
        canvasCtx.fillText("★", 0, pr * 0.05);
        canvasCtx.restore();
        
        canvasCtx.globalAlpha = 1.0;
    }

    if (gameState === "PLAYING") {
        canvasCtx.save();
        canvasCtx.scale(-1, 1);
        canvasCtx.translate(-canvasElement.width, 0);

        canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        canvasCtx.fillRect(15, 15, 200, 60);
        canvasCtx.fillStyle = '#0f0';
        canvasCtx.font = "bold 30px 'DotGothic16', sans-serif";
        canvasCtx.textAlign = "left";
        canvasCtx.fillText("SCORE: " + score, 25, 55);

        canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        canvasCtx.fillRect(canvasElement.width - 215, 15, 200, 60);
        canvasCtx.fillStyle = '#ff0';
        canvasCtx.font = "bold 30px 'DotGothic16', sans-serif";
        canvasCtx.textAlign = "right";
        canvasCtx.fillText("TIME: " + timeLeft, canvasElement.width - 25, 55);

        canvasCtx.restore();
    }
    
    canvasCtx.restore();
}

function processGame(landmarks) {
    const pointsToCheck = [landmarks[11], landmarks[12], landmarks[27], landmarks[28]];
    const allVisibleAndInFrame = pointsToCheck.every(pt => 
        pt && pt.visibility > 0.5 && 
        pt.x > 0.1 && pt.x < 0.9 && 
        pt.y > 0.1 && pt.y < 0.95
    );

    const msg = document.getElementById('center_message');

    if (gameState === "CALIBRATING") {
        if (allVisibleAndInFrame) {
            gameState = "COUNTDOWN";
            // 🌟 最初のスタートは5秒、交代時は3秒でカウントダウン
            startCountdown((timeLeft <= 45) ? 3 : 5);
        } else {
            msg.style.fontSize = "24px";
            msg.innerText = (timeLeft <= 45) ? "交代！枠に入れ！" : "全身を枠に入れて！";
        }
    } 
    else if (gameState === "COUNTDOWN") {
        if (!allVisibleAndInFrame) {
            clearInterval(countdownTimer);
            calibrate(); 
        }
    }
    else if (gameState === "PLAYING") {
        const leftShoulder = landmarks[11];
        const rightShoulder = landmarks[12];
        if (leftShoulder && rightShoulder) {
            const currentWidth = Math.abs(leftShoulder.x - rightShoulder.x);
            
            if (baseShoulderWidth === 0) baseShoulderWidth = currentWidth;

            // 🌟 肩幅の判定を少し甘め（1.20倍）にして交代時のエラーを防ぐ
            if (currentWidth > baseShoulderWidth * 1.20) {
                isTooClose = true;
                document.getElementById('warning_message').style.display = 'block';
            } else {
                isTooClose = false;
                document.getElementById('warning_message').style.display = 'none';
            }
        }

        const trackedPoints = [15, 16]; 
        
        if (target.active && !isTooClose) {
            let hit = false;
            trackedPoints.forEach(idx => {
                const pt = landmarks[idx];
                if (pt && pt.visibility > 0.5) {
                    const dist = Math.hypot(pt.x - target.x, pt.y - target.y);
                    if (dist < target.radius) hit = true;
                }
            });

            if (hit) {
                target.active = false;
                score++;
                document.getElementById('score_display').innerText = score;
                playCoinSound();
                setTimeout(spawnTarget, 200);
            }
        }
    }
}

// 🌟 カウントダウン秒数を引数で受け取るように変更
function startCountdown(seconds) {
    countdownValue = seconds;
    const msg = document.getElementById('center_message');
    msg.style.fontSize = "150px"; 
    msg.innerText = countdownValue;
    
    countdownTimer = setInterval(() => {
        if (gameState !== "COUNTDOWN") {
            clearInterval(countdownTimer);
            return;
        }

        countdownValue--;
        if (countdownValue > 0) {
            msg.innerText = countdownValue;
        } else {
            clearInterval(countdownTimer);
            msg.style.display = 'none';
            document.getElementById('body_guide').style.display = 'none';
            startGame();
        }
    }, 1000);
}

function startGame() {
    gameState = "PLAYING";
    
    // ターゲットがなければ出す（再開時にもすぐ出現）
    if (!target.active) spawnTarget();
    startBGM(); 
    
    // 🌟 録画の開始は「最初の90秒の時」だけ実行する（途切れさせないため）
    if (timeLeft === 90 && !hasRelayed) {
        exactTimeLeft = 90.0;
        try {
            const stream = canvasElement.captureStream(30);
            let options = {};
            if (MediaRecorder.isTypeSupported('video/mp4')) {
                options = { mimeType: 'video/mp4' };
                videoExtension = 'mp4';
                videoMimeType = 'video/mp4';
            } else if (MediaRecorder.isTypeSupported('video/webm')) {
                options = { mimeType: 'video/webm' };
                videoExtension = 'webm';
                videoMimeType = 'video/webm';
            }

            mediaRecorder = new MediaRecorder(stream, options);
            recordedChunks = [];
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = saveVideo;
            mediaRecorder.start();
        } catch(err) {
            console.log("録画エラー: ", err);
        }
    }
    
    lastUpdateMillis = Date.now();

    timerInterval = setInterval(() => {
        let now = Date.now();
        let deltaTime = (now - lastUpdateMillis) / 1000.0; 
        lastUpdateMillis = now;

        if (!isTooClose) {
            exactTimeLeft -= deltaTime;
            timeLeft = Math.ceil(exactTimeLeft);
            if (timeLeft < 0) timeLeft = 0;
            
            document.getElementById('time_display').innerText = timeLeft;

            // 🌟 【親子リレー交代システム】45秒になった瞬間に一時停止してキャリブレーションへ！
            if (timeLeft <= 45 && !hasRelayed) {
                hasRelayed = true; // 1回だけ発動させるフラグ
                clearInterval(timerInterval);
                clearInterval(bgmInterval);
                target.active = false; // 今出ているコインを消す
                calibrate(); // キャリブレーション状態に移行
                return; // タイマー処理をここで抜ける
            }

            if (timeLeft <= 0) finishGame();
        }
    }, 100); 
}

function finishGame() {
    gameState = "FINISHED";
    clearInterval(timerInterval);
    clearInterval(bgmInterval); 
    document.getElementById('warning_message').style.display = 'none';

    if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
    
    document.getElementById('result_overlay').style.display = "flex";
    document.getElementById('final_score').innerText = score;
    
    const safeId = encodeURIComponent(playId);
    const safePass = encodeURIComponent(playPass);
    const requestUrl = `${GAS_URL}?action=squat_clear&uid=${safeId}&pass=${safePass}&score=${score}`;

    fetch(requestUrl, {
        method: 'GET',
        mode: 'no-cors' 
    })
    .then(() => { 
        document.getElementById('save_status').innerText = "データ送信完了！";
        console.log("スコア送信完了！"); 
    })
    .catch(err => { 
        document.getElementById('save_status').innerText = "通信エラー！";
        console.error("通信エラー", err); 
    });
}

function saveVideo() {
    const blob = new Blob(recordedChunks, { type: videoMimeType || 'video/mp4' });
    const url = URL.createObjectURL(blob);
    const link = document.getElementById('download_link');
    link.href = url;
    link.download = `STNV_AR_SQUAT_${new Date().getTime()}.${videoExtension}`;
    link.style.display = "inline-block"; 
}
</script>
