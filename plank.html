<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STNV AI PLANK</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Noto+Sans+JP:wght@700;900&display=swap');
        
        body { 
            background: #000; color: #fff; 
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif; 
            margin: 0; overflow: hidden; text-align: center; 
            touch-action: manipulation; 
        }
        
        #video_container { position: relative; width: 100vw; height: 100vh; background: #111; display: none; box-shadow: inset 0 0 50px rgba(0,255,255,0.1); }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: block; }
        
        .header { display: flex; justify-content: space-between; width: 100%; position: absolute; top: 20px; left: 0; padding: 0 30px; box-sizing: border-box; }
        .status-box { background: rgba(0, 20, 30, 0.8); border: 2px solid #0ff; padding: 15px 25px; border-radius: 12px; min-width: 180px; box-shadow: 0 0 20px rgba(0,255,255,0.4); backdrop-filter: blur(4px); }
        .status-title { font-size: 16px; color: #0ff; font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; }
        #timer { font-size: 55px; font-weight: 900; color: #ff0; text-shadow: 0 0 15px #ff0; transition: color 0.2s, text-shadow 0.2s; line-height: 1; }
        #ng_countdown { font-size: 55px; font-weight: 900; color: #f00; text-shadow: 0 0 15px #f00; line-height: 1; }

        /* 🌟 メッセージエリアを画面の「真下」へ移動 */
        .message-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 95%; text-align: center; }
        
        #msg_area { font-size: 45px; font-weight: 900; border-radius: 15px; text-shadow: 2px 2px 0 #000, 0 0 20px currentColor; transition: 0.3s; display: inline-block; margin-bottom: 5px; padding: 0; border: none; background: transparent; }
        
        .msg-waiting { color: #fff; background: rgba(0,0,0,0.6); border: 3px solid #fff; padding: 15px 40px; }
        .msg-countdown { color: #ff0; background: rgba(255,255,0,0.4); border: 4px solid #ff0; font-size: 80px !important; padding: 15px 40px; }
        .msg-ok { color: #0f0; border: 4px solid #0f0; background: rgba(0,255,0,0.25); padding: 15px 40px; }
        .msg-ng { color: #f00; border: 4px solid #f00; background: rgba(255,0,0,0.6); animation: flash 0.3s infinite; padding: 15px 40px; }
        
        #lyrics_area { 
            font-size: 38px; color: #fff; font-weight: 900; 
            text-shadow: 3px 3px 0 #000, 0 0 15px #0ff; 
            min-height: 1.5em; width: 100%;
        }

        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px), radial-gradient(circle, rgba(10,30,40,0.95) 0%, rgba(0,0,0,0.95) 100%); background-size: 30px 30px, 30px 30px, 100% 100%; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; text-align: center; }
        
        .login-input { background: rgba(0,0,0,0.5); border: 2px solid #0ff; color: #fff; font-family: 'Montserrat', 'Noto Sans JP', sans-serif; font-size: 24px; padding: 12px; text-align: center; width: 85%; max-width: 350px; outline: none; box-shadow: 0 0 10px rgba(0,255,255,0.3); border-radius: 8px; margin: 10px auto; pointer-events: auto; display: block; transition: 0.2s; }
        .login-input:focus { box-shadow: 0 0 20px rgba(0,255,255,0.8); }
        .btn { padding: 18px 40px; background: linear-gradient(45deg, rgba(0,50,50,0.8), rgba(0,100,100,0.8)); color: #0ff; border: 2px solid #0ff; border-radius: 8px; font-family: 'Montserrat', 'Noto Sans JP', sans-serif; font-size: 24px; font-weight: 900; cursor: pointer; margin-top: 25px; width: 85%; max-width: 350px; box-shadow: 0 0 15px rgba(0,255,255,0.4), inset 0 0 10px rgba(0,255,255,0.2); transition: 0.2s; pointer-events: auto; text-transform: uppercase; }
        .btn:active { transform: scale(0.95); box-shadow: 0 0 5px #0ff, inset 0 0 5px #0ff; }
        .btn-exit { background: rgba(50,50,50,0.8); color: #fff; border-color: #aaa; box-shadow: none; }
        
        #download_link { background: #0ff; color: #000; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 20px; pointer-events: auto; display: none; font-size: 20px; }
    </style>
</head>
<body>

<div id="start_screen" class="overlay">
    <h1 style="color:#0ff; text-shadow: 0 0 15px #0ff, 0 0 30px #0ff; margin-bottom: 10px; font-size: 50px; letter-spacing: 2px;">AI PLANK QUEST</h1>
    <p style="color:#fff; font-size:18px; margin-top:0; font-weight: bold;">己の肉体で魔王に挑戦しよう！</p>
    <div style="background: rgba(0,255,255,0.1); padding: 15px; border: 1px solid #0ff; border-radius: 8px; margin-bottom: 25px; font-size: 16px; font-weight: bold; text-align: left; display: inline-block;">
        ⚠️ カメラの許可を求められたら「許可」を押してね！<br>
        ⚠️ 服はインして、真横から全身が映るようにしてね！
    </div>
    <input type="text" id="play_id" class="login-input" placeholder="ダンサーID" maxlength="20">
    <input type="password" id="play_pass" class="login-input" placeholder="パスワード" maxlength="20">
    <button class="btn" onclick="loginAndStart()">TRAINING START</button>
</div>

<div id="video_container">
    <video id="input_video" autoplay playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    
    <div class="ui-layer">
        <div class="header">
            <div class="status-box">
                <div class="status-title">HOLDING TIME</div>
                <div id="timer">0.00</div>
            </div>
            <div class="status-box">
                <div class="status-title" id="ng_label" style="color:#f00; display:none;">NG: LIMIT 5s</div>
                <div id="ng_countdown"></div>
            </div>
        </div>
        
        <div class="message-container">
            <div id="msg_area"></div>
            <div id="lyrics_area"></div>
        </div>
    </div>
</div>

<div id="result_overlay" class="overlay" style="display:none;">
    <h1 style="color:#ffd700; text-shadow: 0 0 20px #ffd700; font-size: 60px;">MISSION COMPLETE</h1>
    <div style="font-size:30px; margin-bottom:10px; font-weight: bold;">耐えた時間：<span id="final_score" style="color:#0f0; font-size:70px; text-shadow: 0 0 20px #0f0;">0</span> 秒</div>
    <div id="save_status" style="color:#0ff; margin-bottom:30px; font-size: 20px; font-weight: bold;">データ送信中...</div>
    <p style="font-size:18px; color:#ccc; font-weight: bold;">👇 動画を保存して提出してね！</p>
    <a id="download_link">🎥 動画をダウンロード</a>
    <button class="btn btn-exit" onclick="location.reload()">もう一度挑戦</button>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxlfASNPpPyVwYXdB6kamPVNrXfbI9MTqcBvuVeP54itKd7_n5sj90k4rSfkf7EJUV0/exec";

// 🌟 歌詞データ
const LYRICS = [
    { time: 0, text: "位置につけー！" },
    { time: 8, text: "ふるえるスマホか　おれの腹か" },
    { time: 11, text: "バイブス高まり　床とランデブー" },
    { time: 14, text: "畳の目が　銀河にみえて" },
    { time: 18, text: "汗がポタポタ　ダムが決壊" },
    { time: 21, text: "「いま、なんびょう？」って聞きたいけれど" },
    { time: 24, text: "声を出したら　すべてが終わる" },
    { time: 30, text: "筋肉痛は　明日への通知表" },
    { time: 36, text: "腹直筋が　「もう無理」と泣いている" },
    { time: 42, text: "だが知っているか？　プランクの語源は" },
    { time: 49, text: "「床に恋した　一枚の板」なんだぜ？" },
    { time: 55, text: "プランク・パニック！　体幹・レボリューション！" },
    { time: 58, text: "重力にケンカを売る　おれは人間まな板" },
    { time: 107, text: "固めろコルセット　内臓を守れ" },
    { time: 111, text: "この苦しみを越えたら　腹筋で大根が" },
    { time: 116, text: "おろせる未来が　待っているはずさ！" },
    { time: 124, text: "時計の針が　癒着したのか" },
    { time: 127, text: "さっきから10秒が　100年経過" },
    { time: 130, text: "プルプルプルと　子鹿の産まれたて" },
    { time: 133, text: "産まれた場所は　ヨガマットの上" },
    { time: 137, text: "肘の皮が　悲鳴をあげても" },
    { time: 142, text: "心はいま　エベレストの頂上" },
    { time: 148, text: "代謝があがれば　冬でも暖房いらず" },
    { time: 154, text: "腹筋の溝に　貯金もできる" },
    { time: 160, text: "乗り越えた先には　シックスパックの要塞" },
    { time: 166, text: "洗濯板として　町内に貸し出すのさ" },
    { time: 174, text: "プランク・パニック！　体幹・レボリューション！" },
    { time: 177, text: "地球の軸を支える　おれは人間定規" },
    { time: 185, text: "締めろインナーマッスル　魂を燃やせ" },
    { time: 189, text: "この辛さを越えたら　腹筋が反射して" },
    { time: 195, text: "街灯代わりになる　明るい未来さ！" },
    { time: 202, text: "ああ…　なぜおれは　浮いているのか" },
    { time: 205, text: "四足歩行の　先祖に謝りたい" },
    { time: 209, text: "おしりを上げるな　腰を下げるな" },
    { time: 213, text: "おれはいま　宇宙と一体化している…" },
    { time: 218, text: "しーっ…　聞こえるかい？" },
    { time: 220, text: "腹筋たちが　合唱を始めたよ" },
    { time: 223, text: "「熱いよ…」「痛いよ…」「降ろしてよ…」" },
    { time: 226, text: "それは　産声という名の　メロディ…" },
    { time: 232, text: "プランク・パニック！　体幹・レボリューション！" },
    { time: 235, text: "銀河系で一番　真っ直ぐなヤツ！" },
    { time: 243, text: "ラスト10秒は　光の速さを超えろ！" },
    { time: 248, text: "この震えが止まれば　君の腹筋はもう" },
    { time: 254, text: "ダイヤモンドより硬い　最強の武器になる！" },
    { time: 259, text: "明るい未来へ　レッツ・ゴー・ホリゾンタル！" },
    { time: 271, text: "あぁっ…" }
];

let pose, camera, videoElement, canvasElement, canvasCtx;
let state = "SETUP"; 
let holdTime = 0;
let ngTimeStart = null;
let countdownVal = 3;
let countdownTimer = null;
let mediaRecorder, recordedChunks = [];
let playId = "";
let playPass = "";
let smoothedLandmarks = {};
let audioCtx;
let lastNgCount = -1;
let wasGoodPose = true;
let showInitialMsg = true;

const bgm = new Audio('https://raw.githubusercontent.com/stnavi2007-cpu/stnv-music/refs/heads/main/plank_music.mp3');
bgm.loop = false;
// クロスドメインで再生するための設定
bgm.crossOrigin = "anonymous"; 

function playSound(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if (type === 'buzzer') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'tick') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }
}

function updateLyrics() {
    const currentTime = bgm.currentTime;
    const lyricsArea = document.getElementById('lyrics_area');
    let activeText = "";
    for (let i = 0; i < LYRICS.length; i++) {
        if (currentTime >= LYRICS[i].time) {
            activeText = LYRICS[i].text;
        } else { break; }
    }
    lyricsArea.innerText = activeText;
}

function loginAndStart() {
    playId = document.getElementById('play_id').value;
    playPass = document.getElementById('play_pass').value;
    if(!playId || !playPass) { alert("IDとパスワードを入れてね！"); return; }
    
    // ★ 修正: ユーザーのアクションと同時にAudioContextとBGMのロックを強制解除する
    playSound('tick');
    bgm.play().then(() => {
        bgm.pause();
        bgm.currentTime = 0;
    }).catch(e => console.log("BGM Unlock Failed:", e));

    document.getElementById('start_screen').style.display = 'none';
    document.getElementById('video_container').style.display = 'block';
    initAI(); 
}

function initAI() {
    videoElement = document.getElementById('input_video');
    canvasElement = document.getElementById('output_canvas');
    canvasCtx = canvasElement.getContext('2d');
    
    setTimeout(() => { showInitialMsg = false; }, 6000);
    
    pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onResults);
    camera = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start().catch(err => { alert("カメラの起動に失敗しました。カメラを許可してね！"); });
}

function calculateAngle(a, b, c) {
    let radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
    let angle = Math.abs(radians * 180.0 / Math.PI);
    if (angle > 180.0) angle = 360.0 - angle;
    return angle;
}

function smoothPoint(id, point, alpha = 0.15) {
    if (!smoothedLandmarks[id]) { smoothedLandmarks[id] = { x: point.x, y: point.y }; } 
    else { smoothedLandmarks[id].x = smoothedLandmarks[id].x * (1 - alpha) + point.x * alpha; smoothedLandmarks[id].y = smoothedLandmarks[id].y * (1 - alpha) + point.y * alpha; }
    return smoothedLandmarks[id];
}

function onResults(results) {
    if (canvasElement.width !== results.image.width) { canvasElement.width = results.image.width; canvasElement.height = results.image.height; }
    canvasCtx.save(); canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.translate(canvasElement.width, 0); canvasCtx.scale(-1, 1);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
    if (results.poseLandmarks) {
        const lm = results.poseLandmarks;
        const getV = (i1, i2) => Math.max(lm[i1].visibility, lm[i2].visibility);
        const visOK = getV(11,12) > 0.5 && getV(13,14) > 0.5 && getV(23,24) > 0.5 && getV(25,26) > 0.5 && getV(27,28) > 0.5;
        const rawS = { x: (lm[11].x + lm[12].x)/2, y: (lm[11].y + lm[12].y)/2 };
        const rawE = { x: (lm[13].x + lm[14].x)/2, y: (lm[13].y + lm[14].y)/2 };
        const rawH = { x: (lm[23].x + lm[24].x)/2, y: (lm[23].y + lm[24].y)/2 };
        const rawK = { x: (lm[25].x + lm[26].x)/2, y: (lm[25].y + lm[26].y)/2 };
        const rawA = { x: (lm[27].x + lm[28].x)/2, y: (lm[27].y + lm[28].y)/2 };
        const shoulder = smoothPoint('shoulder', rawS); const elbow = smoothPoint('elbow', rawE);
        const hip = smoothPoint('hip', rawH); const knee = smoothPoint('knee', rawK); const ankle = smoothPoint('ankle', rawA);
        const hipAngle = calculateAngle(shoulder, hip, knee); const kneeAngle = calculateAngle(hip, knee, ankle);
        const bodySlope = Math.abs(Math.atan2(ankle.y - shoulder.y, ankle.x - shoulder.x) * 180 / Math.PI);
        const isHorizontal = (bodySlope < 35 || bodySlope > 145);
        const armSlope = Math.abs(Math.atan2(elbow.y - shoulder.y, elbow.x - shoulder.x) * 180 / Math.PI);
        const isArmVertical = (armSlope > 60 && armSlope < 120) && (elbow.y > shoulder.y + 0.05);
        const isLyingDown = Math.abs(shoulder.y - elbow.y) < 0.08;
        let hColor = (hipAngle < 155) ? '#FF0000' : (hipAngle < 165) ? '#FFFF00' : '#00FFFF';
        let kColor = (kneeAngle < 155) ? '#FF0000' : (kneeAngle < 165) ? '#FFFF00' : '#00FFFF';
        let aColor = (!isArmVertical) ? '#FF0000' : '#00FFFF';
        let bColor = (!isHorizontal) ? '#FF0000' : '#00FFFF';
        if (isLyingDown || !visOK) { hColor = kColor = aColor = bColor = '#FF0000'; }
        const w = canvasElement.width; const h = canvasElement.height;
        canvasCtx.lineWidth = 4;
        canvasCtx.beginPath(); canvasCtx.moveTo(shoulder.x * w, shoulder.y * h); canvasCtx.lineTo(elbow.x * w, elbow.y * h); canvasCtx.strokeStyle = aColor; canvasCtx.stroke();
        canvasCtx.beginPath(); canvasCtx.moveTo(shoulder.x * w, shoulder.y * h); canvasCtx.lineTo(hip.x * w, hip.y * h); canvasCtx.strokeStyle = !isHorizontal ? bColor : hColor; canvasCtx.stroke();
        canvasCtx.beginPath(); canvasCtx.moveTo(hip.x * w, hip.y * h); canvasCtx.lineTo(knee.x * w, knee.y * h); canvasCtx.strokeStyle = kColor; canvasCtx.stroke();
        canvasCtx.beginPath(); canvasCtx.moveTo(knee.x * w, knee.y * h); canvasCtx.lineTo(ankle.x * w, ankle.y * h); canvasCtx.strokeStyle = kColor; canvasCtx.stroke();
        const pts = [{p: elbow, c: aColor}, {p: shoulder, c: aColor === '#FF0000' || !isHorizontal ? '#FF0000' : '#00FFFF'}, {p: hip, c: hColor}, {p: knee, c: kColor}, {p: ankle, c: kColor}];
        for(let pt of pts) { if (visOK || pt.c === '#FF0000') { canvasCtx.fillStyle = pt.c; canvasCtx.beginPath(); canvasCtx.arc(pt.p.x * w, pt.p.y * h, 3, 0, 2 * Math.PI); canvasCtx.fill(); } }
        processGame(visOK, isLyingDown, isHorizontal, isArmVertical, hipAngle, kneeAngle);
    }
    canvasCtx.restore();
}

function processGame(visOK, isLyingDown, isHorizontal, isArmVertical, hipAngle, kneeAngle) {
    const isGoodPose = (visOK && !isLyingDown && isHorizontal && isArmVertical && hipAngle >= 155 && kneeAngle >= 155);
    const msg = document.getElementById('msg_area');
    if (state === "SETUP") {
        if (showInitialMsg) {
            msg.innerText = "カメラを横向きにして撮影してね！";
            msg.className = "msg-waiting";
        } else {
            msg.innerText = "";
            msg.className = "";
        }
        if (isGoodPose && !countdownTimer) startCountdown();
    } else if (state === "COUNTDOWN") {
        if (!isGoodPose) cancelCountdown();
    } else if (state === "BATTLE") {
        updateBattle(isGoodPose);
        updateLyrics();
    }
}

function startCountdown() {
    if (countdownTimer) return; state = "COUNTDOWN"; countdownVal = 3;
    const msg = document.getElementById('msg_area'); msg.className = "msg-countdown"; msg.innerText = countdownVal;
    
    countdownTimer = setInterval(() => {
        countdownVal--;
        if (countdownVal > 0) { msg.innerText = countdownVal; playSound('tick'); } 
        else { clearInterval(countdownTimer); countdownTimer = null; beginBattle(); }
    }, 1000);
}

function cancelCountdown() { 
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; } 
    bgm.pause();
    state = "SETUP"; 
    document.getElementById('msg_area').innerText = "";
    document.getElementById('msg_area').className = "";
}

function beginBattle() { 
    state = "BATTLE"; holdTime = 0; 
    bgm.currentTime = 0;
    bgm.play().catch(e => console.log("BGM Error:", e));
    
    try {
        const stream = canvasElement.captureStream(30);
        let options = { mimeType: 'video/mp4' };
        if (!MediaRecorder.isTypeSupported('video/mp4')) {
            options = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? { mimeType: 'video/webm;codecs=vp9' } : {};
        }
        mediaRecorder = new MediaRecorder(stream, options);
        recordedChunks = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = saveVideo;
        mediaRecorder.start();
    } catch(err) { console.log("Recording failed:", err); }
}

function updateBattle(isGoodPose) {
    const msg = document.getElementById('msg_area');
    const ngLabel = document.getElementById('ng_label'); 
    const ngCount = document.getElementById('ng_countdown'); 
    const timerDisplay = document.getElementById('timer');
    
    msg.style.opacity = 0; 

    if (isGoodPose) {
        if (ngTimeStart) { ngTimeStart = null; ngLabel.style.display = "none"; ngCount.innerText = ""; lastNgCount = -1; bgm.play(); }
        holdTime += 0.033; timerDisplay.innerText = holdTime.toFixed(2);
        timerDisplay.style.color = "#ff0"; timerDisplay.style.textShadow = "0 0 15px #ff0";
        wasGoodPose = true;
    } else {
        if (wasGoodPose) { playSound('buzzer'); wasGoodPose = false; bgm.pause(); }
        timerDisplay.style.color = "#f00"; timerDisplay.style.textShadow = "0 0 15px #f00";
        if (!ngTimeStart) { ngTimeStart = Date.now(); }
        let elapsed = (Date.now() - ngTimeStart) / 1000; let remain = (5.0 - elapsed).toFixed(1);
        let currentSec = Math.ceil(remain); if (currentSec !== lastNgCount && remain > 0) { playSound('tick'); lastNgCount = currentSec; }
        ngLabel.style.display = "block"; ngCount.innerText = remain;
        if (remain <= 0) finishGame();
    }
}

function finishGame() {
    if (state === "FINISHED") return; state = "FINISHED"; bgm.pause();
    if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
    document.getElementById('result_overlay').style.display = "flex";
    const finalScore = Math.floor(holdTime); document.getElementById('final_score').innerText = finalScore;
    
    fetch(`${GAS_URL}?action=plank_clear&uid=${playId}&pass=${playPass}&score=${finalScore}`)
        .then(res => res.json()).then(data => { document.getElementById('save_status').innerText = data.success ? "通信完了！ポイント付与！" : "エラー: " + data.message; })
        .catch(err => { document.getElementById('save_status').innerText = "通信エラー！"; });
}

function saveVideo() {
    const mimeType = mediaRecorder.mimeType || 'video/mp4';
    const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
    const blob = new Blob(recordedChunks, { type: mimeType });
    const url = URL.createObjectURL(blob);
    const link = document.getElementById('download_link');
    link.href = url; link.download = `STNV_PLANK_${new Date().getTime()}.${ext}`;
    link.style.display = "inline-block";
}
</script>
