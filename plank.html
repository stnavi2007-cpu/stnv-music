<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STNV AI PLANK</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Noto+Sans+JP:wght@700;900&display=swap');
        
        body { 
            background: #000; color: #fff; 
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif; 
            margin: 0; overflow: hidden; text-align: center; 
            touch-action: manipulation; 
        }
        
        #video_container { position: relative; width: 100vw; height: 100vh; background: #111; display: none; box-shadow: inset 0 0 50px rgba(0,255,255,0.1); }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: block; }
        
        .header { display: flex; justify-content: space-between; width: 100%; position: absolute; top: 20px; left: 0; padding: 0 30px; box-sizing: border-box; }
        .status-box { background: rgba(0, 20, 30, 0.8); border: 2px solid #0ff; padding: 15px 25px; border-radius: 12px; min-width: 180px; box-shadow: 0 0 20px rgba(0,255,255,0.4); backdrop-filter: blur(4px); }
        .status-title { font-size: 16px; color: #0ff; font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; }
        #timer { font-size: 55px; font-weight: 900; color: #ff0; text-shadow: 0 0 15px #ff0; transition: color 0.2s, text-shadow 0.2s; line-height: 1; }
        #ng_countdown { font-size: 55px; font-weight: 900; color: #f00; text-shadow: 0 0 15px #f00; line-height: 1; }

        .message-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 95%; text-align: center; }
        
        #msg_area { font-size: 45px; font-weight: 900; border-radius: 15px; text-shadow: 2px 2px 0 #000, 0 0 20px currentColor; transition: 0.3s; display: inline-block; padding: 0; border: none; background: transparent; }
        .msg-waiting { color: #fff; background: rgba(0,0,0,0.7); border: 3px solid #fff; padding: 10px 30px; }
        .msg-countdown { color: #ff0; background: rgba(255,255,0,0.4); border: 4px solid #ff0; font-size: 80px !important; padding: 15px 40px; }
        
        #lyrics_area { 
            font-size: 42px; color: #fff; font-weight: 900; 
            text-shadow: 3px 3px 0 #000, 0 0 20px #0ff; 
            min-height: 1.5em; width: 100%;
        }

        /* 🌟 魔王バンブーのデザインとアニメーション */
        #boss_bamboo {
            position: absolute;
            width: 150px; /* 魔王のサイズ */
            height: auto;
            transform: translate(-50%, -100%); /* 基準点を足元の中央に */
            display: none; /* 最初は隠しておく */
            z-index: 5;
            pointer-events: none;
            /* 踊るアニメーション */
            animation: bounceDance 0.6s infinite alternate cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @keyframes bounceDance {
            0% { transform: translate(-50%, -100%) scaleY(0.9); }
            100% { transform: translate(-50%, -120%) scaleY(1.05); }
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(10,30,40,0.95) 0%, rgba(0,0,0,0.95) 100%); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; text-align: center; }
        .login-input { background: rgba(0,0,0,0.5); border: 2px solid #0ff; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 24px; padding: 12px; text-align: center; width: 85%; max-width: 350px; border-radius: 8px; margin: 10px auto; pointer-events: auto; display: block; }
        .btn { padding: 18px 40px; background: linear-gradient(45deg, #004444, #008888); color: #0ff; border: 2px solid #0ff; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 900; cursor: pointer; margin-top: 25px; width: 85%; max-width: 350px; box-shadow: 0 0 15px rgba(0,255,255,0.4); pointer-events: auto; }
    </style>
</head>
<body>

<div id="start_screen" class="overlay">
    <h1 style="color:#0ff; text-shadow: 0 0 15px #0ff; font-size: 50px;">AI PLANK QUEST</h1>
    <p style="color:#fff; font-size:18px;">己の肉体で魔王に挑戦しよう！</p>
    <div style="background: rgba(0,255,255,0.1); padding: 15px; border: 1px solid #0ff; border-radius: 8px; margin-bottom: 25px; font-size: 16px;">
        ⚠️ カメラの許可を求められたら「許可」を押してね！<br>
        ⚠️ 服はインして、真横から全身が映るようにしてね！
    </div>
    <input type="text" id="play_id" class="login-input" placeholder="ダンサーID">
    <input type="password" id="play_pass" class="login-input" placeholder="パスワード">
    <button class="btn" onclick="loginAndStart()">TRAINING START</button>
</div>

<div id="video_container">
    <video id="input_video" autoplay playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    
    <img id="boss_bamboo" src="https://i.ibb.co/39Gt3KWN/image.png" alt="魔王バンブー">

    <div class="ui-layer">
        <div class="header">
            <div class="status-box">
                <div class="status-title">HOLDING TIME</div>
                <div id="timer">0.00</div>
            </div>
            <div class="status-box">
                <div class="status-title" id="ng_label" style="color:#f00; display:none;">NG: LIMIT 5s</div>
                <div id="ng_countdown"></div>
            </div>
        </div>
        <div class="message-container">
            <div id="msg_area"></div>
            <div id="lyrics_area"></div>
        </div>
    </div>
</div>

<div id="result_overlay" class="overlay" style="display:none;">
    <h1 style="color:#ffd700; text-shadow: 0 0 20px #ffd700; font-size: 60px;">ALL COMPLETE!!</h1>
    <div style="font-size:30px; font-weight: bold;">耐えた時間：<span id="final_score" style="color:#0f0; font-size:70px;">0</span> 秒</div>
    <div id="save_status" style="color:#0ff; margin-bottom:30px;">データ送信中...</div>
    <a id="download_link">🎥 動画をダウンロード</a>
    <button class="btn" onclick="location.reload()">もう一度挑戦</button>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxlfASNPpPyVwYXdB6kamPVNrXfbI9MTqcBvuVeP54itKd7_n5sj90k4rSfkf7EJUV0/exec";

const LYRICS = [
    { time: 0, text: "位置につけー！" },
    { time: 8, text: "ふるえるスマホか　おれの腹か" },
    { time: 11, text: "バイブス高まり　床とランデブー" },
    { time: 14, text: "畳の目が　銀河にみえて" },
    { time: 18, text: "汗がポタポタ　ダムが決壊" },
    { time: 21, text: "「いま、なんびょう？」って聞きたいけれど" },
    { time: 24, text: "声を出したら　すべてが終わる" },
    { time: 30, text: "筋肉痛は　明日への通知表" },
    { time: 36, text: "腹直筋が　「もう無理」と泣いている" },
    { time: 42, text: "だが知っているか？　プランクの語源は" },
    { time: 49, text: "「床に恋した　一枚の板」なんだぜ？" },
    { time: 55, text: "プランク・パニック！　体幹・レボリューション！" },
    { time: 58, text: "重力にケンカを売る　おれは人間まな板" },
    { time: 67, text: "固めろコルセット　内臓を守れ" }, 
    { time: 71, text: "この苦しみを越えたら　腹筋で大根が" }, 
    { time: 76, text: "おろせる未来が　待っているはずさ！" }, 
    { time: 84, text: "時計の針が　癒着したのか" }, 
    { time: 87, text: "さっきから10秒が　100年経過" },
    { time: 90, text: "プルプルプルと　子鹿の産まれたて" },
    { time: 93, text: "産まれた場所は　ヨガマットの上" },
    { time: 97, text: "肘の皮が　悲鳴をあげても" },
    { time: 102, text: "心はいま　エベレストの頂上" },
    { time: 108, text: "代謝があがれば　冬でも暖房いらず" },
    { time: 114, text: "腹筋の溝に　貯金もできる" },
    { time: 120, text: "乗り越えた先には　シックスパックの要塞" },
    { time: 126, text: "洗濯板として　町内に貸し出すのさ" },
    { time: 134, text: "プランク・パニック！　体幹・レボリューション！" },
    { time: 137, text: "地球の軸を支える　おれは人間定規" },
    { time: 145, text: "締めろインナーマッスル　魂を燃やせ" },
    { time: 149, text: "この辛さを越えたら　腹筋が反射して" },
    { time: 155, text: "街灯代わりになる　明るい未来さ！" },
    { time: 162, text: "ああ…　なぜおれは　浮いているのか" },
    { time: 165, text: "四足歩行の　先祖に謝りたい" },
    { time: 169, text: "おしりを上げるな　腰を下げるな" },
    { time: 173, text: "おれはいま　宇宙と一体化している…" },
    { time: 178, text: "しーっ…　聞こえるかい？" },
    { time: 180, text: "腹筋たちが　合唱を始めたよ" },
    { time: 183, text: "「熱いよ…」「痛いよ…」「降ろしてよ…」" },
    { time: 186, text: "それは　産声という名の　メロディ…" },
    { time: 192, text: "プランク・パニック！　体幹・レボリューション！" },
    { time: 195, text: "銀河系で一番　真っ直ぐなヤツ！" },
    { time: 203, text: "ラスト10秒は　光の速さを超えろ！" },
    { time: 208, text: "この震えが止まれば　君の腹筋はもう" },
    { time: 214, text: "ダイヤモンドより硬い　最強の武器になる！" },
    { time: 219, text: "明るい未来へ　レッツ・ゴー・ホリゾンタル！" },
    { time: 231, text: "あぁっ…" }
];

let pose, camera, videoElement, canvasElement, canvasCtx;
let state = "SETUP", holdTime = 0, ngTimeStart = null, countdownVal = 3, countdownTimer = null;
let mediaRecorder, recordedChunks = [], playId = "", playPass = "", smoothedLandmarks = {}, audioCtx, lastNgCount = -1, wasGoodPose = true, showInitialMsg = true;

const bgm = new Audio('https://cdn.jsdelivr.net/gh/stnavi2007-cpu/stnv-music@main/plank_music.mp3');
bgm.crossOrigin = "anonymous";

function playSound(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if (type === 'buzzer') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'tick') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }
}

function updateLyrics() {
    const ct = bgm.currentTime;
    let text = "";
    for (let i = 0; i < LYRICS.length; i++) {
        if (ct >= LYRICS[i].time) text = LYRICS[i].text;
        else break;
    }
    document.getElementById('lyrics_area').innerText = text;
}

function loginAndStart() {
    playId = document.getElementById('play_id').value;
    playPass = document.getElementById('play_pass').value;
    if(!playId || !playPass) { alert("IDとパスワードを入れてね！"); return; }
    
    playSound('tick');
    bgm.play().then(() => { bgm.pause(); bgm.currentTime = 0; }).catch(e => console.log(e));

    document.getElementById('start_screen').style.display = 'none';
    document.getElementById('video_container').style.display = 'block';
    initAI(); 
}

function initAI() {
    videoElement = document.getElementById('input_video');
    canvasElement = document.getElementById('output_canvas');
    canvasCtx = canvasElement.getContext('2d');
    setTimeout(() => { showInitialMsg = false; }, 6000);
    pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onResults);
    camera = new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, width: 1280, height: 720 });
    camera.start().catch(err => { alert("カメラ起動失敗！"); });
    
    bgm.addEventListener('ended', () => { finishGame(); });
}

function calculateAngle(a, b, c) {
    let rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
    let deg = Math.abs(rad * 180.0 / Math.PI);
    return deg > 180.0 ? 360.0 - deg : deg;
}

function smoothPoint(id, p, alpha = 0.15) {
    if (!smoothedLandmarks[id]) smoothedLandmarks[id] = { x: p.x, y: p.y };
    else { smoothedLandmarks[id].x = smoothedLandmarks[id].x * (1 - alpha) + p.x * alpha; smoothedLandmarks[id].y = smoothedLandmarks[id].y * (1 - alpha) + p.y * alpha; }
    return smoothedLandmarks[id];
}

function onResults(results) {
    if (canvasElement.width !== results.image.width) { canvasElement.width = results.image.width; canvasElement.height = results.image.height; }
    canvasCtx.save(); canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.translate(canvasElement.width, 0); canvasCtx.scale(-1, 1);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
    
    // 🌟 魔王のエレメントを取得
    const boss = document.getElementById('boss_bamboo');

    if (results.poseLandmarks) {
        const lm = results.poseLandmarks;
        const getV = (i1, i2) => Math.max(lm[i1].visibility, lm[i2].visibility);
        const visOK = getV(11,12) > 0.5 && getV(13,14) > 0.5 && getV(23,24) > 0.5 && getV(25,26) > 0.5 && getV(27,28) > 0.5;
        const shoulder = smoothPoint('s', { x: (lm[11].x+lm[12].x)/2, y: (lm[11].y+lm[12].y)/2 });
        const elbow = smoothPoint('e', { x: (lm[13].x+lm[14].x)/2, y: (lm[13].y+lm[14].y)/2 });
        const hip = smoothPoint('h', { x: (lm[23].x+lm[24].x)/2, y: (lm[23].y+lm[24].y)/2 });
        const knee = smoothPoint('k', { x: (lm[25].x+lm[26].x)/2, y: (lm[25].y+lm[26].y)/2 });
        const ankle = smoothPoint('a', { x: (lm[27].x+lm[28].x)/2, y: (lm[27].y+lm[28].y)/2 });
        const hAngle = calculateAngle(shoulder, hip, knee);
        const kAngle = calculateAngle(hip, knee, ankle);
        const isH = Math.abs(Math.atan2(ankle.y - shoulder.y, ankle.x - shoulder.x) * 180 / Math.PI) < 35;
        const isV = Math.abs(Math.atan2(elbow.y - shoulder.y, elbow.x - shoulder.x) * 180 / Math.PI) > 60;
        const isL = Math.abs(shoulder.y - elbow.y) < 0.08;
        let c = (hAngle < 155 || kAngle < 155 || !isH || !isV || isL || !visOK) ? '#FF0000' : '#00FFFF';
        const w = canvasElement.width, h = canvasElement.height;
        
        // 🌟 バトル中（プランク中）のみ魔王を出現させ、腰（hip）の座標に追従させる
        if (state === "BATTLE" && visOK) {
            boss.style.display = "block";
            // 画面の比率に合わせてピクセル座標に変換
            const renderW = videoElement.clientWidth;
            const renderH = videoElement.clientHeight;
            // 反転しているので (1 - hip.x) で座標を合わせる
            const bossX = (1 - hip.x) * renderW;
            const bossY = hip.y * renderH;
            
            boss.style.left = `${bossX}px`;
            boss.style.top = `${bossY}px`;
        } else {
            boss.style.display = "none";
        }

        canvasCtx.lineWidth = 4; canvasCtx.strokeStyle = c;
        canvasCtx.beginPath(); canvasCtx.moveTo(shoulder.x*w, shoulder.y*h); canvasCtx.lineTo(elbow.x*w, elbow.y*h); canvasCtx.stroke();
        canvasCtx.beginPath(); canvasCtx.moveTo(shoulder.x*w, shoulder.y*h); canvasCtx.lineTo(hip.x*w, hip.y*h); canvasCtx.stroke();
        canvasCtx.beginPath(); canvasCtx.moveTo(hip.x*w, hip.y*h); canvasCtx.lineTo(knee.x*w, knee.y*h); canvasCtx.stroke();
        canvasCtx.beginPath(); canvasCtx.moveTo(knee.x*w, knee.y*h); canvasCtx.lineTo(ankle.x*w, ankle.y*h); canvasCtx.stroke();
        processGame(visOK, isL, isH, isV, hAngle, kAngle);
    } else {
        boss.style.display = "none";
    }
    canvasCtx.restore();
}

function processGame(visOK, isL, isH, isV, ha, ka) {
    const isGood = visOK && !isL && isH && isV && ha >= 155 && ka >= 155;
    const msg = document.getElementById('msg_area');
    if (state === "SETUP") {
        msg.innerText = showInitialMsg ? "カメラを横向きにして撮影してね！" : "";
        msg.className = showInitialMsg ? "msg-waiting" : "";
        if (isGood && !countdownTimer) startCountdown();
    } else if (state === "COUNTDOWN") {
        if (!isGood) cancelCountdown();
    } else if (state === "BATTLE") {
        updateBattle(isGood);
        updateLyrics();
    }
}

function startCountdown() {
    state = "COUNTDOWN"; countdownVal = 3;
    const msg = document.getElementById('msg_area'); msg.className = "msg-countdown"; msg.innerText = countdownVal;
    countdownTimer = setInterval(() => {
        countdownVal--;
        if (countdownVal > 0) { msg.innerText = countdownVal; playSound('tick'); } 
        else { clearInterval(countdownTimer); countdownTimer = null; beginBattle(); }
    }, 1000);
}

function cancelCountdown() { if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; } state = "SETUP"; }

function beginBattle() { state = "BATTLE"; holdTime = 0; bgm.play(); try { const stream = canvasElement.captureStream(30); mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/mp4' }); recordedChunks = []; mediaRecorder.ondataavailable = e => recordedChunks.push(e.data); mediaRecorder.onstop = saveVideo; mediaRecorder.start(); } catch(e) {} }

function updateBattle(isGood) {
    const ngL = document.getElementById('ng_label'), ngC = document.getElementById('ng_countdown'), tD = document.getElementById('timer');
    if (isGood) {
        if (ngTimeStart) { ngTimeStart = null; ngL.style.display = "none"; ngC.innerText = ""; lastNgCount = -1; bgm.play(); }
        holdTime += 0.033; tD.innerText = holdTime.toFixed(2); tD.style.color = "#ff0"; wasGoodPose = true;
    } else {
        if (wasGoodPose) { playSound('buzzer'); wasGoodPose = false; bgm.pause(); }
        tD.style.color = "#f00";
        if (!ngTimeStart) ngTimeStart = Date.now();
        let remain = (5.0 - (Date.now() - ngTimeStart) / 1000).toFixed(1);
        if (Math.ceil(remain) !== lastNgCount && remain > 0) { playSound('tick'); lastNgCount = Math.ceil(remain); }
        ngL.style.display = "block"; ngC.innerText = remain;
        if (remain <= 0) finishGame();
    }
}

function finishGame() {
    if (state === "FINISHED") return; state = "FINISHED"; bgm.pause();
    document.getElementById('boss_bamboo').style.display = "none"; // 終了時は魔王を消す
    if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
    document.getElementById('result_overlay').style.display = "flex";
    const final = Math.floor(holdTime); document.getElementById('final_score').innerText = final;
    fetch(`${GAS_URL}?action=plank_clear&column=AN&uid=${playId}&pass=${playPass}&score=${final}`)
        .then(res => res.json()).then(d => document.getElementById('save_status').innerText = d.success ? "通信完了！AN列へ記録したよ！" : "エラー: "+d.message);
}

function saveVideo() {
    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
    const url = URL.createObjectURL(blob);
    const link = document.getElementById('download_link');
    link.href = url; link.download = `STNV_PLANK_${new Date().getTime()}.mp4`;
    link.style.display = "inline-block";
}
</script>
</body>
</html>
