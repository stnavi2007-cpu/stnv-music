<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STNV AI PLANK</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        /* 🌟 スタイリッシュな近代フォントに変更 */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Noto+Sans+JP:wght@700;900&display=swap');
        
        body { 
            background: #000; color: #fff; 
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif; 
            margin: 0; overflow: hidden; text-align: center; 
            touch-action: manipulation; 
        }
        
        #video_container { position: relative; width: 100vw; height: 100vh; background: #111; display: none; box-shadow: inset 0 0 50px rgba(0,255,255,0.1); }
        
        /* ★広角サイズをそのまま維持。反転（scaleX）はJS側のみで行うためCSSからは削除 */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: block; }
        
        /* 🌟 ヘッダー部分（タイマーなど）をスタイリッシュに */
        .header { display: flex; justify-content: space-between; width: 100%; position: absolute; top: 20px; left: 0; padding: 0 30px; box-sizing: border-box; }
        .status-box { background: rgba(0, 20, 30, 0.8); border: 2px solid #0ff; padding: 15px 25px; border-radius: 12px; min-width: 180px; box-shadow: 0 0 20px rgba(0,255,255,0.4); backdrop-filter: blur(4px); }
        .status-title { font-size: 16px; color: #0ff; font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; }
        #timer { font-size: 55px; font-weight: 900; color: #ff0; text-shadow: 0 0 15px #ff0; transition: color 0.2s, text-shadow 0.2s; line-height: 1; }
        #ng_countdown { font-size: 55px; font-weight: 900; color: #f00; text-shadow: 0 0 15px #f00; line-height: 1; }

        /* 🌟 メッセージエリアを上部に移動し、文字を巨大化 */
        .message-container { position: absolute; top: 18%; left: 50%; transform: translateX(-50%); width: 95%; text-align: center; }
        
        #msg_area { font-size: 55px; font-weight: 900; padding: 15px 40px; border-radius: 15px; text-shadow: 2px 2px 0 #000, 0 0 20px currentColor; transition: 0.3s; display: inline-block; margin-bottom: 15px; }
        .msg-waiting { color: #fff; background: rgba(0,0,0,0.6); border: 3px solid #fff; }
        .msg-countdown { color: #ff0; background: rgba(255,255,0,0.4); border: 4px solid #ff0; font-size: 80px !important; }
        .msg-ok { color: #0f0; border: 4px solid #0f0; background: rgba(0,255,0,0.25); }
        .msg-ng { color: #f00; border: 4px solid #f00; background: rgba(255,0,0,0.6); animation: flash 0.3s infinite; }
        
        #debug_msg { font-size: 32px; font-weight: bold; color: #ff0; background: rgba(0,0,0,0.7); padding: 10px 25px; border-radius: 10px; display: inline-block; text-shadow: 2px 2px 0 #000; border: 2px solid #555; }

        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* 🌟 オシャレなサイバーパンク風グリッド背景を追加 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px), radial-gradient(circle, rgba(10,30,40,0.95) 0%, rgba(0,0,0,0.95) 100%); background-size: 30px 30px, 30px 30px, 100% 100%; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; text-align: center; }
        
        /* 🌟 スタイリッシュなボタンと入力欄 */
        .login-input { background: rgba(0,0,0,0.5); border: 2px solid #0ff; color: #fff; font-family: 'Montserrat', 'Noto Sans JP', sans-serif; font-size: 24px; padding: 12px; text-align: center; width: 85%; max-width: 350px; outline: none; box-shadow: 0 0 10px rgba(0,255,255,0.3); border-radius: 8px; margin: 10px auto; pointer-events: auto; display: block; transition: 0.2s; }
        .login-input:focus { box-shadow: 0 0 20px rgba(0,255,255,0.8); }
        .btn { padding: 18px 40px; background: linear-gradient(45deg, rgba(0,50,50,0.8), rgba(0,100,100,0.8)); color: #0ff; border: 2px solid #0ff; border-radius: 8px; font-family: 'Montserrat', 'Noto Sans JP', sans-serif; font-size: 24px; font-weight: 900; cursor: pointer; margin-top: 25px; width: 85%; max-width: 350px; box-shadow: 0 0 15px rgba(0,255,255,0.4), inset 0 0 10px rgba(0,255,255,0.2); transition: 0.2s; pointer-events: auto; text-transform: uppercase; }
        .btn:active { transform: scale(0.95); box-shadow: 0 0 5px #0ff, inset 0 0 5px #0ff; }
        .btn-exit { background: rgba(50,50,50,0.8); color: #fff; border-color: #aaa; box-shadow: none; }
        
        #download_link { background: #0ff; color: #000; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 20px; pointer-events: auto; display: none; font-size: 20px; }
    </style>
</head>
<body>

<div id="start_screen" class="overlay">
    <h1 style="color:#0ff; text-shadow: 0 0 15px #0ff, 0 0 30px #0ff; margin-bottom: 10px; font-size: 50px; letter-spacing: 2px;">AI PLANK QUEST</h1>
    <p style="color:#fff; font-size:18px; margin-top:0; font-weight: bold;">己の肉体で魔王に挑戦しよう！</p>
    <div style="background: rgba(0,255,255,0.1); padding: 15px; border: 1px solid #0ff; border-radius: 8px; margin-bottom: 25px; font-size: 16px; font-weight: bold; text-align: left; display: inline-block;">
        ⚠️ カメラの許可を求められたら「許可」を押してね！<br>
        ⚠️ 服はインして、真横から全身が映るようにしてね！
    </div>
    <input type="text" id="play_id" class="login-input" placeholder="ダンサーID" maxlength="20">
    <input type="password" id="play_pass" class="login-input" placeholder="パスワード" maxlength="20">
    <button class="btn" onclick="loginAndStart()">TRAINING START</button>
</div>

<div id="video_container">
    <video id="input_video" autoplay playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    
    <div class="ui-layer">
        <div class="header">
            <div class="status-box">
                <div class="status-title">HOLDING TIME</div>
                <div id="timer">0.00</div>
            </div>
            <div class="status-box">
                <div class="status-title" id="ng_label" style="color:#f00; display:none;">NG: LIMIT 5s</div>
                <div id="ng_countdown"></div>
            </div>
        </div>
        
        <div class="message-container">
            <div id="msg_area" class="msg-waiting">AI 起動中...</div><br>
            <div id="debug_msg">AI分析中...</div>
        </div>
        </div>
</div>

<div id="result_overlay" class="overlay" style="display:none;">
    <h1 style="color:#ffd700; text-shadow: 0 0 20px #ffd700; font-size: 60px;">MISSION COMPLETE</h1>
    <div style="font-size:30px; margin-bottom:10px; font-weight: bold;">耐えた時間：<span id="final_score" style="color:#0f0; font-size:70px; text-shadow: 0 0 20px #0f0;">0</span> 秒</div>
    <div id="save_status" style="color:#0ff; margin-bottom:30px; font-size: 20px; font-weight: bold;">データ送信中...</div>
    <p style="font-size:18px; color:#ccc; font-weight: bold;">👇 動画を保存して提出してね！</p>
    <a id="download_link">🎥 動画をダウンロード</a>
    <button class="btn btn-exit" onclick="location.reload()">もう一度挑戦</button>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxlfASNPpPyVwYXdB6kamPVNrXfbI9MTqcBvuVeP54itKd7_n5sj90k4rSfkf7EJUV0/exec";

let pose, camera, videoElement, canvasElement, canvasCtx;
let state = "SETUP"; 
let holdTime = 0;
let ngTimeStart = null;
let countdownVal = 3;
let countdownTimer = null;
let mediaRecorder, recordedChunks = [];
let playId = "";
let playPass = "";

let smoothedLandmarks = {};

// ★ 音を鳴らすための設定
let audioCtx;
let lastNgCount = -1;
let wasGoodPose = true;

function playSound(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    if (type === 'buzzer') {
        // ★ ブーッ！という警告音
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'tick') {
        // ★ ピッ、というカウントダウン音
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }
}

function loginAndStart() {
    playId = document.getElementById('play_id').value;
    playPass = document.getElementById('play_pass').value;
    
    if(!playId || !playPass) {
        alert("IDとパスワードを入れてね！");
        return;
    }

    // ★ ユーザーのアクションでオーディオのロックを解除
    playSound('tick');

    document.getElementById('start_screen').style.display = 'none';
    document.getElementById('video_container').style.display = 'block';

    initAI(); 
}

function initAI() {
    videoElement = document.getElementById('input_video');
    canvasElement = document.getElementById('output_canvas');
    canvasCtx = canvasElement.getContext('2d');

    pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onResults);

    camera = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: 1280, height: 720
    });
    
    camera.start().catch(err => {
        alert("カメラの起動に失敗しました。ブラウザの再読み込みをして、カメラを許可してね！");
    });
}

function calculateAngle(a, b, c) {
    let radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
    let angle = Math.abs(radians * 180.0 / Math.PI);
    if (angle > 180.0) angle = 360.0 - angle;
    return angle;
}

function smoothPoint(id, point, alpha = 0.15) {
    if (!smoothedLandmarks[id]) {
        smoothedLandmarks[id] = { x: point.x, y: point.y };
    } else {
        smoothedLandmarks[id].x = smoothedLandmarks[id].x * (1 - alpha) + point.x * alpha;
        smoothedLandmarks[id].y = smoothedLandmarks[id].y * (1 - alpha) + point.y * alpha;
    }
    return smoothedLandmarks[id];
}

function onResults(results) {
    if (canvasElement.width !== results.image.width) {
        canvasElement.width = results.image.width;
        canvasElement.height = results.image.height;
    }

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    
    // ★反転バグ修正: 鏡のように直感的に動くよう、JS側のみで反転処理を行う
    canvasCtx.translate(canvasElement.width, 0);
    canvasCtx.scale(-1, 1);
    
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
    
    if (results.poseLandmarks) {
        const lm = results.poseLandmarks;
        
        // 🌟 5点すべてがカメラに映っているか監視
        const getV = (i1, i2) => Math.max(lm[i1].visibility, lm[i2].visibility);
        const visOK = getV(11,12) > 0.5 && getV(13,14) > 0.5 && getV(23,24) > 0.5 && getV(25,26) > 0.5 && getV(27,28) > 0.5;

        const rawShoulder = { x: (lm[11].x + lm[12].x)/2, y: (lm[11].y + lm[12].y)/2 };
        const rawElbow = { x: (lm[13].x + lm[14].x)/2, y: (lm[13].y + lm[14].y)/2 };
        const rawHip = { x: (lm[23].x + lm[24].x)/2, y: (lm[23].y + lm[24].y)/2 };
        const rawKnee = { x: (lm[25].x + lm[26].x)/2, y: (lm[25].y + lm[26].y)/2 };
        const rawAnkle = { x: (lm[27].x + lm[28].x)/2, y: (lm[27].y + lm[28].y)/2 };
        
        const shoulder = smoothPoint('shoulder', rawShoulder);
        const elbow = smoothPoint('elbow', rawElbow);
        const hip = smoothPoint('hip', rawHip);
        const knee = smoothPoint('knee', rawKnee);
        const ankle = smoothPoint('ankle', rawAnkle);

        const hipAngle = calculateAngle(shoulder, hip, knee);
        const kneeAngle = calculateAngle(hip, knee, ankle);

        // 🌟 体が横向き（水平）か判定（座り・立ちでのズル防止）
        const bodySlope = Math.abs(Math.atan2(ankle.y - shoulder.y, ankle.x - shoulder.x) * 180 / Math.PI);
        const isHorizontal = (bodySlope < 35 || bodySlope > 145);

        // 🌟 肩の真下に肘があるか（腕が垂直か）判定
        const armSlope = Math.abs(Math.atan2(elbow.y - shoulder.y, elbow.x - shoulder.x) * 180 / Math.PI);
        const isArmVertical = (armSlope > 60 && armSlope < 120) && (elbow.y > shoulder.y + 0.05);

        // 🌟 うつ伏せでサボっていないか判定
        const isLyingDown = Math.abs(shoulder.y - elbow.y) < 0.08;

        let hipColor = '#00FFFF'; 
        if (hipAngle < 155) hipColor = '#FF0000'; 
        else if (hipAngle < 165) hipColor = '#FFFF00'; 

        let kneeColor = '#00FFFF'; 
        if (kneeAngle < 155) kneeColor = '#FF0000'; 
        else if (kneeAngle < 165) kneeColor = '#FFFF00'; 

        let armColor = '#00FFFF';
        if (!isArmVertical) armColor = '#FF0000';

        let bodyColor = '#00FFFF';
        if (!isHorizontal) bodyColor = '#FF0000';

        if (isLyingDown || !visOK) {
            hipColor = '#FF0000';
            kneeColor = '#FF0000';
            armColor = '#FF0000';
            bodyColor = '#FF0000';
        }

        const w = canvasElement.width;
        const h = canvasElement.height;

        canvasCtx.lineWidth = 4;
        canvasCtx.beginPath(); canvasCtx.moveTo(shoulder.x * w, shoulder.y * h); canvasCtx.lineTo(elbow.x * w, elbow.y * h); canvasCtx.strokeStyle = armColor; canvasCtx.stroke();
        canvasCtx.beginPath(); canvasCtx.moveTo(shoulder.x * w, shoulder.y * h); canvasCtx.lineTo(hip.x * w, hip.y * h); canvasCtx.strokeStyle = !isHorizontal ? bodyColor : hipColor; canvasCtx.stroke();
        canvasCtx.beginPath(); canvasCtx.moveTo(hip.x * w, hip.y * h); canvasCtx.lineTo(knee.x * w, knee.y * h); canvasCtx.strokeStyle = kneeColor; canvasCtx.stroke();
        canvasCtx.beginPath(); canvasCtx.moveTo(knee.x * w, knee.y * h); canvasCtx.lineTo(ankle.x * w, ankle.y * h); canvasCtx.strokeStyle = kneeColor; canvasCtx.stroke();

        const points = [
            {p: elbow, c: armColor},
            {p: shoulder, c: armColor === '#FF0000' || !isHorizontal ? '#FF0000' : '#00FFFF'},
            {p: hip, c: hipColor},
            {p: knee, c: kneeColor},
            {p: ankle, c: kneeColor}
        ];
        for(let pt of points) {
            if (visOK || pt.c === '#FF0000') { 
                canvasCtx.fillStyle = pt.c;
                canvasCtx.beginPath();
                canvasCtx.arc(pt.p.x * w, pt.p.y * h, 3, 0, 2 * Math.PI); // サイズ半減
                canvasCtx.fill();
            }
        }

        processGame(shoulder, elbow, hip, knee, ankle, hipAngle, kneeAngle, isLyingDown, isHorizontal, isArmVertical, visOK);
    }
    canvasCtx.restore();
}

function processGame(shoulder, elbow, hip, knee, ankle, hipAngle, kneeAngle, isLyingDown, isHorizontal, isArmVertical, visOK) {
    const isGoodPose = (visOK && !isLyingDown && isHorizontal && isArmVertical && hipAngle >= 155 && kneeAngle >= 155);

    const debugMsg = document.getElementById('debug_msg');
    
    // ★ 邪魔な細かい説明を消去してスッキリさせました
    if (!visOK) {
        debugMsg.innerText = "❌ カメラを横向きにして撮影してね！";
    } else if (!isHorizontal) {
        debugMsg.innerText = "❌ カメラの角度に気をつけてね！";
    } else if (!isArmVertical) {
        debugMsg.innerText = "❌ 肩の真下に肘を置いてね！";
    } else if (isLyingDown) {
        debugMsg.innerText = "❌ うつ伏せになってるよ！体を浮かせてね！";
    } else if (!isGoodPose) {
        debugMsg.innerText = "❌ フォームが崩れているよ！(赤色)";
    } else if (hipAngle < 165 || kneeAngle < 165) {
        debugMsg.innerText = "⚠️ もう少しで完璧！体を一直線に保ってね！(黄色)";
    } else {
        debugMsg.innerText = "✅ 完璧なフォーム！(青色)";
    }

    const msg = document.getElementById('msg_area');

    if (state === "SETUP") {
        if (!visOK) {
            msg.innerText = "カメラを横向きにして撮影してね！";
            msg.className = "msg-waiting";
        } else if (!isGoodPose) {
            msg.innerText = "正しい姿勢で静止してね！";
            msg.className = "msg-waiting";
        } else {
            msg.innerText = "そのままキープしてね！";
            msg.className = "msg-waiting";
            if (!countdownTimer) startCountdown();
        }
    } 
    else if (state === "COUNTDOWN") {
        if (!isGoodPose) cancelCountdown();
    }
    else if (state === "BATTLE") {
        updateBattle(isGoodPose);
    }
}

function startCountdown() {
    if (countdownTimer) return; 
    state = "COUNTDOWN";
    countdownVal = 3;
    const msg = document.getElementById('msg_area');
    msg.className = "msg-countdown";
    msg.innerText = countdownVal;
    
    countdownTimer = setInterval(() => {
        countdownVal--;
        if (countdownVal > 0) {
            msg.innerText = countdownVal;
        } else {
            clearInterval(countdownTimer);
            countdownTimer = null;
            beginBattle();
        }
    }, 1000);
}

function cancelCountdown() {
    if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
    }
    state = "SETUP";
}

function beginBattle() {
    state = "BATTLE";
    holdTime = 0;
    document.getElementById('msg_area').innerText = "KEEP IT!!";
    
    try {
        const stream = canvasElement.captureStream(30);
        let options = {};
        if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
            options = { mimeType: 'video/webm;codecs=vp9' };
        } else if (MediaRecorder.isTypeSupported('video/mp4')) {
            options = { mimeType: 'video/mp4' };
        }
        
        mediaRecorder = new MediaRecorder(stream, options);
        recordedChunks = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = saveVideo;
        mediaRecorder.start();
    } catch(err) {
        console.log("録画非対応ブラウザです");
    }
}

function updateBattle(isGoodPose) {
    const msg = document.getElementById('msg_area');
    const ngLabel = document.getElementById('ng_label');
    const ngCount = document.getElementById('ng_countdown');
    const timerDisplay = document.getElementById('timer');

    if (isGoodPose) {
        if (ngTimeStart) {
            ngTimeStart = null;
            ngLabel.style.display = "none";
            ngCount.innerText = "";
            lastNgCount = -1;
        }
        holdTime += 0.033;
        timerDisplay.innerText = holdTime.toFixed(2);
        timerDisplay.style.color = "#ff0"; 
        timerDisplay.style.textShadow = "0 0 15px #ff0";

        msg.innerText = "GOOD POSE!! 🔥";
        msg.className = "msg-ok";
        wasGoodPose = true;
    } else {
        // ★ フォームが崩れた瞬間にブザーを鳴らす
        if (wasGoodPose) {
            playSound('buzzer');
            wasGoodPose = false;
        }

        timerDisplay.style.color = "#f00"; 
        timerDisplay.style.textShadow = "0 0 15px #f00";

        msg.innerText = "フォームが崩れてるよ！！ 🚨";
        msg.className = "msg-ng";
        if (!ngTimeStart) {
            ngTimeStart = Date.now();
        }
        
        let elapsed = (Date.now() - ngTimeStart) / 1000;
        let remain = (5.0 - elapsed).toFixed(1);
        
        // ★ カウントダウン中に1秒ごとにピッ！と音を鳴らす
        let currentSec = Math.ceil(remain);
        if (currentSec !== lastNgCount && remain > 0) {
            playSound('tick');
            lastNgCount = currentSec;
        }

        ngLabel.style.display = "block";
        ngCount.innerText = remain;

        if (remain <= 0) finishGame();
    }
}

function finishGame() {
    if (state === "FINISHED") return;
    state = "FINISHED";
    
    if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
    
    document.getElementById('result_overlay').style.display = "flex";
    const finalScore = Math.floor(holdTime);
    document.getElementById('final_score').innerText = finalScore;
    
    fetch(`${GAS_URL}?action=plank_clear&uid=${playId}&pass=${playPass}&score=${finalScore}`)
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                document.getElementById('save_status').innerText = "通信完了！ポイント付与！";
            } else {
                document.getElementById('save_status').innerText = "エラー: " + data.message;
            }
        })
        .catch(err => {
            document.getElementById('save_status').innerText = "通信エラー！";
        });
}

function saveVideo() {
    const mimeType = mediaRecorder.mimeType || 'video/webm';
    const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
    const blob = new Blob(recordedChunks, { type: mimeType });
    const url = URL.createObjectURL(blob);
    const link = document.getElementById('download_link');
    link.href = url;
    link.download = `STNV_PLANK_${new Date().getTime()}.${ext}`;
    link.style.display = "inline-block";
}
</script>
</body>
</html>
