<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STATIC POSE TRAINING - DOWN & UP</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; margin: 0; overflow: hidden; text-align: center; }
        #video_container { position: relative; width: 100vw; height: 100vh; background: #222; }
        
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); z-index: 1; }
        #target_img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; opacity: 0.4; z-index: 2; pointer-events: none; transform: scaleX(-1); display: none; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0.01; z-index: -10; pointer-events: none; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 50px; }
        #gauge_container { width: 80%; height: 30px; border: 3px solid #fff; background: rgba(0,0,0,0.5); border-radius: 15px; overflow: hidden; box-shadow: 0 0 10px #0ff; display: none; margin-bottom: 10px; }
        #gauge_fill { width: 0%; height: 100%; background: #0f0; transition: width 0.1s linear; }
        #message_text { font-size: 36px; color: #fff; text-shadow: 0 0 10px #0ff, 2px 2px 0 #000; font-weight: bold; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(10,30,40,0.95) 0%, rgba(0,0,0,0.95) 100%); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn { padding: 15px 40px; background: #0f0; color: #000; border: 4px solid #fff; font-family: 'DotGothic16'; font-size: 24px; font-weight: bold; cursor: pointer; margin-top: 30px; box-shadow: 4px 4px 0px 0px #000; transition: 0.1s; pointer-events: auto; }
        .btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px #000; }
        
        #clear_screen { display: none; background: rgba(0, 255, 0, 0.2); backdrop-filter: blur(5px); z-index: 200; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; }
        #clear_text { font-size: 80px; color: #0f0; text-shadow: 0 0 30px #0f0, 4px 4px 0 #000; animation: flash 0.5s infinite alternate; margin-bottom: 20px;}
        @keyframes flash { from { opacity: 0.7; transform: scale(1); } to { opacity: 1; transform: scale(1.1); } }
    </style>
</head>
<body>

<img id="img_pose_0" src="pose_down.png" crossorigin="anonymous" style="display:none;" onerror="alert('pose_down.pngが見つかりません')">
<img id="img_pose_1" src="pose_up.png" crossorigin="anonymous" style="display:none;" onerror="alert('pose_up.pngが見つかりません')">

<img id="target_img">

<div id="start_screen" class="overlay">
    <h1 style="color:#0ff; font-size:40px;">DOWN & UP TRAINING</h1>
    <p id="loading_msg">カメラを起動中...</p>
    <button class="btn" id="btn_extract" onclick="initApp()">EXTRACT POSE (AI解析)</button>
    <button class="btn" id="btn_start" onclick="startCamera()" style="display:none;">TRAINING START</button>
</div>

<div id="clear_screen" class="overlay">
    <div id="clear_text">PERFECT!</div>
    <button class="btn" id="btn_next_pose" onclick="nextPose()">NEXT POSE</button>
</div>

<div id="video_container">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div class="ui-layer">
        <div id="gauge_container"><div id="gauge_fill"></div></div>
        <div id="message_text"></div>
    </div>
</div>

<script>
let pose, camera, canvasCtx, canvas, videoElement;
let targetPoses = []; // 正規化された各ポーズの正解データ配列
let isExtractingTarget = true;
let isCleared = false;

// クエスト管理
const targetImageIds = ['img_pose_0', 'img_pose_1']; // 何個でも追加可能
const poseNames = ['DOWN (ダウン)', 'UP (アップ)'];
let currentPoseIndex = 0;
let extractIndex = 0;

// ホールド用タイマー
let holdStartTime = null;
const HOLD_DURATION_MS = 1500; 

const EVAL_INDICES = [0, 11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28];
const CUSTOM_CONNECTIONS = [
  [0, 11], [0, 12], [11, 12],
  [11, 13], [13, 15], [12, 14], [14, 16],
  [11, 23], [12, 24], [23, 24],
  [23, 25], [25, 27], [24, 26], [26, 28]
];

// 音声設定
let audioCtx;
function playSound(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    
    if (type === 'tick') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'clear') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    } else if (type === 'allclear') {
        osc.type = 'square'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
        osc.start(); osc.stop(audioCtx.currentTime + 0.6);
    }
}

// 1. ポーズ解析の開始
function initApp() {
    document.getElementById('btn_extract').style.display = 'none';
    const msg = document.getElementById('loading_msg');
    msg.innerText = `AIが先生の「型」を抽出します... (1/${targetImageIds.length})`;

    videoElement = document.getElementById('input_video');
    canvas = document.getElementById('output_canvas');
    canvasCtx = canvas.getContext('2d');

    pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    pose.onResults(onResults);

    // 最初の画像を解析へ送る
    processNextImage();
}

// 画像を順次MediaPipeに投げる処理
function processNextImage() {
    let img = document.getElementById(targetImageIds[extractIndex]);
    if(img.complete && img.naturalHeight !== 0) {
        pose.send({image: img});
    } else {
        img.onload = () => pose.send({image: img});
    }
}

// 2. 解析と推論のメインループ
function onResults(results) {
    // 【解析モード】画像から正解データを作っている時
    if (isExtractingTarget) {
        if (results.poseLandmarks) {
            targetPoses.push(getNormalizedJoints(results.poseLandmarks));
        } else {
            alert(`画像 ${extractIndex + 1} のポーズ抽出に失敗しました。`);
            targetPoses.push(null);
        }
        
        extractIndex++;
        if (extractIndex < targetImageIds.length) {
            document.getElementById('loading_msg').innerText = `AIが先生の「型」を抽出します... (${extractIndex + 1}/${targetImageIds.length})`;
            processNextImage();
        } else {
            document.getElementById('loading_msg').innerText = "型の抽出完了！準備OKです。";
            document.getElementById('btn_start').style.display = 'block';
        }
        return;
    }

    // 【カメラモード】実際のトレーニング中
    if (canvas.width !== results.image.width) {
        canvas.width = results.image.width; canvas.height = results.image.height;
    }

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    canvasCtx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

    let targetNormalized = targetPoses[currentPoseIndex];

    if (results.poseLandmarks && targetNormalized) {
        let userPose = [...results.poseLandmarks];
        const MIRROR_MAP = {11:12, 12:11, 13:14, 14:13, 15:16, 16:15, 23:24, 24:23, 25:26, 26:25, 27:28, 28:27};
        let mirroredUserPose = userPose.map((lm, i) => {
            let mapI = MIRROR_MAP[i] !== undefined ? MIRROR_MAP[i] : i;
            return userPose[mapI] ? { x: 1.0 - userPose[mapI].x, y: userPose[mapI].y, z: userPose[mapI].z, visibility: userPose[mapI].visibility } : lm;
        });

        let userNorm = getNormalizedJoints(mirroredUserPose);
        if (!userNorm) { canvasCtx.restore(); return; }

        let allPerfect = true;
        let jointColors = {};

        EVAL_INDICES.forEach(i => {
            if (!targetNormalized[i] || !userNorm[i]) return;
            let dist = Math.hypot(targetNormalized[i].x - userNorm[i].x, targetNormalized[i].y - userNorm[i].y);

            let color = '#ff0000'; // 赤
            if (dist < 0.20) { color = '#00ff00'; } // 緑
            else if (dist < 0.40) { color = '#ffff00'; allPerfect = false; } // 黄
            else { allPerfect = false; }
            jointColors[i] = color;
        });

        CUSTOM_CONNECTIONS.forEach(([i, j]) => {
            if (results.poseLandmarks[i] && results.poseLandmarks[j]) {
                canvasCtx.beginPath(); canvasCtx.moveTo(results.poseLandmarks[i].x * canvas.width, results.poseLandmarks[i].y * canvas.height);
                canvasCtx.lineTo(results.poseLandmarks[j].x * canvas.width, results.poseLandmarks[j].y * canvas.height);
                canvasCtx.strokeStyle = 'rgba(255,255,255,0.5)'; canvasCtx.lineWidth = 4; canvasCtx.stroke();
            }
        });

        EVAL_INDICES.forEach(i => {
            let lm = results.poseLandmarks[i];
            if (lm) {
                canvasCtx.beginPath(); canvasCtx.arc(lm.x * canvas.width, lm.y * canvas.height, 10, 0, 2 * Math.PI);
                canvasCtx.fillStyle = jointColors[i] || '#ffffff'; canvasCtx.fill();
                canvasCtx.strokeStyle = '#000'; canvasCtx.lineWidth = 2; canvasCtx.stroke();
            }
        });

        const gaugeFill = document.getElementById('gauge_fill');
        const msgText = document.getElementById('message_text');

        if (allPerfect) {
            if (holdStartTime === null) { holdStartTime = performance.now(); playSound('tick'); }
            let elapsed = performance.now() - holdStartTime;
            let progress = Math.min(100, (elapsed / HOLD_DURATION_MS) * 100);
            gaugeFill.style.width = progress + '%';
            msgText.innerText = "KEEP!!"; msgText.style.color = "#0f0";

            if (elapsed >= HOLD_DURATION_MS && !isCleared) {
                isCleared = true;
                playSound('clear');
                document.getElementById('clear_screen').style.display = 'flex';
                document.getElementById('gauge_container').style.display = 'none';
                
                // 全ポーズクリアの判定
                if (currentPoseIndex === targetPoses.length - 1) {
                    playSound('allclear');
                    document.getElementById('clear_text').innerText = "ALL CLEAR!!";
                    document.getElementById('clear_text').style.color = "#ff0";
                    document.getElementById('clear_text').style.textShadow = "0 0 30px #ff0, 4px 4px 0 #000";
                    document.getElementById('btn_next_pose').innerText = "FINISH (戻る)";
                    document.getElementById('btn_next_pose').onclick = () => window.location.reload();
                }
            }
        } else {
            holdStartTime = null;
            gaugeFill.style.width = '0%';
            msgText.innerText = `${poseNames[currentPoseIndex]} の形に合わせろ！`;
            msgText.style.color = "#fff";
        }
    }
    canvasCtx.restore();
}

function getNormalizedJoints(poseData) {
    if (!poseData || !poseData[11] || !poseData[12] || !poseData[23] || !poseData[24]) return null;
    let midX = (poseData[11].x + poseData[12].x) / 2; let midY = (poseData[11].y + poseData[12].y) / 2;
    let hipX = (poseData[23].x + poseData[24].x) / 2; let hipY = (poseData[23].y + poseData[24].y) / 2;
    let length = Math.hypot(midX - hipX, midY - hipY) || 0.1;
    let normPose = {};
    EVAL_INDICES.forEach(i => { if (poseData[i]) { normPose[i] = { x: (poseData[i].x - midX) / length, y: (poseData[i].y - midY) / length }; } });
    return normPose;
}

// 3. トレーニング開始
function startCamera() {
    isExtractingTarget = false;
    document.getElementById('start_screen').style.display = 'none';
    
    // 最初のゴースト画像セット
    document.getElementById('target_img').src = document.getElementById(targetImageIds[currentPoseIndex]).src;
    document.getElementById('target_img').style.display = 'block';
    document.getElementById('gauge_container').style.display = 'block';
    document.getElementById('message_text').innerText = `${poseNames[currentPoseIndex]} の形に合わせろ！`;
    
    camera = new Camera(videoElement, { 
        onFrame: async () => { if(!isCleared) await pose.send({image: videoElement}); }, 
        width: 1280, height: 720 
    });
    camera.start();
}

// 4. 次のポーズへ移行
function nextPose() {
    currentPoseIndex++;
    isCleared = false;
    holdStartTime = null;
    document.getElementById('clear_screen').style.display = 'none';
    document.getElementById('gauge_container').style.display = 'block';
    document.getElementById('message_text').innerText = `${poseNames[currentPoseIndex]} の形に合わせろ！`;
    
    // ゴースト画像を更新
    document.getElementById('target_img').src = document.getElementById(targetImageIds[currentPoseIndex]).src;
}
</script>
</body>
</html>
