<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STNV AR SYNCHRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        
        body { 
            background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; 
            margin: 0; overflow: hidden; text-align: center; 
        }
        
        /* 走査線エフェクト */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; z-index: 9999; pointer-events: none;
        }
        
        #video_container { 
            position: relative; width: 100vw; height: 100vh; background: #000; display: none; 
        }
        
        /* 自分のカメラ映像（一番下） */
        #output_canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: contain; transform: scaleX(-1); z-index: 1; 
        }
        
        /* 🌟 先生のホログラム映像（カメラ映像の上に重ねる） */
        #teacher_canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: contain; 
            z-index: 2; 
            pointer-events: none;
            
            /* 🌟 ホログラムエフェクト：青緑に光らせ、半透明にする */
            opacity: 0.75;
            filter: drop-shadow(0 0 15px #0ff) sepia(1) hue-rotate(180deg) saturate(300%);
            
            /* 🌟 足元フェードアウト：下部20%を徐々に透明にして、見切れた足や床を消し去る！ */
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 95%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 95%);
        }

        video { display: none; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: flex-end; }
        .status-box { background: rgba(0, 0, 0, 0.5); border: 4px solid rgba(0, 255, 255, 0.6); padding: 10px 20px; box-shadow: 4px 4px 0 rgba(0,0,0,0.5); }
        
        #sync_display { font-size: 50px; color: #0ff; text-shadow: 3px 3px 0 #000, 0 0 15px #0ff; font-weight: bold; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(10,30,40,0.95) 0%, rgba(0,0,0,0.95) 100%); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; text-align: center; }
        .btn { padding: 15px 40px; background: #00bcd4; color: #000; border: 4px solid #fff; font-family: 'DotGothic16'; font-size: 24px; font-weight: bold; cursor: pointer; margin-top: 30px; box-shadow: 4px 4px 0px 0px #000; text-transform: uppercase; transition: 0.1s;}
        .btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px #000; }
        h1 { color: #0ff; text-shadow: 4px 4px 0 #000, 0 0 15px #0ff; font-size: 36px; margin-bottom: 10px;}
    </style>
</head>
<body>

<div id="start_screen" class="overlay">
    <h1>🌌 AR SYNCHRO DANCE 🌌</h1>
    <p style="color:#fff; font-size:18px;">先生のホログラムと動きをシンクロさせろ！</p>
    <button class="btn" onclick="startAR()">SYSTEM START</button>
</div>

<div id="video_container">
    <video id="input_video" autoplay playsinline muted></video>
    <video id="teacher_video" src="sample_dance.mp4" loop playsinline muted preload="auto"></video>    
    <canvas id="output_canvas"></canvas>
    <canvas id="teacher_canvas"></canvas>
    
    <div class="ui-layer">
        <div class="header">
            <div class="status-box">
                <div style="font-size:16px; color:#fff;">SYNCHRO RATE</div>
                <div id="sync_display">0%</div>
            </div>
        </div>
    </div>
</div>

<script>
let pose, teacherPose, camera;
let videoElement, canvasElement, canvasCtx;
let tVideo, tCanvas, tCtx;
let isPlaying = false;

// 【新規追加】ホログラムの表示位置を調整するオフセット量
// 元の動画が右にずれているようなので、負の値で左にずらします。
// 目分量で -150 に設定しています。様子を見て調整してください。
let hologramOffsetX = -150; 

// 🌟 骨格データの保存用
let currentTeacherLandmarks = null;
let currentUserLandmarks = null;
let displayScore = 0; // スコアの滑らかな表示用

function startAR() {
    document.getElementById('start_screen').style.display = 'none';
    document.getElementById('video_container').style.display = 'block';
    
    tVideo = document.getElementById('teacher_video');
    tCanvas = document.getElementById('teacher_canvas');
    tCtx = tCanvas.getContext('2d', { willReadFrequently: true });
    
    initAI();

    tVideo.play().then(() => {
        isPlaying = true;
        processChromaKey(); // クロマキー起動
        trackTeacherPose(); // 先生の骨格トラッキング起動
    }).catch(err => alert("動画の読み込みに失敗しました！URLを確認してください。"));
}

function initAI() {
    videoElement = document.getElementById('input_video');
    canvasElement = document.getElementById('output_canvas');
    canvasCtx = canvasElement.getContext('2d');

    // 👨‍🏫 先生用のAIモデル（動画解析用）
    teacherPose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    teacherPose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    teacherPose.onResults((results) => {
        currentTeacherLandmarks = results.poseLandmarks;
        updateSyncScore(); // 先生の骨格が出たらスコア更新
    });

    // 🕺 生徒（カメラ）用のAIモデル
    pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onUserResults);

    // カメラの起動
    camera = new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, width: 1280, height: 720 });
    camera.start();
}

// 🎥 先生の動画から骨格を毎フレーム抽出するループ
async function trackTeacherPose() {
    if (!isPlaying) return;
    if (tVideo.readyState >= 2) {
        await teacherPose.send({image: tVideo});
    }
    requestAnimationFrame(trackTeacherPose);
}

// 🌟 リアルタイム・クロマキー（グリーンバック透過）エンジン
function processChromaKey() {
    if (!isPlaying) return;
    
    if (tVideo.videoWidth > 0) {
        if (tCanvas.width !== tVideo.videoWidth) {
            tCanvas.width = tVideo.videoWidth;
            tCanvas.height = tVideo.videoHeight;
        }
        
        // 【修正】動画の描画位置にオフセットを追加して、左にずらす
        tCtx.drawImage(tVideo, hologramOffsetX, 0, tCanvas.width, tCanvas.height);
        
        let frame = tCtx.getImageData(0, 0, tCanvas.width, tCanvas.height);
        let l = frame.data.length / 4;
        
        for (let i = 0; i < l; i++) {
            let r = frame.data[i * 4 + 0];
            let g = frame.data[i * 4 + 1];
            let b = frame.data[i * 4 + 2];
            
            let diff = g - Math.max(r, b);
            if (diff > 15) { 
                let alpha = Math.max(0, 255 - (diff * 4));
                frame.data[i * 4 + 3] = alpha; 
            }
        }
        tCtx.putImageData(frame, 0, 0);
    }
    requestAnimationFrame(processChromaKey);
}

// 🕺 自分のカメラ映像の処理と描画
function onUserResults(results) {
    currentUserLandmarks = results.poseLandmarks;

    if (canvasElement.width !== results.image.width) {
        canvasElement.width = results.image.width;
        canvasElement.height = results.image.height;
    }

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
    
    if (results.poseLandmarks) {
        // 自分の骨格をサイバー風（青色）に描画
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: 'rgba(0, 255, 255, 0.4)', lineWidth: 3});
        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#0ff', lineWidth: 1, radius: 3});
    }
    canvasCtx.restore();
    
    updateSyncScore(); // 自分の骨格が出たらスコア更新
}

// 📐 3点間の角度を計算する関数（例：肩・ひじ・手首）
function calculateAngle(a, b, c) {
    let radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
    let angle = Math.abs(radians * 180.0 / Math.PI);
    if (angle > 180.0) {
        angle = 360 - angle;
    }
    return angle;
}

// 💯 真のシンクロ率を計算する関数
function calculateTrueSyncScore(teacher, user) {
    if (!teacher || !user) return 0;

    // 比較する重要な関節の組み合わせ [中心点, 曲がる点, 先端点]
    const jointSets = [
        [11, 13, 15], // 左腕（肩->ひじ->手首）
        [12, 14, 16], // 右腕（肩->ひじ->手首）
        [23, 25, 27], // 左脚（股->ひざ->足首）
        [24, 26, 28], // 右脚（股->ひざ->足首）
        [11, 23, 25], // 左胴体（肩->股->ひざ）
        [12, 24, 26]  // 右胴体（肩->股->ひざ）
    ];

    let totalDifference = 0;

    // 各関節の「角度のズレ」を計算
    for (let i = 0; i < jointSets.length; i++) {
        const [p1, p2, p3] = jointSets[i];
        const teacherAngle = calculateAngle(teacher[p1], teacher[p2], teacher[p3]);
        const userAngle = calculateAngle(user[p1], user[p2], user[p3]);
        totalDifference += Math.abs(teacherAngle - userAngle);
    }

    // 6箇所の平均のズレ（度数）を出す
    const averageDiff = totalDifference / jointSets.length;

    // ズレ0度 = 100%、ズレ45度以上 = 0% とする厳しいプロ仕様の設定
    let syncRate = 100 - (averageDiff * 2.22); 
    
    if (syncRate < 0) syncRate = 0;
    if (syncRate > 100) syncRate = 100;

    return syncRate;
}

// 📊 スコアの表示更新
function updateSyncScore() {
    let targetScore = 0;
    
    if (currentTeacherLandmarks && currentUserLandmarks) {
        // 先生と自分の骨格が両方画面にいる時だけ計算！
        targetScore = calculateTrueSyncScore(currentTeacherLandmarks, currentUserLandmarks);
    }
    
    // スコアがパカパカ切り替わらないように、ヌルッと数値を動かす処理
    displayScore += (targetScore - displayScore) * 0.15;
    
    document.getElementById('sync_display').innerText = Math.round(displayScore) + "%";
}
</script>
</body>
</html>
