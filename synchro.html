<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STATIC POSE TRAINING - DOWN & UP</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        /* 🌟 カクカク文字をやめて、超クールでスタイリッシュな近代フォントに変更 */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Noto+Sans+JP:wght@700;900&display=swap');
        
        body { 
            background: #000; color: #fff; 
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif; 
            margin: 0; overflow: hidden; text-align: center; 
        }
        
        #video_container { 
            position: relative; width: 100vw; height: 100vh; background: #222; 
            box-shadow: inset 0 0 50px rgba(0,255,255,0.2); 
        }
        
        #output_canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: contain; transform: scaleX(-1); z-index: 1; 
        }
        
        #teacher_canvas {
            position: absolute; 
            top: 15vh;     
            left: 5%;      
            width: 100%; 
            height: 85vh; 
            object-fit: contain; 
            z-index: 2; 
            pointer-events: none;
            opacity: 0.75; 
            transform: scale(0.95); 
            transform-origin: center bottom;
            filter: drop-shadow(0 0 15px #0ff) sepia(1) hue-rotate(180deg) saturate(300%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 90%, rgba(0,0,0,0) 95%),
                linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 95%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 90%, rgba(0,0,0,0) 95%), 
                linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 95%);
    
            -webkit-mask-composite: source-in;
            mask-composite: intersect;
            clip-path: inset(5% 15% 0 5%);
        }

        #final_video {
            position: absolute; 
            width: 1px; height: 1px; opacity: 0.01; z-index: -10; pointer-events: none; 
        }

        #final_canvas {
            position: absolute; 
            top: 15vh; 
            left: 5%; 
            width: 100%; 
            height: 85vh; 
            object-fit: contain; 
            z-index: 3; 
            pointer-events: none; 
            display: none;
            opacity: 0.80; 
            transform: scale(1.2);
            transform-origin: center bottom;
            filter: drop-shadow(0 0 15px #0ff) sepia(1) hue-rotate(180deg) saturate(300%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 55%, rgba(0,0,0,0) 85%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 55%, rgba(0,0,0,0) 85%);
            clip-path: inset(5% 15% 0 5%);
        }

        img, video, audio { position: absolute; width: 1px; height: 1px; opacity: 0.01; z-index: -10; pointer-events: none; }
        
        .ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start; padding-top: 10vh; 
        }
        
        #gauge_container { 
            width: 80%; height: 20px; 
            border: 2px solid #0ff; 
            background: rgba(0,30,40,0.7); 
            border-radius: 10px; overflow: hidden; 
            box-shadow: 0 0 15px rgba(0,255,255,0.6); 
            display: none; margin-bottom: 15px; 
            backdrop-filter: blur(4px);
            z-index: 5; 
            position: relative;
        }
        #gauge_fill { 
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, #0f0, #0ff); 
            box-shadow: 0 0 10px #0ff;
            transition: width 0.1s linear; 
        }
        
        /* 🌟 文字の場所を下ろし、サイズを特大化！ */
        #message_text { 
            position: absolute; 
            top: 16%; /* 11%から22%に下げて見切れを防止 */
            left: 50%; transform: translate(-50%, -50%); 
            font-size: 35px; /* 25pxから40pxへ巨大化 */
            color: #fff; 
            text-shadow: 0 0 10px #0ff, 3px 3px 0 #000; 
            font-weight: 900; white-space: pre-wrap; width: 100%; text-align: center;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.4), transparent);
            border-top: 2px solid rgba(0, 255, 255, 0.8); /* 帯も少し太く */
            border-bottom: 2px solid rgba(0, 255, 255, 0.8);
            padding: 5px 0;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.6);
            z-index: 10; 
        }
        
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                radial-gradient(circle, rgba(10,30,40,0.95) 0%, rgba(0,0,0,0.95) 100%);
            background-size: 30px 30px, 30px 30px, 100% 100%;
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }

        .overlay h1 {
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff;
            letter-spacing: 4px;
            animation: pulse_blue 2s infinite alternate;
        }

        .btn { 
            padding: 15px 50px; 
            background: linear-gradient(45deg, rgba(0,50,50,0.8), rgba(0,100,100,0.8));
            color: #0ff; 
            border: 2px solid #0ff; 
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif; /* 🌟 フォント更新 */
            font-size: 24px; font-weight: 900; 
            cursor: pointer; margin-top: 30px; 
            box-shadow: 0 0 15px rgba(0,255,255,0.4), inset 0 0 10px rgba(0,255,255,0.2); 
            text-shadow: 0 0 8px #0ff;
            border-radius: 6px;
            transition: all 0.2s ease-out; 
            pointer-events: auto; 
            text-transform: uppercase;
        }
        .btn:active { 
            transform: scale(0.95); 
            box-shadow: 0 0 5px #0ff, inset 0 0 5px #0ff; 
            background: rgba(0,255,255,0.3);
        }
        
        #clear_screen { 
            display: none; 
            background: rgba(0, 10, 20, 0.85); 
            backdrop-filter: blur(8px); 
            z-index: 200; 
            flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; 
            box-shadow: inset 0 0 100px rgba(0,255,0,0.3); 
            border: 4px solid #0f0; 
        }
        #clear_text { 
            font-size: 80px; 
            background: linear-gradient(to bottom, #fff 0%, #ff0 50%, #f90 100%); 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,255,0,0.8), 4px 4px 0 #000; 
            animation: flash_text 0.6s infinite alternate; 
            margin-bottom: 20px; text-align: center;
        }
        
        @keyframes pulse_blue {
            0% { opacity: 0.8; text-shadow: 0 0 10px #0ff, 0 0 20px #0ff; }
            100% { opacity: 1; text-shadow: 0 0 15px #0ff, 0 0 30px #0ff, 0 0 50px #0ff; }
        }
        @keyframes flash_text { 
            from { opacity: 0.8; transform: scale(1); } 
            to { opacity: 1; transform: scale(1.05); } 
        }
        
        #flash_overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 300; display: none; opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

<img id="img_pose_0" src="pose_up.png" crossorigin="anonymous" onerror="alert('pose_down.pngが見つかりません')">
<img id="img_pose_1" src="pose_down.png" crossorigin="anonymous" onerror="alert('pose_up.pngが見つかりません')">

<video id="final_video" src="sample_dance.mp4" playsinline muted preload="auto"></video>
<div id="start_screen" class="overlay">
    <h1 style="color:#0ff; font-size:40px;">STYLE TRAINING</h1>
    <p id="loading_msg" style="color:#aaa;">起動準備中...</p>
    <button class="btn" id="btn_extract" onclick="initApp()">START</button>
    <button class="btn" id="btn_start" onclick="startCamera()" style="display:none;">TRAINING START</button>
</div>

<div id="clear_screen" class="overlay">
    <div id="clear_text">PERFECT!</div>
</div>

<div id="flash_overlay"></div>

<div id="video_container">
    <video id="input_video" autoplay playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    
    <canvas id="teacher_canvas"></canvas>
    <canvas id="final_canvas"></canvas>
    
    <div class="ui-layer">
        <div id="message_text"></div>
        <div id="gauge_container"><div id="gauge_fill"></div></div>
    </div>
</div>

<script>
let pose, camera, canvasCtx, canvas, videoElement;
let tCanvas, tCtx;
let fCanvas, fCtx;

let targetPoses = []; 
let rawTargetPoses = []; 
let isExtractingTarget = true;
let isCleared = false;
let isFinalPhase = false; 
let isExamPhase = false; 

const targetImageIds = ['img_pose_0', 'img_pose_1']; 
const poseNames = ['DOWNの形', 'UPの形']; 
const sequence = [0, 1, 0, 1, 0, 1, 0, 1]; 
let sequenceIndex = 0;
let extractIndex = 0;

let holdStartTime = null;
const HOLD_DURATION_MS = 2000; 

const TEACHER_POINT_RADIUS = 8; 

const EVAL_INDICES = [0, 11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28];
const CUSTOM_CONNECTIONS = [
  [0, 11], [0, 12], [11, 12],
  [11, 13], [13, 15], [12, 14], [14, 16],
  [11, 23], [12, 24], [23, 24],
  [23, 25], [25, 27], [24, 26], [26, 28]
];

const ANGLE_EVAL_GROUPS = [
    [11, 13, 15], // 左腕（肘の角度）
    [12, 14, 16], // 右腕
    [23, 25, 27], // 左脚（膝の角度）
    [24, 26, 28], // 右脚
    [11, 23, 25], // 左胴体（腰の角度）
    [12, 24, 26]  // 右胴体
];

let examScores = { down: 0, up: 0 };
let currentExamPoseIndex = 0; 
let latestUserLandmarks = null; 

let audioCtx;
function playSound(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    
    if (type === 'tick') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'clear') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    } else if (type === 'allclear' || type === 'exam_start') {
        osc.type = 'square'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
        osc.start(); osc.stop(audioCtx.currentTime + 0.6);
    } else if (type === 'count') {
        osc.type = 'square'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'shutter') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }
}

async function initApp() {
    document.getElementById('btn_extract').style.display = 'none';
    const msg = document.getElementById('loading_msg');
    msg.innerText = "AIエンジン起動中...";

    videoElement = document.getElementById('input_video');
    canvas = document.getElementById('output_canvas');
    canvasCtx = canvas.getContext('2d');
    
    tCanvas = document.getElementById('teacher_canvas');
    tCtx = tCanvas.getContext('2d', { willReadFrequently: true });
    
    fCanvas = document.getElementById('final_canvas');
    fCtx = fCanvas.getContext('2d', { willReadFrequently: true });

    pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    pose.onResults(onResults);

    await pose.initialize();

    msg.innerText = `AIが先生の「型」を抽出します... (1/${targetImageIds.length})`;
    processNextImage();
}

async function processNextImage() {
    let img = document.getElementById(targetImageIds[extractIndex]);
    
    const analyze = async () => {
        try {
            await pose.send({image: img});
        } catch(e) {
            console.error(e);
            alert("画像解析に失敗しました。リロードしてください。");
        }
    };

    if(img.complete && img.naturalHeight !== 0) {
        analyze();
    } else {
        img.onload = analyze;
    }
}

function onResults(results) {
    if (isExtractingTarget) {
        if (results.poseLandmarks) {
            targetPoses.push(getNormalizedJoints(results.poseLandmarks));
            rawTargetPoses.push(results.poseLandmarks); 
        } else {
            alert(`画像 ${extractIndex + 1} のポーズ抽出に失敗しました。`);
            targetPoses.push(null);
            rawTargetPoses.push(null);
        }
        
        extractIndex++;
        if (extractIndex < targetImageIds.length) {
            document.getElementById('loading_msg').innerText = `AIが先生の「型」を抽出します... (${extractIndex + 1}/${targetImageIds.length})`;
            processNextImage();
        } else {
            document.getElementById('loading_msg').innerText = "型の抽出完了！準備OKです。";
            document.getElementById('btn_start').style.display = 'block';
            processTeacherCanvas();
        }
        return;
    }

    if (canvas.width !== results.image.width) {
        canvas.width = results.image.width; canvas.height = results.image.height;
    }

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    canvasCtx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

    if (results.poseLandmarks) {
        latestUserLandmarks = results.poseLandmarks;

        let userPose = [...results.poseLandmarks];
        const MIRROR_MAP = {11:12, 12:11, 13:14, 14:13, 15:16, 16:15, 23:24, 24:23, 25:26, 26:25, 27:28, 28:27};
        latestUserLandmarksMirrored = userPose.map((lm, i) => {
            let mapI = MIRROR_MAP[i] !== undefined ? MIRROR_MAP[i] : i;
            return userPose[mapI] ? { x: 1.0 - userPose[mapI].x, y: userPose[mapI].y, z: userPose[mapI].z, visibility: userPose[mapI].visibility } : lm;
        });
    }

    if (isFinalPhase || isExamPhase) {
        if (isExamPhase && latestUserLandmarks) {
            CUSTOM_CONNECTIONS.forEach(([i, j]) => {
                if (latestUserLandmarks[i] && latestUserLandmarks[j]) {
                    canvasCtx.beginPath(); canvasCtx.moveTo(latestUserLandmarks[i].x * canvas.width, latestUserLandmarks[i].y * canvas.height);
                    canvasCtx.lineTo(latestUserLandmarks[j].x * canvas.width, latestUserLandmarks[j].y * canvas.height);
                    canvasCtx.strokeStyle = 'rgba(255,255,255,0.3)'; canvasCtx.lineWidth = 2; canvasCtx.stroke();
                }
            });
        }
        canvasCtx.restore();
        return;
    }

    let targetId = sequence[sequenceIndex];
    let targetNormalized = targetPoses[targetId];

    if (results.poseLandmarks && targetNormalized && latestUserLandmarksMirrored) {
        let userNorm = getNormalizedJoints(latestUserLandmarksMirrored);
        if (!userNorm) { canvasCtx.restore(); return; }

        let allPerfect = true;
        let jointColors = {};

        EVAL_INDICES.forEach(i => {
            if (!targetNormalized[i] || !userNorm[i]) return;
            let dist = Math.hypot(targetNormalized[i].x - userNorm[i].x, targetNormalized[i].y - userNorm[i].y);

            let color = '#ff0000'; 
            if (dist < 0.25) { color = '#00ff00'; } 
            else if (dist < 0.45) { color = '#ffff00'; allPerfect = false; } 
            else { allPerfect = false; }
            jointColors[i] = color;
        });

        CUSTOM_CONNECTIONS.forEach(([i, j]) => {
            if (latestUserLandmarks[i] && latestUserLandmarks[j]) {
                canvasCtx.beginPath(); canvasCtx.moveTo(latestUserLandmarks[i].x * canvas.width, latestUserLandmarks[i].y * canvas.height);
                canvasCtx.lineTo(latestUserLandmarks[j].x * canvas.width, latestUserLandmarks[j].y * canvas.height);
                canvasCtx.strokeStyle = 'rgba(255,255,255,0.5)'; canvasCtx.lineWidth = 4; canvasCtx.stroke();
            }
        });

        EVAL_INDICES.forEach(i => {
            let lm = latestUserLandmarks[i];
            if (lm) {
                canvasCtx.beginPath(); 
                canvasCtx.arc(lm.x * canvas.width, lm.y * canvas.height, 16, 0, 2 * Math.PI);
                canvasCtx.fillStyle = jointColors[i] || '#ffffff'; canvasCtx.fill();
                canvasCtx.strokeStyle = '#000'; canvasCtx.lineWidth = 2; canvasCtx.stroke();
            }
        });

        const gaugeFill = document.getElementById('gauge_fill');
        const msgText = document.getElementById('message_text');

        if (allPerfect) {
            if (holdStartTime === null) { holdStartTime = performance.now(); playSound('tick'); }
            let elapsed = performance.now() - holdStartTime;
            let progress = Math.min(100, (elapsed / HOLD_DURATION_MS) * 100);
            gaugeFill.style.width = progress + '%';
            msgText.innerText = "KEEP!!"; msgText.style.color = "#0f0";

            if (elapsed >= HOLD_DURATION_MS && !isCleared) {
                isCleared = true;
                playSound('clear');
                document.getElementById('clear_screen').style.display = 'flex';
                document.getElementById('gauge_container').style.display = 'none';
                
                sequenceIndex++;
                if (sequenceIndex >= sequence.length) {
                    playSound('allclear');
                    document.getElementById('clear_text').innerText = "ALL CLEAR!!";
                    document.getElementById('clear_text').style.color = "#ff0";
                    document.getElementById('clear_text').style.textShadow = "0 0 30px #ff0, 4px 4px 0 #000";
                    setTimeout(startFinalPhase, 3000);
                } else {
                    document.getElementById('clear_text').innerText = "PERFECT!";
                    setTimeout(nextPose, 1500);
                }
            }
        } else {
            holdStartTime = null;
            gaugeFill.style.width = '0%';
            msgText.innerText = `${poseNames[targetId]}`;
            msgText.style.color = "#fff";
        }
    }
    canvasCtx.restore();
}

function getNormalizedJoints(poseData) {
    if (!poseData || !poseData[11] || !poseData[12] || !poseData[23] || !poseData[24]) return null;
    let midX = (poseData[11].x + poseData[12].x) / 2; let midY = (poseData[11].y + poseData[12].y) / 2;
    let hipX = (poseData[23].x + poseData[24].x) / 2; let hipY = (poseData[23].y + poseData[24].y) / 2;
    let length = Math.hypot(midX - hipX, midY - hipY) || 0.1; 
    let normPose = {};
    EVAL_INDICES.forEach(i => { if (poseData[i]) { normPose[i] = { x: (poseData[i].x - midX) / length, y: (poseData[i].y - midY) / length }; } });
    return normPose;
}

function calculateAngle(a, b, c) {
    let radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
    let angle = Math.abs(radians * 180.0 / Math.PI);
    if (angle > 180.0) angle = 360 - angle;
    return angle;
}

let tempCanvas = document.createElement('canvas');
let tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });

function processTeacherCanvas() {
    requestAnimationFrame(processTeacherCanvas);
    if (isExtractingTarget) return;

    if (!isFinalPhase && !isExamPhase) {
        let targetId = sequence[sequenceIndex];
        let sourceElement = document.getElementById(targetImageIds[targetId]);
        let poseData = rawTargetPoses[targetId];

        if (sourceElement && (sourceElement.videoWidth !== 0 || sourceElement.naturalWidth !== 0)) {
            let sWidth = sourceElement.videoWidth || sourceElement.naturalWidth;
            let sHeight = sourceElement.videoHeight || sourceElement.naturalHeight;

            if (tCanvas.width !== sWidth) {
                tCanvas.width = sWidth; tCanvas.height = sHeight;
                tempCanvas.width = sWidth; tempCanvas.height = sHeight;
            }

            tempCtx.clearRect(0, 0, sWidth, sHeight);
            tempCtx.drawImage(sourceElement, 0, 0, sWidth, sHeight);
            let frame = tempCtx.getImageData(0, 0, sWidth, sHeight);

            for (let i = 0; i < frame.data.length / 4; i++) {
                let r = frame.data[i * 4], g = frame.data[i * 4 + 1], b = frame.data[i * 4 + 2];
                let diff = g - Math.max(r, b);
                if (diff > 25) { 
                    frame.data[i * 4 + 3] = 0; 
                }
            }

            tCtx.clearRect(0, 0, sWidth, sHeight);
            tCtx.putImageData(frame, 0, 0);

            if (poseData) {
                tCtx.save();
                tCtx.setLineDash([10, 10]);
                tCtx.strokeStyle = 'rgba(0, 255, 255, 0.8)';
                tCtx.lineWidth = 6;
                CUSTOM_CONNECTIONS.forEach(([i, j]) => {
                    if (poseData[i] && poseData[j]) {
                        tCtx.beginPath();
                        tCtx.moveTo(poseData[i].x * sWidth, poseData[i].y * sHeight);
                        tCtx.lineTo(poseData[j].x * sWidth, poseData[j].y * sHeight);
                        tCtx.stroke();
                    }
                });
                tCtx.setLineDash([]);
                tCtx.fillStyle = '#00ffff';
                EVAL_INDICES.forEach(i => {
                    if (poseData[i]) {
                        tCtx.beginPath();
                        tCtx.arc(poseData[i].x * sWidth, poseData[i].y * sHeight, TEACHER_POINT_RADIUS, 0, 2*Math.PI);
                        tCtx.fill();
                    }
                });
                tCtx.restore();
            }
        }
    } else if (isFinalPhase) {
        if (fCanvas.style.display === 'none') return;

        let fVideo = document.getElementById('final_video');
        if (fVideo.readyState >= 2) {
            let sWidth = fVideo.videoWidth;
            let sHeight = fVideo.videoHeight;

            if (fCanvas.width !== sWidth) {
                fCanvas.width = sWidth; fCanvas.height = sHeight;
                tempCanvas.width = sWidth; tempCanvas.height = sHeight;
            }

            tempCtx.clearRect(0, 0, sWidth, sHeight);
            tempCtx.drawImage(fVideo, 0, 0, sWidth, sHeight);
            let frame = tempCtx.getImageData(0, 0, sWidth, sHeight);

            for (let i = 0; i < frame.data.length / 4; i++) {
                let r = frame.data[i * 4], g = frame.data[i * 4 + 1], b = frame.data[i * 4 + 2];
                let diff = g - Math.max(r, b);
                if (diff > 25) { 
                    frame.data[i * 4 + 3] = 0; 
                }
            }

            fCtx.clearRect(0, 0, sWidth, sHeight);
            fCtx.putImageData(frame, 0, 0);
        }
    }
}

function startCamera() {
    isExtractingTarget = false;
    document.getElementById('start_screen').style.display = 'none';
    
    let targetId = sequence[sequenceIndex];
    document.getElementById('gauge_container').style.display = 'block';
    document.getElementById('message_text').innerText = `${poseNames[targetId]}`;
    
    camera = new Camera(videoElement, { 
        onFrame: async () => { if(!isCleared) await pose.send({image: videoElement}); }, 
        width: 1280, height: 720 
    });
    camera.start();

    let finalVideo = document.getElementById('final_video');
    finalVideo.muted = true; 
    finalVideo.play().then(() => {
        finalVideo.pause();
        finalVideo.currentTime = 0;
    }).catch(e => console.log(e));
}

function nextPose() {
    isCleared = false;
    holdStartTime = null;
    document.getElementById('clear_screen').style.display = 'none';
    document.getElementById('gauge_container').style.display = 'block';
    
    let targetId = sequence[sequenceIndex];
    document.getElementById('message_text').innerText = `${poseNames[targetId]}`;
}

function startFinalPhase() {
    isFinalPhase = true;
    isCleared = false;
    
    document.getElementById('clear_screen').style.display = 'none';
    document.getElementById('gauge_container').style.display = 'none';
    
    const msg = document.getElementById('message_text');
    msg.innerText = "練習してみよう！";
    msg.style.color = "#0ff";
    
    let finalVideo = document.getElementById('final_video');
    
    tCanvas.style.display = 'none'; 
    fCanvas.style.display = 'block'; 
    
    finalVideo.muted = false;
    finalVideo.currentTime = 0;
    
    const ONE_EIGHT_SECONDS = 4.0; 
    
    finalVideo.ontimeupdate = function() {
        if (finalVideo.currentTime >= ONE_EIGHT_SECONDS) {
            fCanvas.style.display = 'none'; 
        }
    };
    
    finalVideo.onended = function() {
        finalVideo.ontimeupdate = null;
        startExamPhase();
    };

    finalVideo.play().catch(e => console.log(e));
}

function startExamPhase() {
    isFinalPhase = false;
    isExamPhase = true;
    
    tCanvas.style.display = 'none';
    fCanvas.style.display = 'none';
    
    document.getElementById('clear_screen').style.display = 'flex';
    document.getElementById('clear_text').innerText = "最終試験";
    document.getElementById('clear_text').style.color = "#ff0";
    playSound('exam_start');
    
    setTimeout(() => {
        document.getElementById('clear_screen').style.display = 'none';
        currentExamPoseIndex = 0; 
        executeExamPose();
    }, 2500);
}

function executeExamPose() {
    const msg = document.getElementById('message_text');
    msg.style.color = "#fff";
    msg.innerText = `${poseNames[currentExamPoseIndex]}\nの形で止まれ！`;
    
    let count = 3;
    let countInterval = setInterval(() => {
        msg.innerText = `${poseNames[currentExamPoseIndex]}\nの形で止まれ！\n${count}`;
        if(count > 0) playSound('count');
        
        if (count === 0) {
            clearInterval(countInterval);
            takeSnapshotAndScore();
        }
        count--;
    }, 1000);
}

function takeSnapshotAndScore() {
    playSound('shutter');
    
    const flash = document.getElementById('flash_overlay');
    flash.style.display = 'block';
    flash.style.opacity = '1';
    setTimeout(() => {
        flash.style.transition = 'opacity 0.5s ease-out';
        flash.style.opacity = '0';
        setTimeout(() => { flash.style.display = 'none'; flash.style.transition = ''; }, 500);
    }, 50);

    const msg = document.getElementById('message_text');
    msg.innerText = "判定中...";

    setTimeout(() => {
        let score = calculateExamScore(currentExamPoseIndex);
        
        if (currentExamPoseIndex === 0) {
            examScores.down = score;
        } else {
            examScores.up = score;
        }
        
        msg.innerText = "";
        
        document.getElementById('clear_screen').style.display = 'flex';
        document.getElementById('clear_text').innerHTML = `${poseNames[currentExamPoseIndex]}<br><span style="font-size:120px; color:#fff; text-shadow:0 0 20px #fff;">${score}</span> 点！`;
        document.getElementById('clear_text').style.color = score >= 80 ? "#0f0" : "#ff0";
        
        playSound(score >= 80 ? 'clear' : 'tick');

        setTimeout(() => {
            document.getElementById('clear_screen').style.display = 'none';
            if (currentExamPoseIndex === 0) {
                currentExamPoseIndex = 1;
                executeExamPose();
            } else {
                showFinalResult();
            }
        }, 3000);
        
    }, 100);
}

function calculateExamScore(poseIndex) {
    if (!latestUserLandmarksMirrored) return 0;
    
    let targetLandmarks = rawTargetPoses[poseIndex]; 
    let userNorm = getNormalizedJoints(latestUserLandmarksMirrored);
    let targetNorm = getNormalizedJoints(targetLandmarks);
    
    if (!userNorm || !targetNorm) return 0;

    let totalScore = 100;
    let penalty = 0;

    EVAL_INDICES.forEach(i => {
        if (!targetNorm[i] || !userNorm[i]) return;
        let dist = Math.hypot(targetNorm[i].x - userNorm[i].x, targetNorm[i].y - userNorm[i].y);
        
        if (dist > 0.25) {
            penalty += 10; 
        } else if (dist > 0.15) {
            penalty += 4;  
        } else if (dist > 0.08) {
            penalty += 1;  
        }
    });

    ANGLE_EVAL_GROUPS.forEach(group => {
        let aT = targetLandmarks[group[0]], bT = targetLandmarks[group[1]], cT = targetLandmarks[group[2]];
        let aU = latestUserLandmarksMirrored[group[0]], bU = latestUserLandmarksMirrored[group[1]], cU = latestUserLandmarksMirrored[group[2]];
        
        if(aT && bT && cT && aU && bU && cU) {
            let angleT = calculateAngle(aT, bT, cT);
            let angleU = calculateAngle(aU, bU, cU);
            let angleDiff = Math.abs(angleT - angleU);
            
            if (angleDiff > 45) {
                penalty += 20; 
            } else if (angleDiff > 25) {
                penalty += 8;  
            } else if (angleDiff > 12) {
                penalty += 2;  
            }
        }
    });

    let finalScore = Math.max(0, Math.round(totalScore - penalty));
    return finalScore;
}

function showFinalResult() {
    const msg = document.getElementById('message_text');
    msg.innerText = "";
    
    let total = examScores.down + examScores.up;
    let rank = "C";
    if (total >= 175) rank = "S";
    else if (total >= 155) rank = "A";
    else if (total >= 140) rank = "B";

    document.getElementById('clear_screen').style.display = 'flex';
    document.getElementById('clear_text').innerHTML = `TOTAL SCORE<br><span style="font-size:120px; color:#fff; text-shadow:0 0 20px #fff;">${total}</span> / 200 点<br>RANK: <span style="font-size:100px; color:#f0f; text-shadow:0 0 20px #f0f;">${rank}</span>`;
    
    playSound('allclear');
    
    setTimeout(() => {
        location.reload();
    }, 7000);
}
