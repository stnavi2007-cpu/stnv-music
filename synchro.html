<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STNV AR SYNCHRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        
        body { 
            background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; 
            margin: 0; overflow: hidden; text-align: center; 
        }
        
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; z-index: 9999; pointer-events: none;
        }
        
        #video_container { 
            position: relative; width: 100vw; height: 100vh; background: #000; display: none; 
        }
        
        #output_canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: contain; transform: scaleX(-1); z-index: 1; 
        }
        
        #teacher_canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: contain; 
            z-index: 2; 
            pointer-events: none;
            opacity: 0.45; 
            transition: opacity 0.3s;
            filter: drop-shadow(0 0 15px #0ff) sepia(1) hue-rotate(180deg) saturate(300%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 95%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 95%);
        }

        video, audio { 
            position: absolute; width: 1px; height: 1px; opacity: 0.01; z-index: -10; pointer-events: none;
        }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: flex-end; }
        .status-box { background: rgba(0, 0, 0, 0.7); border: 4px solid #0ff; padding: 10px 20px; box-shadow: 4px 4px 0 rgba(0,0,0,0.5); min-width: 120px; }
        
        #sync_display { font-size: 40px; color: #0ff; text-shadow: 0 0 15px #0ff; font-weight: bold; }
        
        #msg_overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 70px; color: #fff; text-shadow: 0 0 20px #f0f, 4px 4px 0 #000; z-index: 20; 
            white-space: pre-wrap; pointer-events: auto; font-weight: bold;
        }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, rgba(10,30,40,0.95) 0%, rgba(0,0,0,0.95) 100%); 
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .btn { 
            padding: 15px 40px; background: #00bcd4; color: #000; border: 4px solid #fff; 
            font-family: 'DotGothic16'; font-size: 24px; font-weight: bold; cursor: pointer; 
            margin-top: 30px; box-shadow: 4px 4px 0px 0px #000; transition: 0.1s; pointer-events: auto;
        }
        .btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px #000; }
        h1 { color: #0ff; text-shadow: 4px 4px 0 #000, 0 0 15px #0ff; font-size: 40px; margin-bottom: 10px; }
        
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 80%;
            max-width: 400px;
            text-align: left;
            font-size: 24px;
            margin-top: 20px;
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border: 2px solid #0ff;
        }
        .part-label { color: #fff; }
        .part-score { color: #ff0; text-align: right; }
        #final_score { font-size: 70px; color: #0ff; text-shadow: 0 0 20px #0ff; margin-top: 10px; }
    </style>
</head>
<body>

<div id="start_screen" class="overlay">
    <h1>AR SYNCHRO QUEST</h1>
    <p style="color:#fff;">ターン制ダンスバトル (BPM: 80)</p>
    <button class="btn" id="btn_camera_start" onclick="initCamera()">CAMERA START</button>
    <p id="loading_msg" style="display:none; color:#0ff; margin-top:20px;">AI Loading...</p>
</div>

<div id="mission_btn_container" style="display:none; position:absolute; bottom:50px; left:50%; transform:translateX(-50%); z-index:50;">
    <button class="btn" onclick="startGame()">GAME START</button>
</div>

<div id="result_screen" class="overlay" style="display:none;">
    <h1 style="color:#ff0;">STAGE CLEAR!</h1>
    <div style="font-size:20px;">TOTAL SYNCHRO</div>
    <div id="final_score">0%</div>
    
    <div class="result-grid">
        <div class="part-label">HEAD (頭):</div> <div class="part-score" id="res_head">0%</div>
        <div class="part-label">L-ARM (左腕):</div> <div class="part-score" id="res_l_arm">0%</div>
        <div class="part-label">R-ARM (右腕):</div> <div class="part-score" id="res_r_arm">0%</div>
        <div class="part-label">BODY (胴体):</div> <div class="part-score" id="res_body">0%</div>
        <div class="part-label">LEGS (脚):</div> <div class="part-score" id="res_legs">0%</div>
    </div>

    <button class="btn" onclick="window.location.href=window.location.href">REPLAY</button>
</div>

<div id="video_container">
    <video id="input_video" autoplay playsinline muted></video>
    <video id="teacher_video" src="sample_dance.mp4" playsinline muted preload="auto"></video>    
    <audio id="bgm_audio" src="sample_dance.mp4" preload="auto"></audio>

    <canvas id="output_canvas"></canvas>
    <canvas id="teacher_canvas"></canvas>
    
    <div id="msg_overlay"></div>

    <div class="ui-layer">
        <div class="header">
            <div class="status-box" id="status_ui" style="display:none;">
                <div style="font-size:14px; color:#fff;">SCORE</div>
                <div id="sync_display">0%</div>
            </div>
        </div>
    </div>
</div>

<script>
let pose, teacherPose, camera, tVideo, tAudio, tCanvas, tCtx, canvasCtx;
let currentTeacherLandmarks = null;
let currentUserLandmarks = null;

let hologramOffsetX = +60; 
let hologramOffsetY = +100;

// 🌟 カメララグ補正（解決策B）
const CAMERA_LAG_OFFSET = 0.15; 

// 🌟 音楽の設定（BPM80）
const BPM = 80;
const BEAT_INTERVAL = 60 / BPM; // 1拍の秒数 (0.75秒)
const TURN_DURATION = BEAT_INTERVAL * 4; // 4カウントの秒数 (3.0秒)
const START_OFFSET = 0.0; // 映像の開始から何秒後に最初の1カウント目が来るか（ズレる場合はここを調整）

let gameState = 'INIT'; // INIT, COUNTDOWN, TEACHER, PLAYER, EVAL, END

const PARTS = {
    HEAD: [0],
    L_ARM: [11, 13, 15],
    R_ARM: [12, 14, 16],
    BODY: [11, 12, 23, 24],
    LEGS: [23, 25, 27, 24, 26, 28]
};
const ALL_INDICES = [0, 11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28];

let teacherTurnData = [];
let playerTurnData = [];

let totalScores = [];
let partScores = { HEAD: [], L_ARM: [], R_ARM: [], BODY: [], LEGS: [] };

let beepCtx;
function initBeepAudio() {
    if (!beepCtx) {
        beepCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (beepCtx.state === 'suspended') {
        beepCtx.resume();
    }
}

function playBeep(frequency, duration) {
    if (!beepCtx) return;
    const oscillator = beepCtx.createOscillator();
    const gainNode = beepCtx.createGain();
    oscillator.type = 'sine'; 
    oscillator.frequency.value = frequency; 
    gainNode.gain.setValueAtTime(0, beepCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(1, beepCtx.currentTime + 0.02);
    gainNode.gain.linearRampToValueAtTime(0, beepCtx.currentTime + duration);
    oscillator.connect(gainNode);
    gainNode.connect(beepCtx.destination);
    oscillator.start();
    oscillator.stop(beepCtx.currentTime + duration);
}

function initCamera() {
    document.getElementById('btn_camera_start').style.display = 'none';
    document.getElementById('loading_msg').style.display = 'block';

    const videoElement = document.getElementById('input_video');
    const outputCanvas = document.getElementById('output_canvas');
    canvasCtx = outputCanvas.getContext('2d');

    tCanvas = document.getElementById('teacher_canvas');
    tCtx = tCanvas.getContext('2d', { willReadFrequently: true });
    
    tVideo = document.getElementById('teacher_video');
    tAudio = document.getElementById('bgm_audio'); 

    teacherPose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    teacherPose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    teacherPose.onResults((results) => { 
        currentTeacherLandmarks = results.poseLandmarks; 
        if(gameState === 'TEACHER' && results.poseLandmarks) {
            teacherTurnData.push(getNormalizedJoints(results.poseLandmarks));
        }
    });

    tVideo.muted = true;
    tVideo.playsInline = true;
    tVideo.play().then(() => {
        tVideo.pause();
        tVideo.currentTime = 0.5; 
        processChromaKey();
        trackTeacherPose();
    }).catch(e => {
        console.error(e);
        processChromaKey(); 
    });

    pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    pose.onResults(onUserResults);

    camera = new Camera(videoElement, { 
        onFrame: async () => { await pose.send({image: videoElement}); }, 
        width: 1280, height: 720 
    });
    
    camera.start().then(() => {
        document.getElementById('start_screen').style.display = 'none';
        document.getElementById('video_container').style.display = 'block';
        document.getElementById('mission_btn_container').style.display = 'block';
    }).catch(e => {
        alert("カメラの起動に失敗しました。");
    });
}

function startGame() {
    initBeepAudio(); 
    document.getElementById('mission_btn_container').style.display = 'none';
    document.getElementById('status_ui').style.display = 'block';
    
    gameState = 'COUNTDOWN';
    startCountdown();
}

function startCountdown() {
    let count = 4; // BPM80に合わせた4カウント
    const msg = document.getElementById('msg_overlay');
    
    tAudio.volume = 0;
    tAudio.play().then(() => {
        setTimeout(() => { tAudio.pause(); tAudio.currentTime = 0; tAudio.volume = 1; }, 50);
    });

    const timer = setInterval(() => {
        if (count > 0) {
            msg.innerText = `READY\n${count}`;
            playBeep(880, 0.1); 
        } else if (count === 0) {
            msg.innerText = "START!";
            playBeep(1760, 0.4); 
            
            clearInterval(timer);
            
            tVideo.currentTime = START_OFFSET;
            tAudio.currentTime = START_OFFSET;

            // 🌟 映像を先に再生し、カメラ遅延分だけ音楽を遅らせる
            tVideo.play().then(() => {
                setTimeout(() => {
                    tAudio.play();
                    msg.innerText = "";
                    startTeacherTurn();
                }, CAMERA_LAG_OFFSET * 1000);
            });
        }
        count--;
    }, BEAT_INTERVAL * 1000); // 🌟 カウントダウンもBPM80に同期
}

function startTeacherTurn() {
    gameState = 'TEACHER';
    teacherTurnData = []; 
    document.getElementById('msg_overlay').innerText = "WATCH!";
    document.getElementById('msg_overlay').style.color = "#0ff";
    tCanvas.style.opacity = "0.45"; 

    tVideo.play();
    tAudio.play();

    // 🌟 TURN_DURATION（3.0秒）後にプレイヤーの番へ
    setTimeout(() => {
        tVideo.pause();
        tAudio.pause();
        
        if(tVideo.currentTime >= tVideo.duration - 0.5) {
            endGame();
        } else {
            startPlayerTurn();
        }
    }, TURN_DURATION * 1000);
}

function startPlayerTurn() {
    gameState = 'PLAYER';
    playerTurnData = []; 
    document.getElementById('msg_overlay').innerText = "YOUR\nTURN!";
    document.getElementById('msg_overlay').style.color = "#f0f";
    tCanvas.style.opacity = "0.15"; 

    // 🌟 BPM80のメトロノーム
    let beats = 1;
    playBeep(1000, 0.05); // 1拍目
    
    let metronome = setInterval(() => {
        playBeep(1000, 0.05);
        beats++;
        if(beats >= 4) {
            clearInterval(metronome);
        }
    }, BEAT_INTERVAL * 1000); // 0.75秒ごと

    setTimeout(() => {
        evaluateTurn();
    }, TURN_DURATION * 1000);
}

// 🌟 総運動量（サボり・暴れ検知用）
function calculateTotalMotion(motionWindow) {
    if (motionWindow.length < 5) return 0;
    let totalMotion = 0;
    ALL_INDICES.forEach(i => {
        let minX = 999, maxX = -999, minY = 999, maxY = -999;
        motionWindow.forEach(pose => {
            if (pose && pose[i]) {
                if(pose[i].x < minX) minX = pose[i].x;
                if(pose[i].x > maxX) maxX = pose[i].x;
                if(pose[i].y < minY) minY = pose[i].y;
                if(pose[i].y > maxY) maxY = pose[i].y;
            }
        });
        totalMotion += Math.hypot(maxX - minX, maxY - minY);
    });
    return totalMotion;
}

function evaluateTurn() {
    gameState = 'EVAL';
    document.getElementById('msg_overlay').innerText = "";

    if (teacherTurnData.length > 5 && playerTurnData.length > 5) {
        
        // 🌟 サボり・暴れペナルティ計算
        let teacherTotalMotion = calculateTotalMotion(teacherTurnData);
        let userTotalMotion = calculateTotalMotion(playerTurnData);
        let motionPenalty = 1.0;
        
        if (teacherTotalMotion > 0.8) { 
            let motionRatio = userTotalMotion / teacherTotalMotion;
            if (motionRatio < 0.4) { 
                motionPenalty = Math.max(0.1, motionRatio * 1.5); // 棒立ちペナルティ
            } else if (motionRatio > 2.0) {
                motionPenalty = Math.max(0.1, 1.5 / motionRatio); // 暴れすぎペナルティ
            }
        } else {
            if (userTotalMotion > 1.5) {
                motionPenalty = 0.2; // 先生が止まってるのに暴れたペナルティ
            }
        }

        let bestOverallScore = 0;
        let bestPartScoresObj = { HEAD:0, L_ARM:0, R_ARM:0, BODY:0, LEGS:0 };

        teacherTurnData.forEach(tPose => {
            let bestMatchForThisFrame = 0;
            let bestPartsForThisFrame = { HEAD:0, L_ARM:0, R_ARM:0, BODY:0, LEGS:0 };

            playerTurnData.forEach(uPose => {
                let currentMatchScore = 0;
                let currentParts = { HEAD:0, L_ARM:0, R_ARM:0, BODY:0, LEGS:0 };
                let totalPoints = 0;

                for (const [partName, indices] of Object.entries(PARTS)) {
                    let partDiffSum = 0;
                    indices.forEach(i => {
                        if(tPose[i] && uPose[i]) {
                            let diff = Math.hypot(tPose[i].x - uPose[i].x, tPose[i].y - uPose[i].y);
                            let penalizedDiff = Math.max(0, diff - 0.1); 
                            // ズレ0.4（胴体の40%）で0点になるカーブ
                            let errorRatio = Math.min(1.0, penalizedDiff / 0.4);
                            let point = 100 * (1.0 - Math.pow(errorRatio, 2.0)); 
                            partDiffSum += point;
                        }
                    });
                    currentParts[partName] = partDiffSum / indices.length;
                    currentMatchScore += partDiffSum;
                    totalPoints += indices.length;
                }

                let totalAvg = currentMatchScore / totalPoints;

                if (totalAvg > bestMatchForThisFrame) {
                    bestMatchForThisFrame = totalAvg;
                    bestPartsForThisFrame = currentParts;
                }
            });

            if (bestMatchForThisFrame > bestOverallScore) {
                bestOverallScore = bestMatchForThisFrame;
                bestPartScoresObj = bestPartsForThisFrame;
            }
        });

        // ペナルティを適用
        bestOverallScore *= motionPenalty;
        for (const part in PARTS) {
            bestPartScoresObj[part] *= motionPenalty;
        }

        totalScores.push(bestOverallScore);
        for (const part in PARTS) {
            partScores[part].push(bestPartScoresObj[part]);
        }

        document.getElementById('sync_display').innerText = `${Math.round(bestOverallScore)}%`;
    }

    startTeacherTurn();
}

function endGame() {
    gameState = 'END';
    showResult();
}

let lastTeacherVideoTime = -1;
async function trackTeacherPose() {
    if (tVideo.readyState >= 2 && gameState === 'TEACHER') {
        // 音ズレ補正番犬
        if (Math.abs(tVideo.currentTime - (tAudio.currentTime + CAMERA_LAG_OFFSET)) > 0.15) {
            tVideo.currentTime = tAudio.currentTime + CAMERA_LAG_OFFSET;
        }

        if (tVideo.currentTime !== lastTeacherVideoTime) {
            lastTeacherVideoTime = tVideo.currentTime;
            await teacherPose.send({image: tVideo});
        }
    }
    requestAnimationFrame(trackTeacherPose);
}

function filterEssentialLandmarks(landmarks) {
    if(!landmarks) return null;
    return landmarks.map((lm, index) => {
        if (!ALL_INDICES.includes(index)) {
            return { ...lm, visibility: 0 }; 
        }
        return lm;
    });
}

const DRAW_CONNECTIONS = [
  [0, 11], [0, 12], [11, 12], [11, 13], [13, 15], [12, 14], [14, 16],
  [11, 23], [12, 24], [23, 24], [23, 25], [25, 27], [24, 26], [26, 28]
];

let lastChromaTime = -1;
function processChromaKey() {
    if (tVideo.readyState >= 2 && tVideo.videoWidth > 0) {
        if (tVideo.currentTime !== lastChromaTime) {
            lastChromaTime = tVideo.currentTime;
            
            if (tCanvas.width !== tVideo.videoWidth) {
                tCanvas.width = tVideo.videoWidth;
                tCanvas.height = tVideo.videoHeight;
            }
            
            tCtx.clearRect(0, 0, tCanvas.width, tCanvas.height);
            tCtx.drawImage(tVideo, hologramOffsetX, hologramOffsetY, tCanvas.width, tCanvas.height);
            let frame = tCtx.getImageData(0, 0, tCanvas.width, tCanvas.height);
            
            for (let i = 0; i < frame.data.length / 4; i++) {
                let r = frame.data[i * 4], g = frame.data[i * 4 + 1], b = frame.data[i * 4 + 2];
                let diff = g - Math.max(r, b);
                if (diff > 15) { 
                    frame.data[i * 4 + 3] = Math.max(0, 255 - (diff * 4)); 
                }
            }
            tCtx.putImageData(frame, 0, 0);

            if (currentTeacherLandmarks) {
                let filteredLandmarks = filterEssentialLandmarks(currentTeacherLandmarks);
                let normalizedOffsetX = hologramOffsetX / tCanvas.width;
                let normalizedOffsetY = hologramOffsetY / tCanvas.height;
                
                let offsetLandmarks = filteredLandmarks.map(lm => ({
                    x: lm.x + normalizedOffsetX,
                    y: lm.y + normalizedOffsetY,
                    z: lm.z,
                    visibility: lm.visibility
                }));

                drawConnectors(tCtx, offsetLandmarks, DRAW_CONNECTIONS, {color: '#00ffff', lineWidth: 4});
                drawLandmarks(tCtx, offsetLandmarks, {color: '#ffffff', lineWidth: 2, radius: 4});
            }
        }
    }
    requestAnimationFrame(processChromaKey);
}

function onUserResults(results) {
    currentUserLandmarks = results.poseLandmarks;
    const canvas = document.getElementById('output_canvas');
    if (canvas.width !== results.image.width) {
        canvas.width = results.image.width;
        canvas.height = results.image.height;
    }

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    canvasCtx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    
    if (currentUserLandmarks) {
        if (gameState === 'PLAYER') {
            playerTurnData.push(getNormalizedJoints(currentUserLandmarks));
        }

        let filteredLandmarks = filterEssentialLandmarks(currentUserLandmarks);
        drawConnectors(canvasCtx, filteredLandmarks, DRAW_CONNECTIONS, {color: '#00ff00', lineWidth: 4});
        drawLandmarks(canvasCtx, filteredLandmarks, {color: '#ffffff', lineWidth: 2, radius: 4});
    }
    canvasCtx.restore();
}

function getNormalizedJoints(pose) {
    if (!pose || !pose[11] || !pose[12] || !pose[23] || !pose[24]) return null;
    
    let midShoulderX = (pose[11].x + pose[12].x) / 2;
    let midShoulderY = (pose[11].y + pose[12].y) / 2;
    let midHipX = (pose[23].x + pose[24].x) / 2;
    let midHipY = (pose[23].y + pose[24].y) / 2;
    
    let torsoLength = Math.hypot(midShoulderX - midHipX, midShoulderY - midHipY) || 0.1;

    let normPose = {};
    ALL_INDICES.forEach(i => {
        if (pose[i]) {
            normPose[i] = {
                x: (pose[i].x - midShoulderX) / torsoLength,
                y: (pose[i].y - midShoulderY) / torsoLength
            };
        }
    });
    return normPose;
}

function showResult() {
    document.getElementById('video_container').style.display = 'none';
    document.getElementById('result_screen').style.display = 'flex';

    const totalAvg = totalScores.length > 0 ? totalScores.reduce((a, b) => a + b) / totalScores.length : 0;
    document.getElementById('final_score').innerText = `${Math.round(totalAvg)}%`;

    for (const part in PARTS) {
        const pScores = partScores[part];
        const pAvg = pScores.length > 0 ? pScores.reduce((a, b) => a + b) / pScores.length : 0;
        document.getElementById(`res_${part.toLowerCase()}`).innerText = `${Math.round(pAvg)}%`;
    }
}
</script>
</body>
</html>
