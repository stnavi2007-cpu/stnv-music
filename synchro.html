<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STNV AR SYNCHRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        
        body { 
            background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; 
            margin: 0; overflow: hidden; text-align: center; 
        }
        
        #video_container { 
            position: relative; width: 100vw; height: 100vh; background: #000; display: none; 
        }
        
        #output_canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: contain; transform: scaleX(-1); z-index: 1; 
        }
        
        /* 🌟修正: ど真ん中(left:0)、下へ移動(top:15vh)、足首消しグラデーション */
        /* 🌟修正: サイズを15%大きく（scale 1.15）、右へ移動（left: 30px） */
        #teacher_canvas {
            position: absolute; top: 15vh; left: 30px; width: 100%; height: 85vh; 
            object-fit: contain; z-index: 2; pointer-events: none;
            opacity: 0.6;
            transform: scale(1.15); /* 15%大きく */
            transform-origin: center bottom;
            filter: drop-shadow(0 0 15px #0ff) sepia(1) hue-rotate(180deg) saturate(300%); 
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 90%); 
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 90%); 
        }

        img, video, audio { position: absolute; width: 1px; height: 1px; opacity: 0.01; z-index: -10; pointer-events: none; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 10%; }
        
        .header { position: absolute; top: 20px; right: 20px; }
        .status-box { background: rgba(0, 0, 0, 0.7); border: 2px solid #0ff; padding: 5px 10px; box-shadow: 2px 2px 0 rgba(0,0,0,0.5); }
        #sync_display { font-size: 24px; color: #0ff; text-shadow: 0 0 10px #0ff; font-weight: bold; margin:0; line-height: 1;}
        #rank_display { font-size: 14px; color: #ff0; margin:0; line-height: 1;}
        
        #msg_overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 80px; color: #fff; text-shadow: 0 0 20px #f0f, 4px 4px 0 #000; z-index: 20; 
            white-space: pre-wrap; pointer-events: auto; font-weight: bold; text-align: center;
        }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, rgba(10,30,40,0.95) 0%, rgba(0,0,0,0.95) 100%); 
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .btn { 
            padding: 15px 40px; background: #00bcd4; color: #000; border: 4px solid #fff; 
            font-family: 'DotGothic16'; font-size: 24px; font-weight: bold; cursor: pointer; 
            margin-top: 30px; box-shadow: 4px 4px 0px 0px #000; transition: 0.1s; pointer-events: auto;
        }
        .btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px #000; }
        h1 { color: #0ff; text-shadow: 4px 4px 0 #000, 0 0 15px #0ff; font-size: 36px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="start_screen" class="overlay">
    <h1>AR SYNCHRO QUEST</h1>
    <p style="color:#fff;">TURN BATTLE</p>
    <button class="btn" id="btn_camera_start" onclick="initCamera()">CAMERA START</button>
    <p id="loading_msg" style="display:none; color:#0ff; margin-top:20px;">AI Loading...</p>
</div>

<div id="mission_btn_container" style="display:none; position:absolute; bottom:50px; left:50%; transform:translateX(-50%); z-index:50;">
    <button class="btn" onclick="startQuest()">MISSION START</button>
</div>

<div id="video_container">
    <video id="input_video" playsinline muted></video>
    <video id="teacher_video" src="sample_dance.mp4" playsinline muted preload="auto"></video>
    <audio id="bgm_audio" src="sample_dance.mp4" preload="auto"></audio>
    <video id="final_video" src="sample_dance.mp4" playsinline muted preload="auto"></video>
    <audio id="final_audio" src="sample_dance.mp4" preload="auto"></audio>

    <canvas id="output_canvas"></canvas>
    <canvas id="teacher_canvas"></canvas>
    
    <div id="msg_overlay"></div>

    <div class="ui-layer">
        <div class="header" id="status_ui" style="display:none;">
            <div class="status-box">
                <div id="sync_display">0%</div>
                <div id="rank_display">-</div>
            </div>
        </div>
    </div>
</div>

<script>
let pose, teacherPose, camera, tVideo, tAudio, tCanvas, tCtx, canvasCtx;
let isPlaying = false;
let isFinalPhase = false;
let currentTeacherLandmarks = null;
let sequenceIndex = 0;
// 0: 先生, 1: 生徒
const sequence = [0, 1, 0, 1, 0, 1, 0, 1]; 

// 🌟 修正: 点のサイズ倍
const TEACHER_POINT_RADIUS = 8; 
const BPM = 100;
// 🌟 修正: 4エイト (19.2秒)
const SHADOW_DURATION_MS = (60 / BPM) * 32 * 1000; 

const CUSTOM_CONNECTIONS = [
  [0, 11], [0, 12], [11, 12],
  [11, 13], [13, 15], [12, 14], [14, 16],
  [11, 23], [12, 24], [23, 24],
  [23, 25], [25, 27], [24, 26], [26, 28]
];

let audioCtx;
function playBeep(frequency, duration) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + duration);
}

function initCamera() {
    document.getElementById('btn_camera_start').style.display = 'none';
    document.getElementById('loading_msg').style.display = 'block';

    const videoElement = document.getElementById('input_video');
    const outputCanvas = document.getElementById('output_canvas');
    canvasCtx = outputCanvas.getContext('2d');

    tCanvas = document.getElementById('teacher_canvas');
    tCtx = tCanvas.getContext('2d', { willReadFrequently: true });
    
    tVideo = document.getElementById('teacher_video');
    tAudio = document.getElementById('bgm_audio');

    teacherPose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    teacherPose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    teacherPose.onResults((results) => { currentTeacherLandmarks = results.poseLandmarks; });

    pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    pose.onResults(onUserResults);

    camera = new Camera(videoElement, { 
        onFrame: async () => { await pose.send({image: videoElement}); }, 
        width: 1280, height: 720 
    });
    
    camera.start().then(() => {
        document.getElementById('start_screen').style.display = 'none';
        document.getElementById('video_container').style.display = 'block';
        document.getElementById('mission_btn_container').style.display = 'block';
        
        tCanvas.width = outputCanvas.width;
        tCanvas.height = outputCanvas.height;
        
        requestAnimationFrame(processTeacherCanvas);
    }).catch(e => {
        alert("カメラの起動に失敗しました。");
    });
}

function startQuest() {
    document.getElementById('mission_btn_container').style.display = 'none';
    document.getElementById('status_ui').style.display = 'block';
    
    const msg = document.getElementById('msg_overlay');
    msg.innerText = "MISSION\nSTART";
    playBeep(440, 0.5);
    
    setTimeout(() => {
        msg.innerText = "";
        sequenceIndex = 0;
        isPlaying = true;
        questLoop();
    }, 3000);
}

function questLoop() {
    if (sequenceIndex >= sequence.length) {
        startFinalPhase();
        return;
    }

    const part = sequence[sequenceIndex];
    const msg = document.getElementById('msg_overlay');

    if (part === 0) {
        msg.innerText = "WATCH";
        msg.style.color = "#ff0";
        tCanvas.style.opacity = "0.75";
        tVideo.play();
        tAudio.play();

        setTimeout(() => {
            tVideo.pause();
            tAudio.pause();
            sequenceIndex++;
            questLoop();
        }, 3000);
        
    } else {
        msg.innerText = "MOVE!";
        msg.style.color = "#0f0";
        tCanvas.style.opacity = "0.1";
        
        let beats = 0;
        playBeep(880, 0.1); 
        beats++;

        let metronome = setInterval(() => {
            if (beats % 4 === 0) playBeep(880, 0.1);
            else playBeep(440, 0.05);
            
            beats++;
            if (beats > 8) { 
                clearInterval(metronome);
                msg.innerText = "";
                sequenceIndex++;
                questLoop();
            }
        }, 500); 
    }
}

function onUserResults(results) {
    const canvas = document.getElementById('output_canvas');
    if (canvas.width !== results.image.width) {
        canvas.width = results.image.width;
        canvas.height = results.image.height;
    }
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    canvasCtx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    canvasCtx.restore();
}

let tempCanvas = document.createElement('canvas');
let tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });

function processTeacherCanvas() {
    requestAnimationFrame(processTeacherCanvas);
    if (tVideo.readyState >= 2 && !isFinalPhase) {
        
        teacherPose.send({image: tVideo});

        const {videoWidth, videoHeight} = tVideo;
        if (tCanvas.width !== videoWidth) {
            tCanvas.width = videoWidth;
            tCanvas.height = videoHeight;
            tempCanvas.width = videoWidth;
            tempCanvas.height = videoHeight;
        }

        tempCtx.clearRect(0, 0, videoWidth, videoHeight);
        tempCtx.drawImage(tVideo, 0, 0, videoWidth, videoHeight);
        let frame = tempCtx.getImageData(0, 0, videoWidth, videoHeight);

        for (let i = 0; i < frame.data.length / 4; i++) {
            let r = frame.data[i * 4], g = frame.data[i * 4 + 1], b = frame.data[i * 4 + 2];
            let diff = g - Math.max(r, b);
            if (diff > 25) { 
                frame.data[i * 4 + 3] = 0; 
            }
        }
        
        tCtx.clearRect(0, 0, videoWidth, videoHeight);
        tCtx.putImageData(frame, 0, 0);

        if (currentTeacherLandmarks) {
            tCtx.save();
            tCtx.strokeStyle = '#00ffff';
            tCtx.lineWidth = 4;
            CUSTOM_CONNECTIONS.forEach(([i, j]) => {
                if (currentTeacherLandmarks[i] && currentTeacherLandmarks[j]) {
                    tCtx.beginPath();
                    tCtx.moveTo(currentTeacherLandmarks[i].x * videoWidth, currentTeacherLandmarks[i].y * videoHeight);
                    tCtx.lineTo(currentTeacherLandmarks[j].x * videoWidth, currentTeacherLandmarks[j].y * videoHeight);
                    tCtx.stroke();
                }
            });
            tCtx.fillStyle = '#ffffff';
            EVAL_INDICES.forEach(i => {
                if (currentTeacherLandmarks[i]) {
                    tCtx.beginPath();
                    // 🌟 修正: 点のサイズを倍
                    tCtx.arc(currentTeacherLandmarks[i].x * videoWidth, currentTeacherLandmarks[i].y * videoHeight, TEACHER_POINT_RADIUS, 0, 2 * Math.PI);
                    tCtx.fill();
                }
            });
            tCtx.restore();
        }
    }
}

function startFinalPhase() {
    const msg = document.getElementById('msg_overlay');
    const fVideo = document.getElementById('final_video');
    const fAudio = document.getElementById('final_audio');
    
    isFinalPhase = true;
    tCanvas.style.opacity = "0"; 

    msg.innerText = "FINAL PHASE\nホログラムと一緒に踊れ！";
    msg.style.color = "#0ff";
    msg.style.fontSize = "40px";
    playBeep(880, 0.8);

    fVideo.style.position = "absolute";
    fVideo.style.top = "15vh";
    fVideo.style.left = "30px";
    fVideo.style.width = "100%";
    fVideo.style.height = "85vh";
    fVideo.style.objectFit = "contain";
    fVideo.style.zIndex = "3";
    fVideo.style.opacity = "0.7";
    fVideo.style.transform = "scale(1.15)";
    fVideo.style.transformOrigin = "center bottom";
    fVideo.style.filter = "drop-shadow(0 0 15px #0ff) sepia(1) hue-rotate(180deg) saturate(300%)";
    fVideo.style.webkitMaskImage = "linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 90%)";
    fVideo.loop = false; 

    setTimeout(() => {
        msg.innerText = "";
        fVideo.play();
        fAudio.play(); 
        fAudio.loop = false;

        // 🌟 4エイト(19.2秒)で終了
        setTimeout(() => {
            fVideo.pause();
            fAudio.pause();
            isFinalPhase = false;
            fVideo.style.display = 'none';

            msg.style.fontSize = "60px";
            msg.innerText = "MISSION\nCOMPLETE!";
            msg.style.color = "#ff0"; 
            playBeep(880, 0.2);
            setTimeout(() => playBeep(1760, 0.5), 200);

            document.getElementById('btn_camera_start').style.display = 'block';
            document.getElementById('btn_camera_start').innerText = "RETRY";
            document.getElementById('btn_camera_start').onclick = () => location.reload(); 

        }, SHADOW_DURATION_MS);

    }, 3000);
}

function updateScore() {
    if (!isPlaying) return;
    let score = Math.floor(Math.random() * 100);
    document.getElementById('sync_display').innerText = `${score}%`;
    let rank = "POOR";
    if (score > 80) rank = "PERFECT!!";
    else if (score > 60) rank = "GREAT!";
    else if (score > 40) rank = "GOOD";
    document.getElementById('rank_display').innerText = rank;
}
setInterval(updateScore, 1000);
</script>
</body>
</html>
