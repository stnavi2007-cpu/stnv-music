<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STNV AR SYNCHRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        
        body { 
            background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; 
            margin: 0; overflow: hidden; text-align: center; 
        }
        
        /* 走査線エフェクト */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; z-index: 9999; pointer-events: none;
        }
        
        #video_container { 
            position: relative; width: 100vw; height: 100vh; background: #000; display: none; 
        }
        
        #output_canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: contain; transform: scaleX(-1); z-index: 1; 
        }
        
        #teacher_canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: contain; 
            z-index: 2; 
            pointer-events: none;
            opacity: 0.75;
            filter: drop-shadow(0 0 15px #0ff) sepia(1) hue-rotate(180deg) saturate(300%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 95%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 95%);
        }

        video { display: none; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: flex-end; }
        .status-box { background: rgba(0, 0, 0, 0.7); border: 4px solid #0ff; padding: 10px 20px; box-shadow: 4px 4px 0 rgba(0,0,0,0.5); min-width: 120px; }
        
        #sync_display { font-size: 50px; color: #0ff; text-shadow: 0 0 15px #0ff; font-weight: bold; }
        #rank_display { font-size: 20px; color: #ff0; }
        
        #msg_overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 60px; color: #fff; text-shadow: 0 0 20px #f0f; z-index: 20; 
            white-space: pre-wrap; pointer-events: auto; 
        }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, rgba(10,30,40,0.95) 0%, rgba(0,0,0,0.95) 100%); 
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .btn { 
            padding: 15px 40px; background: #00bcd4; color: #000; border: 4px solid #fff; 
            font-family: 'DotGothic16'; font-size: 24px; font-weight: bold; cursor: pointer; 
            margin-top: 30px; box-shadow: 4px 4px 0px 0px #000; transition: 0.1s; pointer-events: auto;
        }
        .btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px #000; }
        h1 { color: #0ff; text-shadow: 4px 4px 0 #000, 0 0 15px #0ff; font-size: 36px; }
    </style>
</head>
<body>

<div id="start_screen" class="overlay">
    <h1>AR SYNCHRO QUEST</h1>
    <p style="color:#fff;">まずはカメラを起動します。</p>
    <button class="btn" id="btn_camera_start" onclick="initCamera()">CAMERA START</button>
    <p id="loading_msg" style="display:none; color:#0ff; margin-top:20px;">AI Loading...</p>
</div>

<div id="mission_btn_container" style="display:none; position:absolute; bottom:50px; left:50%; transform:translateX(-50%); z-index:50;">
    <button class="btn" onclick="startQuest()">MISSION START</button>
</div>

<div id="result_screen" class="overlay" style="display:none;">
    <h1 style="color:#ff0;">MISSION COMPLETE</h1>
    <p style="font-size:24px;">TOTAL AVG SYNCHRO</p>
    <div id="final_score" style="font-size:80px; color:#0ff; margin: 20px 0;">0%</div>
    <button class="btn" onclick="window.location.href=window.location.href">RETRY</button>
</div>

<div id="video_container">
    <video id="input_video" autoplay playsinline muted></video>
    <video id="teacher_video" src="sample_dance.mp4" playsinline preload="auto"></video>    
    <canvas id="output_canvas"></canvas>
    <canvas id="teacher_canvas"></canvas>
    
    <div id="msg_overlay"></div>

    <div class="ui-layer">
        <div class="header">
            <div class="status-box" id="status_ui" style="display:none;">
                <div id="sync_display">0%</div>
                <div id="rank_display">-</div>
            </div>
        </div>
    </div>
</div>

<script>
let pose, teacherPose, camera, tVideo, tCanvas, tCtx, canvasCtx;
let isPlaying = false;
let isCounting = false;
let currentTeacherLandmarks = null;
let currentUserLandmarks = null;
let displayScore = 0;
let scoreHistory = [];

// 🌟 タイムラグ吸収用：先生の直近10フレームを保存する配列
let teacherHistory = []; 

let hologramOffsetX = +60; 
let hologramOffsetY = +100;

const CUSTOM_CONNECTIONS = [
  [11, 12], [11, 13], [13, 15], [12, 14], [14, 16],
  [11, 23], [12, 24], [23, 24],
  [23, 25], [24, 26], [25, 27], [26, 28],
  [27, 31], [28, 32], [27, 29], [28, 30], [29, 31], [30, 32],
  [15, 21], [16, 22], [15, 17], [16, 18], [15, 19], [16, 20], [17, 19], [18, 20],
  [0, 11], [0, 12]
];

let audioCtx;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playBeep(frequency, duration) {
    if (!audioCtx) return;
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    oscillator.type = 'sine'; 
    oscillator.frequency.value = frequency; 
    
    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.05);
    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + duration);
}

function initCamera() {
    document.getElementById('btn_camera_start').style.display = 'none';
    document.getElementById('loading_msg').style.display = 'block';

    const videoElement = document.getElementById('input_video');
    const outputCanvas = document.getElementById('output_canvas');
    canvasCtx = outputCanvas.getContext('2d');

    tCanvas = document.getElementById('teacher_canvas');
    tCtx = tCanvas.getContext('2d', { willReadFrequently: true });
    tVideo = document.getElementById('teacher_video');

    teacherPose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    teacherPose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    teacherPose.onResults((results) => { 
        currentTeacherLandmarks = results.poseLandmarks; 
        
        // 🌟 先生の骨格が取れたら、ラグ吸収用に履歴に保存（最新10フレーム＝約0.3秒分）
        if(results.poseLandmarks) {
            teacherHistory.push(results.poseLandmarks);
            if(teacherHistory.length > 10) teacherHistory.shift();
        }
    });

    tVideo.muted = true;
    tVideo.playsInline = true;
    tVideo.play().then(() => {
        tVideo.pause();
        tVideo.currentTime = 0.5; 
        processChromaKey();
        trackTeacherPose();
    }).catch(e => {
        console.error(e);
        processChromaKey(); 
    });

    pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    pose.onResults(onUserResults);

    camera = new Camera(videoElement, { 
        onFrame: async () => { await pose.send({image: videoElement}); }, 
        width: 1280, height: 720 
    });
    
    camera.start().then(() => {
        document.getElementById('start_screen').style.display = 'none';
        document.getElementById('video_container').style.display = 'block';
        document.getElementById('mission_btn_container').style.display = 'block';
    }).catch(e => {
        alert("カメラの起動に失敗しました。権限を確認してください。");
    });
}

function startQuest() {
    initAudio(); 
    tVideo.muted = false;

    document.getElementById('mission_btn_container').style.display = 'none';
    document.getElementById('status_ui').style.display = 'block';

    tVideo.onended = () => {
        isPlaying = false;
        showResult();
    };

    startCountdown();
}

function startCountdown() {
    isCounting = true;
    let count = 8;
    const msg = document.getElementById('msg_overlay');
    
    tVideo.currentTime = 0.5;

    const timer = setInterval(() => {
        if (count > 0) {
            msg.innerText = `GET READY!\n${count}`;
            playBeep(880, 0.1); 
        } else if (count === 0) {
            msg.innerText = "START!";
            playBeep(1760, 0.4); 
            
            tVideo.currentTime = 0;
            tVideo.play().then(()=>{
                isPlaying = true;
                isCounting = false;
            }).catch(e => console.error(e));

        } else {
            clearInterval(timer);
            msg.innerText = "";
        }
        count--;
    }, 1000);
}

async function trackTeacherPose() {
    if (tVideo.readyState >= 2) {
        if (!tVideo.paused || !currentTeacherLandmarks) {
            await teacherPose.send({image: tVideo});
        }
    }
    requestAnimationFrame(trackTeacherPose);
}

function filterFaceLandmarks(landmarks) {
    if(!landmarks) return null;
    return landmarks.map((lm, index) => {
        if (index >= 1 && index <= 10) {
            return { ...lm, visibility: 0 };
        }
        return lm;
    });
}

function processChromaKey() {
    if (tVideo.readyState >= 2 && tVideo.videoWidth > 0) {
        if (tCanvas.width !== tVideo.videoWidth) {
            tCanvas.width = tVideo.videoWidth;
            tCanvas.height = tVideo.videoHeight;
        }
        
        tCtx.clearRect(0, 0, tCanvas.width, tCanvas.height);
        tCtx.drawImage(tVideo, hologramOffsetX, hologramOffsetY, tCanvas.width, tCanvas.height);
        let frame = tCtx.getImageData(0, 0, tCanvas.width, tCanvas.height);
        
        for (let i = 0; i < frame.data.length / 4; i++) {
            let r = frame.data[i * 4], g = frame.data[i * 4 + 1], b = frame.data[i * 4 + 2];
            let diff = g - Math.max(r, b);
            if (diff > 15) { 
                frame.data[i * 4 + 3] = Math.max(0, 255 - (diff * 4)); 
            }
        }
        tCtx.putImageData(frame, 0, 0);

        if (currentTeacherLandmarks) {
            let filteredLandmarks = filterFaceLandmarks(currentTeacherLandmarks);
            let normalizedOffsetX = hologramOffsetX / tCanvas.width;
            let normalizedOffsetY = hologramOffsetY / tCanvas.height;
            
            let offsetLandmarks = filteredLandmarks.map(lm => ({
                x: lm.x + normalizedOffsetX,
                y: lm.y + normalizedOffsetY,
                z: lm.z,
                visibility: lm.visibility
            }));

            drawConnectors(tCtx, offsetLandmarks, CUSTOM_CONNECTIONS, {color: '#00ffff', lineWidth: 4});
            drawLandmarks(tCtx, offsetLandmarks, {color: '#ffffff', lineWidth: 2, radius: 4});
        }
    }
    requestAnimationFrame(processChromaKey);
}

function onUserResults(results) {
    currentUserLandmarks = results.poseLandmarks;
    const canvas = document.getElementById('output_canvas');
    if (canvas.width !== results.image.width) {
        canvas.width = results.image.width;
        canvas.height = results.image.height;
    }

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    canvasCtx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    
    if (currentUserLandmarks) {
        let filteredLandmarks = filterFaceLandmarks(currentUserLandmarks);
        drawConnectors(canvasCtx, filteredLandmarks, CUSTOM_CONNECTIONS, {color: '#00ff00', lineWidth: 4});
        drawLandmarks(canvasCtx, filteredLandmarks, {color: '#ffffff', lineWidth: 2, radius: 4});
    }
    canvasCtx.restore();
    
    updateScore();
}

function calculateAngle(a, b, c) {
    let rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
    let deg = Math.abs(rad * 180 / Math.PI);
    return deg > 180 ? 360 - deg : deg;
}

function updateScore() {
    if (isCounting || !isPlaying) return;
    
    let rawScore = 0;
    // 🌟 修正：タイムラグ吸収のため、先生の「過去0.3秒間の動き」の中で一番点数が高いものを探す
    if (teacherHistory.length > 0 && currentUserLandmarks) {
        const joints = [[11,13,15],[12,14,16],[23,25,27],[24,26,28],[11,23,25],[12,24,26]];
        let bestScore = 0;

        teacherHistory.forEach(pastTeacher => {
            let diffSum = 0;
            joints.forEach(j => {
                let tA = calculateAngle(pastTeacher[j[0]], pastTeacher[j[1]], pastTeacher[j[2]]);
                let uA = calculateAngle(currentUserLandmarks[j[0]], currentUserLandmarks[j[1]], currentUserLandmarks[j[2]]);
                
                let angleDiff = Math.abs(tA - uA);
                // 🌟 修正：10度以内のズレは「完璧」とみなし、減点対象から外す（ノイズ対策）
                let penalizedDiff = Math.max(0, angleDiff - 10);
                diffSum += penalizedDiff;
            });
            // 🌟 修正：減点倍率を2.2から1.2に緩和
            let tempScore = Math.max(0, 100 - (diffSum / joints.length * 1.2));
            if (tempScore > bestScore) bestScore = tempScore;
        });

        rawScore = bestScore;
        scoreHistory.push(rawScore);
    }

    displayScore += (rawScore - displayScore) * 0.1;
    const stepScore = Math.round(displayScore / 5) * 5;
    document.getElementById('sync_display').innerText = `${stepScore}%`;
    
    let rank = "POOR";
    if (stepScore > 80) rank = "PERFECT!!";
    else if (stepScore > 60) rank = "GREAT!";
    else if (stepScore > 40) rank = "GOOD";
    document.getElementById('rank_display').innerText = rank;
}

function showResult() {
    const avg = scoreHistory.length > 0 ? scoreHistory.reduce((a, b) => a + b) / scoreHistory.length : 0;
    document.getElementById('video_container').style.display = 'none';
    document.getElementById('result_screen').style.display = 'flex';
    document.getElementById('final_score').innerText = `${Math.round(avg)}%`;
}
</script>
</body>
</html>
