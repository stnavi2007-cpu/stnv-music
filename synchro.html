<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STNV AR SYNCHRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; margin: 0; overflow: hidden; text-align: center; }
        #video_container { position: relative; width: 100vw; height: 100vh; background: #000; display: none; }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); z-index: 1; }
        #teacher_canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: contain; z-index: 2; pointer-events: none; 
            opacity: 0.75;
            filter: drop-shadow(0 0 15px #0ff) sepia(1) hue-rotate(180deg) saturate(300%); 
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 14%, rgba(0,0,0,1) 22%, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 95%); 
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 14%, rgba(0,0,0,1) 22%, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 95%); 
            transition: opacity 0.3s ease;
        }
        video, audio { position: absolute; width: 1px; height: 1px; opacity: 0.01; z-index: -10; pointer-events: none; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: flex-end; }
        .status-box { background: rgba(0, 0, 0, 0.7); border: 2px solid #0ff; padding: 5px 10px; box-shadow: 2px 2px 0 rgba(0,0,0,0.5); min-width: 60px; }
        #sync_display { font-size: 25px; color: #0ff; text-shadow: 0 0 7px #0ff; font-weight: bold; }
        #rank_display { font-size: 10px; color: #ff0; }
        #turn_display { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); font-size: 28px; white-space: nowrap; font-weight: bold; text-shadow: 2px 2px 0 #000, 0 0 10px #fff; z-index: 30; }
        #msg_overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; color: #fff; text-shadow: 0 0 20px #f0f; z-index: 20; white-space: pre-wrap; pointer-events: auto; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(10,30,40,0.95) 0%, rgba(0,0,0,0.95) 100%); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn { padding: 15px 40px; background: #00bcd4; color: #000; border: 4px solid #fff; font-family: 'DotGothic16'; font-size: 24px; font-weight: bold; cursor: pointer; margin-top: 30px; box-shadow: 4px 4px 0px 0px #000; transition: 0.1s; pointer-events: auto; }
        .btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px #000; }
        h1 { color: #0ff; text-shadow: 4px 4px 0 #000, 0 0 15px #0ff; font-size: 36px; }
    </style>
</head>
<body>

<div id="start_screen" class="overlay">
    <h1>AR SYNCHRO QUEST</h1>
    <p style="color:#fff;">まずはカメラを起動します。</p>
    <button class="btn" id="btn_camera_start" onclick="initCamera()">CAMERA START</button>
    <p id="loading_msg" style="display:none; color:#0ff; margin-top:20px;">AI Loading...</p>
</div>

<div id="mission_btn_container" style="display:none; position:absolute; bottom:50px; left:50%; transform:translateX(-50%); z-index:50;">
    <button class="btn" onclick="startQuest()">MISSION START</button>
</div>

<div id="result_screen" class="overlay" style="display:none;">
    <h1 style="color:#ff0; font-size:30px; margin:10px 0;">MISSION COMPLETE</h1>
    <p style="font-size:20px; margin:0;">TOTAL AVG SYNCHRO</p>
    <div id="final_score" style="font-size:60px; color:#0ff; margin: 10px 0;">0%</div>
    
    <div style="width: 80%; max-width: 280px; font-size: 20px; margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #0ff; padding: 5px 0;">
            <span>ARMS:</span> <span id="score_arms" style="color:#0f0;">0%</span>
        </div>
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #0ff; padding: 5px 0;">
            <span>LEGS:</span> <span id="score_legs" style="color:#0f0;">0%</span>
        </div>
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #0ff; padding: 5px 0;">
            <span>BODY:</span> <span id="score_body" style="color:#0f0;">0%</span>
        </div>
    </div>

    <button class="btn" onclick="window.location.href=window.location.href" style="margin-top:10px;">RETRY</button>
</div>

<div id="video_container">
    <video id="input_video" autoplay playsinline muted></video>
    <video id="teacher_video" src="sample_dance.mp4" playsinline muted preload="auto"></video>    
    <audio id="bgm_audio" src="sample_dance.mp4" preload="auto"></audio>

    <canvas id="output_canvas"></canvas>
    <canvas id="teacher_canvas"></canvas>
    
    <div id="msg_overlay"></div>
    <div id="turn_display"></div>

    <div class="ui-layer">
        <div class="header">
            <div class="status-box" id="status_ui" style="display:none;">
                <div id="sync_display">0%</div>
                <div id="rank_display">-</div>
            </div>
        </div>
    </div>
</div>

<script>
let pose, teacherPose, camera, tVideo, tAudio, tCanvas, tCtx, canvasCtx;
let isPlaying = false;
let isCounting = false;
let isQuestFinished = false; 
let currentTeacherLandmarks = null;
let currentUserLandmarks = null;
let displayScore = 0;

let scoreHistory = [];
let scoreHistoryArms = [];
let scoreHistoryLegs = [];
let scoreHistoryBody = [];

// ラグ吸収・ベクトル計算用のバッファ（20フレーム = 約0.6秒分）
let teacherHistory = []; 
let userMotionWindow = []; 

let hologramOffsetX = +60; 
let hologramOffsetY = +150; 

let currentTurn = 0;
let isStudentTurn = false;
let lastBeepTime = -1;

const CAMERA_LAG_OFFSET = 0.2; 

const CUSTOM_CONNECTIONS = [
  [0, 11], [0, 12],
  [11, 12],
  [11, 13], [13, 15],
  [12, 14], [14, 16],
  [11, 23], [12, 24], [23, 24],
  [23, 25], [25, 27],
  [24, 26], [26, 28]
];

const EVAL_INDICES = [0, 11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28];

let beepCtx;
function initBeepAudio() {
    if (!beepCtx) {
        beepCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (beepCtx.state === 'suspended') {
        beepCtx.resume();
    }
}

function playBeep(frequency, duration) {
    if (!beepCtx) return;
    const oscillator = beepCtx.createOscillator();
    const gainNode = beepCtx.createGain();
    
    oscillator.type = 'sine'; 
    oscillator.frequency.value = frequency; 
    
    gainNode.gain.setValueAtTime(0, beepCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(1, beepCtx.currentTime + 0.05);
    gainNode.gain.linearRampToValueAtTime(0, beepCtx.currentTime + duration);

    oscillator.connect(gainNode);
    gainNode.connect(beepCtx.destination);
    
    oscillator.start();
    oscillator.stop(beepCtx.currentTime + duration);
}

function initCamera() {
    document.getElementById('btn_camera_start').style.display = 'none';
    document.getElementById('loading_msg').style.display = 'block';

    const videoElement = document.getElementById('input_video');
    const outputCanvas = document.getElementById('output_canvas');
    canvasCtx = outputCanvas.getContext('2d');

    tCanvas = document.getElementById('teacher_canvas');
    tCtx = tCanvas.getContext('2d', { willReadFrequently: true });
    
    tVideo = document.getElementById('teacher_video');
    tAudio = document.getElementById('bgm_audio'); 

    teacherPose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    teacherPose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    teacherPose.onResults((results) => { 
        currentTeacherLandmarks = results.poseLandmarks; 
        
        if(results.poseLandmarks) {
            teacherHistory.push(results.poseLandmarks);
            // タイムラグ吸収のためバッファを20フレームに拡大
            if(teacherHistory.length > 20) teacherHistory.shift(); 
        }
    });

    tVideo.muted = true;
    tVideo.playsInline = true;
    tVideo.play().then(() => {
        tVideo.pause();
        tVideo.currentTime = 0.01; 
        processChromaKey();
        trackTeacherPose();
    }).catch(e => {
        console.error(e);
        processChromaKey(); 
    });

    pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5 });
    pose.onResults(onUserResults);

    camera = new Camera(videoElement, { 
        onFrame: async () => { await pose.send({image: videoElement}); }, 
        width: 1280, height: 720 
    });
    
    camera.start().then(() => {
        document.getElementById('start_screen').style.display = 'none';
        document.getElementById('video_container').style.display = 'block';
        document.getElementById('mission_btn_container').style.display = 'block';
    }).catch(e => {
        alert("カメラの起動に失敗しました。権限を確認してください。");
    });
}

function startQuest() {
    initBeepAudio(); 
    isQuestFinished = false; 
    
    document.getElementById('mission_btn_container').style.display = 'none';
    document.getElementById('status_ui').style.display = 'block';

    currentTurn = 0;
    isStudentTurn = false;

    tAudio.onended = () => {
        if (!isPlaying) return;
        
        currentTurn++;
        if (currentTurn >= 8) {
            isPlaying = false;
            tVideo.pause();
            showResult();
            return;
        }

        isStudentTurn = (currentTurn % 2 !== 0);

        tVideo.currentTime = 0;
        tAudio.currentTime = 0;
        lastBeepTime = -1;
        
        let currentLag = isStudentTurn ? 0 : CAMERA_LAG_OFFSET;
        
        tVideo.play().then(() => {
            setTimeout(() => {
                if (isPlaying) {
                    if (isStudentTurn) {
                        tAudio.muted = true;
                        tAudio.volume = 0; 
                        tAudio.play().catch(e => console.error("Play error:", e));
                    } else {
                        tAudio.muted = false;
                        tAudio.volume = 1; 
                        tAudio.play().catch(e => console.error("Play error:", e));
                    }
                }
            }, currentLag * 1000); 
        }).catch(e => console.error("Play error:", e));
    };

    startCountdown();
}

function startCountdown() {
    isCounting = true;
    const msg = document.getElementById('msg_overlay');
    
    tAudio.muted = true;
    tAudio.volume = 0;
    tAudio.play().then(() => {
        setTimeout(() => {
            tAudio.pause();
            tAudio.currentTime = 0;
            tAudio.muted = false;
            tAudio.volume = 1;
        }, 100);
    });

    let countdownStartTime = null;
    let lastCount = -1;

    function countdownLoop(now) {
        if (countdownStartTime === null) countdownStartTime = now;
        let elapsed = (now - countdownStartTime) / 750;
        let currentCount = 4 - Math.floor(elapsed);

        if (currentCount > 0) {
            if (currentCount !== lastCount) {
                msg.innerText = currentCount;
                playBeep(880, 0.1); 
                lastCount = currentCount;
            }
            requestAnimationFrame(countdownLoop);
        } else {
            msg.innerText = "";
            
            tVideo.currentTime = 0;
            tAudio.currentTime = 0;
            
            tVideo.play().then(() => {
                setTimeout(() => {
                    tAudio.muted = false;
                    tAudio.volume = 1;
                    tAudio.play().then(() => {
                        isPlaying = true;
                        isCounting = false;
                        lastBeepTime = -1;
                    });
                }, CAMERA_LAG_OFFSET * 1000); 
            }).catch(e => console.error("Play error:", e));
        }
    }
    requestAnimationFrame(countdownLoop);
}

let lastTeacherVideoTime = -1;
async function trackTeacherPose() {
    if (isQuestFinished) return; 
    if (tVideo.readyState >= 2) {
        if (isPlaying && tAudio.currentTime > 0.5) {
            let targetVideoTime = tAudio.currentTime + (isStudentTurn ? 0 : CAMERA_LAG_OFFSET);
            if (Math.abs(tVideo.currentTime - targetVideoTime) > 0.2) {
                tVideo.currentTime = targetVideoTime;
            }
        }

        if (isPlaying && isStudentTurn) {
            let currentBeat = Math.floor(tAudio.currentTime / 0.75); 
            if (currentBeat > lastBeepTime && currentBeat < 4) {
                playBeep(880, 0.1);
                lastBeepTime = currentBeat;
            }
        }

        if (tVideo.currentTime !== lastTeacherVideoTime) {
            lastTeacherVideoTime = tVideo.currentTime;
            await teacherPose.send({image: tVideo});
        }
    }
    requestAnimationFrame(trackTeacherPose);
}

function filterEssentialLandmarks(landmarks) {
    if(!landmarks) return null;
    return landmarks.map((lm, index) => {
        if (!EVAL_INDICES.includes(index)) {
            return { ...lm, visibility: 0 }; 
        }
        return lm;
    });
}

let lastChromaTime = -1;
function processChromaKey() {
    if (isQuestFinished) return; 
    if (tVideo.readyState >= 2 && tVideo.videoWidth > 0) {
        if (tVideo.currentTime !== lastChromaTime) {
            lastChromaTime = tVideo.currentTime;
            
            if (tCanvas.width !== tVideo.videoWidth) {
                tCanvas.width = tVideo.videoWidth;
                tCanvas.height = tVideo.videoHeight;
            }
            
            tCtx.clearRect(0, 0, tCanvas.width, tCanvas.height);
            
            if (isStudentTurn) {
                tCanvas.style.opacity = "0.2";
            } else {
                tCanvas.style.opacity = "0.75";
            }
            
            tCtx.drawImage(tVideo, hologramOffsetX, hologramOffsetY, tCanvas.width, tCanvas.height);
            let frame = tCtx.getImageData(0, 0, tCanvas.width, tCanvas.height);
            
            for (let i = 0; i < frame.data.length / 4; i++) {
                let r = frame.data[i * 4], g = frame.data[i * 4 + 1], b = frame.data[i * 4 + 2];
                let diff = g - Math.max(r, b);
                if (diff > 15) { 
                    frame.data[i * 4 + 3] = Math.max(0, 255 - (diff * 4)); 
                }
            }
            tCtx.putImageData(frame, 0, 0);

            if (currentTeacherLandmarks) {
                let filteredLandmarks = filterEssentialLandmarks(currentTeacherLandmarks);
                let normalizedOffsetX = hologramOffsetX / tCanvas.width;
                let normalizedOffsetY = hologramOffsetY / tCanvas.height;
                
                let offsetLandmarks = filteredLandmarks.map(lm => ({
                    x: lm.x + normalizedOffsetX,
                    y: lm.y + normalizedOffsetY,
                    z: lm.z,
                    visibility: lm.visibility
                }));

                drawConnectors(tCtx, offsetLandmarks, CUSTOM_CONNECTIONS, {color: '#00ffff', lineWidth: 4});
                drawLandmarks(tCtx, offsetLandmarks, {color: '#ffffff', lineWidth: 2, radius: 4});
            }
        }
    }
    requestAnimationFrame(processChromaKey);
}

function onUserResults(results) {
    currentUserLandmarks = results.poseLandmarks;
    const canvas = document.getElementById('output_canvas');
    if (canvas.width !== results.image.width) {
        canvas.width = results.image.width;
        canvas.height = results.image.height;
    }

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    canvasCtx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    
    if (currentUserLandmarks) {
        userMotionWindow.push(currentUserLandmarks);
        if(userMotionWindow.length > 20) userMotionWindow.shift(); // ユーザー側バッファも拡大

        let filteredLandmarks = filterEssentialLandmarks(currentUserLandmarks);
        drawConnectors(canvasCtx, filteredLandmarks, CUSTOM_CONNECTIONS, {color: '#00ff00', lineWidth: 4});
        drawLandmarks(canvasCtx, filteredLandmarks, {color: '#ffffff', lineWidth: 2, radius: 4});
    }
    canvasCtx.restore();
    
    updateScore();
}

function getNormalizedJoints(pose, isMirrored = false) {
    if (!pose || !pose[11] || !pose[12] || !pose[23] || !pose[24]) return null;
    
    let midShoulderX = (pose[11].x + pose[12].x) / 2;
    let midShoulderY = (pose[11].y + pose[12].y) / 2;
    let midHipX = (pose[23].x + pose[24].x) / 2;
    let midHipY = (pose[23].y + pose[24].y) / 2;

    if (isMirrored) {
        midShoulderX = 1.0 - midShoulderX;
        midHipX = 1.0 - midHipX;
    }

    let torsoLength = Math.hypot(midShoulderX - midHipX, midShoulderY - midHipY) || 0.1;
    let normPose = {};

    EVAL_INDICES.forEach(i => {
        let mapI = i;
        if (isMirrored) {
            const MIRROR_MAP = {11:12, 12:11, 13:14, 14:13, 15:16, 16:15, 23:24, 24:23, 25:26, 26:25, 27:28, 28:27, 0:0};
            mapI = MIRROR_MAP[i] || i;
        }

        if (pose[mapI]) {
            let px = isMirrored ? (1.0 - pose[mapI].x) : pose[mapI].x;
            normPose[i] = {
                x: (px - midShoulderX) / torsoLength,
                y: (pose[mapI].y - midShoulderY) / torsoLength
            };
        }
    });
    return normPose;
}

function updateScore() {
    if (isCounting || !isPlaying) {
        document.getElementById('turn_display').innerText = "";
        return;
    }

    if (isStudentTurn) {
        document.getElementById('turn_display').innerText = "YOUR TURN!!";
        document.getElementById('turn_display').style.color = "#0f0";
    } else {
        document.getElementById('turn_display').innerText = "TEACHER";
        document.getElementById('turn_display').style.color = "#ff0";
    }
    
    let rawScore = -1; 
    let bestPartScores = { arms: 0, legs: 0, body: 0 };
    const V_LAG = 4; // ベクトル計算用の過去フレーム差分間隔

    if (teacherHistory.length > V_LAG && userMotionWindow.length > V_LAG) {
        
        let uNorm = getNormalizedJoints(userMotionWindow[userMotionWindow.length - 1], true);
        let uPast = getNormalizedJoints(userMotionWindow[userMotionWindow.length - 1 - V_LAG], true);
        if (!uNorm || !uPast) return;

        let bestOverallScore = -1;
        const ARM_INDICES = [11, 12, 13, 14, 15, 16];
        const LEG_INDICES = [23, 24, 25, 26, 27, 28];
        const BODY_INDICES = [0, 11, 12, 23, 24];

        // 動的ノイズゲートの算出（先生がどれくらい動いているか）
        let globalMaxMovement = 0;
        for (let j = V_LAG; j < teacherHistory.length; j++) {
            let tN = getNormalizedJoints(teacherHistory[j], false);
            let tP = getNormalizedJoints(teacherHistory[j - V_LAG], false);
            if (tN && tP) {
                EVAL_INDICES.forEach(i => {
                    if (tN[i] && tP[i]) {
                        let m = Math.hypot(tN[i].x - tP[i].x, tN[i].y - tP[i].y);
                        if (m > globalMaxMovement) globalMaxMovement = m;
                    }
                });
            }
        }
        let activeThreshold = Math.max(0.015, globalMaxMovement * 0.15);

        // ラグを完全に吸収するため、過去0.6秒間の先生の動作履歴を総当たりで確認し、一番一致する瞬間を探す
        for (let j = V_LAG; j < teacherHistory.length; j++) {
            let tNorm = getNormalizedJoints(teacherHistory[j], false);
            let tPast = getNormalizedJoints(teacherHistory[j - V_LAG], false);
            if (!tNorm || !tPast) continue;

            let calculateGroupScore = (indices) => {
                let sum = 0;
                let weightTotal = 0;

                indices.forEach(i => {
                    if (!tNorm[i] || !uNorm[i]) return;

                    let tx = tNorm[i].x - tPast[i].x;
                    let ty = tNorm[i].y - tPast[i].y;
                    let ux = uNorm[i].x - uPast[i].x;
                    let uy = uNorm[i].y - uPast[i].y;

                    let tLen = Math.hypot(tx, ty);
                    let uLen = Math.hypot(ux, uy);

                    // 位置座標の一致度
                    let posDiff = Math.hypot(tNorm[i].x - uNorm[i].x, tNorm[i].y - uNorm[i].y);
                    let posScore = Math.max(0, 1.0 - (posDiff / 0.4));

                    if (tLen < activeThreshold) {
                        // 【完全静止の除外ルール】先生が意図的に止めている部位は採点対象から外す
                        if (uLen > 0.05) {
                            // ただし、先生が完全に止まっているのに、生徒がデタラメに暴れている場合のみ0点として減点対象にする
                            sum += 0;
                            weightTotal += uLen; 
                        }
                        return; 
                    }

                    // 先生が動いている部位のみスコア計算
                    let weight = tLen;
                    let motionScore = 0;

                    if (uLen <= 0.01) {
                        // 棒立ちキラー：生徒が動いていない
                        motionScore = 0;
                    } else {
                        // 進行方向の類似度（内積）
                        let dot = (tx * ux) + (ty * uy);
                        let cosTheta = Math.max(-1, Math.min(1, dot / (tLen * uLen)));

                        if (cosTheta > 0) {
                            let angleScore = cosTheta; 
                            let speedScore = Math.min(tLen, uLen) / Math.max(tLen, uLen); 
                            motionScore = (angleScore * 0.6) + (speedScore * 0.4);
                        } else {
                            // 逆方向キラー
                            motionScore = 0; 
                        }
                    }

                    // 座標40% ＋ 動きのベクトル（方向とスピード）60% で評価
                    let finalScore = (posScore * 0.4) + (motionScore * 0.6);
                    sum += (finalScore * 100) * weight;
                    weightTotal += weight;
                });

                return { sum, weightTotal };
            };

            let armsObj = calculateGroupScore(ARM_INDICES);
            let legsObj = calculateGroupScore(LEG_INDICES);
            let bodyObj = calculateGroupScore(BODY_INDICES);

            let totalWeight = armsObj.weightTotal + legsObj.weightTotal + bodyObj.weightTotal;
            let totalSum = armsObj.sum + legsObj.sum + bodyObj.sum;

            if (totalWeight > 0) {
                let tempOverall = totalSum / totalWeight;
                // 一番スコアが高くなる瞬間（＝生徒の動きと先生の動きが一番シンクロした瞬間）を採用
                if (tempOverall > bestOverallScore) {
                    bestOverallScore = tempOverall;
                    bestPartScores.arms = armsObj.weightTotal > 0 ? armsObj.sum / armsObj.weightTotal : 0;
                    bestPartScores.legs = legsObj.weightTotal > 0 ? legsObj.sum / legsObj.weightTotal : 0;
                    bestPartScores.body = bodyObj.weightTotal > 0 ? bodyObj.sum / bodyObj.weightTotal : 0;
                }
            }
        }

        if (bestOverallScore !== -1) {
            rawScore = bestOverallScore;
        }
    }

    // 両者が完全に止まっていて評価できないフレームは直前のスコアを維持する
    if (rawScore === -1 && scoreHistory.length > 0) {
        rawScore = scoreHistory[scoreHistory.length - 1];
    } else if (rawScore === -1) {
        rawScore = 0;
    }

    if (isStudentTurn) {
        scoreHistory.push(rawScore);
        scoreHistoryArms.push(bestPartScores.arms);
        scoreHistoryLegs.push(bestPartScores.legs);
        scoreHistoryBody.push(bestPartScores.body);
    }

    if (!isStudentTurn && scoreHistory.length > 0) {
        rawScore = scoreHistory[scoreHistory.length - 1];
    }

    displayScore += (rawScore - displayScore) * 0.15;
    const stepScore = Math.round(displayScore / 5) * 5;
    document.getElementById('sync_display').innerText = `${stepScore}%`;

    let rank = "POOR";
    if (stepScore > 80) rank = "PERFECT!!";
    else if (stepScore > 60) rank = "GREAT!";
    else if (stepScore > 40) rank = "GOOD";
    document.getElementById('rank_display').innerText = rank;
}

function showResult() {
    isQuestFinished = true; 
    const getAvg = (arr) => arr.length > 0 ? Math.round(arr.reduce((a, b) => a + b) / arr.length) : 0;
    document.getElementById('video_container').style.display = 'none';
    document.getElementById('result_screen').style.display = 'flex';
    document.getElementById('final_score').innerText = `${getAvg(scoreHistory)}%`;
    document.getElementById('score_arms').innerText = `${getAvg(scoreHistoryArms)}%`;
    document.getElementById('score_legs').innerText = `${getAvg(scoreHistoryLegs)}%`;
    document.getElementById('score_body').innerText = `${getAvg(scoreHistoryBody)}%`;
}
</script>
